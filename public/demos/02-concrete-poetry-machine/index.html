<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concrete Poetry Machine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;1,7..72,400&family=JetBrains+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FAF9F6;
    --fg: #2C2C2C;
    --dim: #2C2C2C88;
    --accent: #C2714F;
    --accent-soft: #C2714F44;
    --border: #E8E5DF;
    --sage: #7A8B6F;
    --ochre: #D4A843;
    --fog: #E8E5DF;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    /* subtle paper texture */
    background-image:
      radial-gradient(ellipse at 20% 50%, #f5f0ea 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, #f0ebe4 0%, transparent 50%);
  }

  header {
    width: 100%;
    max-width: 720px;
    padding: 2rem 1.5rem 0;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 1.3rem;
    color: var(--accent);
    letter-spacing: 0.02em;
    font-optical-sizing: auto;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .input-label {
    font-family: 'Literata', serif;
    font-size: 0.85rem;
    color: var(--dim);
    white-space: nowrap;
  }

  #poem-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--border);
    color: var(--fg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    padding: 0.5rem 0;
    outline: none;
    transition: border-color 0.3s;
  }

  #poem-input:focus {
    border-bottom-color: var(--accent);
  }

  #poem-input::placeholder {
    color: var(--accent-soft);
    font-style: italic;
    font-family: 'Literata', serif;
  }

  #shape-label {
    font-family: 'Fraunces', serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    min-width: 7em;
    text-align: right;
    transition: opacity 0.4s;
    opacity: 0;
  }

  #shape-label.visible {
    opacity: 1;
  }

  /* API key button & modal */
  .key-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    padding: 0.35rem 0.5rem;
    font-size: 0.85rem;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 0.35rem;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .key-btn:hover {
    border-color: var(--accent);
    color: var(--fg);
  }
  .key-btn .key-icon {
    font-size: 0.9rem;
  }
  .key-btn .key-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--sage);
    display: none;
  }
  .key-btn.has-key .key-dot {
    display: block;
  }

  .mode-indicator {
    font-family: 'Literata', serif;
    font-size: 0.7rem;
    color: var(--dim);
    text-align: right;
    padding-right: 0.25rem;
    opacity: 0.7;
    min-height: 1em;
  }
  .mode-indicator .mode-ai {
    color: var(--sage);
    font-weight: 500;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(44, 44, 44, 0.3);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open {
    display: flex;
  }
  .modal {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.75rem;
    max-width: 380px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  }
  .modal h2 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }
  .modal p {
    font-family: 'Literata', serif;
    font-size: 0.8rem;
    color: var(--dim);
    line-height: 1.5;
    margin-bottom: 1rem;
  }
  .modal input[type="password"] {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--fg);
    outline: none;
    margin-bottom: 0.75rem;
    transition: border-color 0.2s;
  }
  .modal input[type="password"]:focus {
    border-color: var(--accent);
  }
  .modal-actions {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
  }
  .modal-actions button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 0.4rem 0.85rem;
    border-radius: 5px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--fg);
    transition: background 0.15s, border-color 0.15s;
  }
  .modal-actions button:hover {
    border-color: var(--accent);
  }
  .modal-actions .save-btn {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .modal-actions .save-btn:hover {
    background: #a85e3f;
    border-color: #a85e3f;
  }
  .modal-actions .clear-btn {
    color: var(--dim);
    font-size: 0.75rem;
  }

  .canvas-wrap {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    min-height: 0;
  }

  canvas {
    display: block;
  }
</style>
</head>
<body>
  <header>
    <h1>Concrete Poetry Machine</h1>
    <div class="input-row">
      <span class="input-label">type a word</span>
      <input id="poem-input" type="text" placeholder="circle, river, heart, mountain..." autofocus autocomplete="off" spellcheck="false" />
      <span id="shape-label"></span>
      <button class="key-btn" id="key-btn" title="API key settings">
        <span class="key-icon">&#x1F511;</span>
        <span class="key-dot"></span>
      </button>
    </div>
    <div class="mode-indicator" id="mode-indicator"></div>
  </header>

  <!-- API key modal -->
  <div class="modal-overlay" id="key-modal">
    <div class="modal">
      <h2>Anthropic API key</h2>
      <p>Paste your key to enable AI shape detection. The key stays in your browser's localStorage and is sent directly to the Anthropic API. Nothing is stored elsewhere.</p>
      <input type="password" id="key-input" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />
      <div class="modal-actions">
        <button class="clear-btn" id="clear-key-btn">clear key</button>
        <button id="cancel-key-btn">cancel</button>
        <button class="save-btn" id="save-key-btn">save</button>
      </div>
    </div>
  </div>
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

<script type="module">
import { prepareWithSegments, layoutNextLine } from 'https://esm.sh/@chenglou/pretext'

const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')
const input = document.getElementById('poem-input')
const shapeLabel = document.getElementById('shape-label')
const keyBtn = document.getElementById('key-btn')
const keyModal = document.getElementById('key-modal')
const keyInput = document.getElementById('key-input')
const saveKeyBtn = document.getElementById('save-key-btn')
const cancelKeyBtn = document.getElementById('cancel-key-btn')
const clearKeyBtn = document.getElementById('clear-key-btn')
const modeIndicator = document.getElementById('mode-indicator')

// --- API key management ---
function getApiKey() {
  return localStorage.getItem('anthropic_api_key') || ''
}

function setApiKey(key) {
  if (key) {
    localStorage.setItem('anthropic_api_key', key)
  } else {
    localStorage.removeItem('anthropic_api_key')
  }
  updateKeyUI()
}

function updateKeyUI() {
  const hasKey = !!getApiKey()
  keyBtn.classList.toggle('has-key', hasKey)
  modeIndicator.innerHTML = hasKey
    ? '<span class="mode-ai">AI shape detection</span>'
    : 'keyword matching'
}

keyBtn.addEventListener('click', () => {
  keyInput.value = getApiKey()
  keyModal.classList.add('open')
  keyInput.focus()
})

cancelKeyBtn.addEventListener('click', () => {
  keyModal.classList.remove('open')
  input.focus()
})

saveKeyBtn.addEventListener('click', () => {
  setApiKey(keyInput.value.trim())
  keyModal.classList.remove('open')
  input.focus()
  // Re-trigger detection with AI if there's text
  if (input.value.trim()) triggerAIDetection(input.value.trim())
})

clearKeyBtn.addEventListener('click', () => {
  setApiKey('')
  keyInput.value = ''
  aiShapeOverride = null
  keyModal.classList.remove('open')
  input.focus()
})

keyModal.addEventListener('click', (e) => {
  if (e.target === keyModal) {
    keyModal.classList.remove('open')
    input.focus()
  }
})

keyInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') saveKeyBtn.click()
  if (e.key === 'Escape') cancelKeyBtn.click()
})

updateKeyUI()

// --- AI shape detection ---
let aiShapeOverride = null
let aiDebounceTimer = null
let aiRequestId = 0

async function triggerAIDetection(text) {
  const apiKey = getApiKey()
  if (!apiKey || !text) return

  const requestId = ++aiRequestId

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 100,
        system: 'You are a concrete poetry shape detector. Given a sentence, respond with ONLY a JSON object like {"shape": "circle", "params": {}} where shape is one of: circle, river, mountain, wave, heart, diamond, hourglass, tree, cage, spiral, stairs, rain, cross. Choose the shape that best represents the meaning or feeling of the text. If multiple shapes could work, pick the most evocative one.',
        messages: [{ role: 'user', content: text }]
      })
    })

    if (requestId !== aiRequestId) return // stale request

    if (!res.ok) {
      console.warn('Anthropic API error:', res.status)
      aiShapeOverride = null
      return
    }

    const data = await res.json()
    if (requestId !== aiRequestId) return

    const responseText = data.content?.[0]?.text || ''
    const match = responseText.match(/\{[^}]+\}/)
    if (match) {
      const parsed = JSON.parse(match[0])
      if (parsed.shape && SHAPES[parsed.shape]) {
        aiShapeOverride = parsed.shape
      } else {
        aiShapeOverride = null
      }
    }
  } catch (err) {
    console.warn('AI shape detection failed:', err)
    aiShapeOverride = null
  }
}

// --- Shape definitions ---
// Each shape returns an array of widths for N lines, given maxWidth and totalLines.
// Widths should be DRAMATIC — shapes must be unmistakable.

const SHAPES = {
  organic: {
    keywords: [],
    widths(maxW, total, time) {
      // Gentle organic breathing shape — NOT a rectangle
      return Array.from({ length: total }, (_, i) => {
        const t = i / (total - 1)
        // A soft blob: wider in the middle, tapered at edges, with gentle wobble
        const base = Math.sin(t * Math.PI)  // 0→1→0 dome
        const wobble = Math.sin(t * 7 + (time || 0) * 0.3) * 0.05
        const w = 0.25 + base * 0.65 + wobble
        return maxW * Math.max(0.08, w)
      })
    }
  },
  circle: {
    keywords: ['circle', 'moon', 'sun', 'ball', 'dot', 'round', 'sphere', 'globe', 'orbit', 'zero', 'hole', 'ring', 'loop', 'wheel', 'coin', 'bubble', 'egg', 'eye'],
    widths(maxW, total) {
      // True circle silhouette: width = 2 * sqrt(r^2 - y^2)
      // Use nearly full maxW as diameter
      const r = total / 2
      return Array.from({ length: total }, (_, i) => {
        const y = i - r + 0.5  // distance from center
        const halfChord = Math.sqrt(Math.max(0, r * r - y * y))
        const fraction = halfChord / r  // 0..1
        return maxW * 0.95 * Math.max(0.04, fraction)
      })
    }
  },
  river: {
    keywords: ['river', 'stream', 'flow', 'creek', 'brook', 'snake', 'slither', 'wind', 'path', 'road', 'trail'],
    widths(maxW, total, time) {
      // Dramatic S-curve: the CENTER of the line shifts left/right,
      // with a consistent narrow width, creating a visible sinusoidal path
      const lineWidth = maxW * 0.3
      return Array.from({ length: total }, (_, i) => {
        const t = i / (total - 1)
        // Sinusoidal offset for centering (handled in render), but for width:
        // we vary width subtly to reinforce the curve
        const wave = Math.sin(t * Math.PI * 2.5 + (time || 0) * 0.6)
        return lineWidth + wave * maxW * 0.08
      })
    },
    // River also needs center offsets to create the S-curve
    offsets(maxW, total, time) {
      return Array.from({ length: total }, (_, i) => {
        const t = i / (total - 1)
        const wave = Math.sin(t * Math.PI * 2.5 + (time || 0) * 0.6)
        return wave * maxW * 0.3  // large lateral shift
      })
    }
  },
  mountain: {
    keywords: ['mountain', 'peak', 'hill', 'summit', 'ridge', 'volcano', 'pyramid', 'tower', 'spire', 'tent'],
    widths(maxW, total) {
      // Clear triangle: narrow point at top, wide base at bottom
      return Array.from({ length: total }, (_, i) => {
        const t = i / (total - 1)  // 0 at top, 1 at bottom
        return maxW * 0.95 * Math.max(0.04, t)
      })
    }
  },
  wave: {
    keywords: ['wave', 'ocean', 'sea', 'tide', 'surf', 'ripple', 'pulse', 'breath', 'breathe'],
    widths(maxW, total, time) {
      // Multiple obvious undulations — wide/narrow/wide/narrow
      return Array.from({ length: total }, (_, i) => {
        const t = i / (total - 1)
        // 3 full waves across the height
        const wave = Math.sin(t * Math.PI * 6 + (time || 0) * 0.8)
        // Map from [-1,1] to [narrow, wide]
        const w = 0.5 + wave * 0.42
        return maxW * Math.max(0.06, w)
      })
    }
  },
  heart: {
    keywords: ['heart', 'love', 'adore', 'passion', 'desire', 'kiss', 'crush', 'valentine'],
    widths(maxW, total) {
      // Heart: two bumps at top, tapers to point at bottom
      return Array.from({ length: total }, (_, i) => {
        const t = i / (total - 1)  // 0 = top, 1 = bottom
        let w
        if (t < 0.15) {
          // Very top: grow into the two lobes
          w = Math.sin((t / 0.15) * Math.PI * 0.5) * 0.75
        } else if (t < 0.35) {
          // Two lobes — widest part, slight dip in center handled by offset
          w = 0.75 + Math.sin(((t - 0.15) / 0.2) * Math.PI) * 0.2
        } else {
          // Taper smoothly to a point
          const s = (t - 0.35) / 0.65
          w = 0.95 * (1 - s) * (1 - s * 0.3)
        }
        return maxW * 0.95 * Math.max(0.04, w)
      })
    }
  },
  diamond: {
    keywords: ['diamond', 'gem', 'crystal', 'jewel', 'rhombus', 'kite'],
    widths(maxW, total) {
      // Diamond/rhombus: narrow at top and bottom, widest in middle
      return Array.from({ length: total }, (_, i) => {
        const t = i / (total - 1)
        // Triangle wave: 0→1→0
        const w = t < 0.5 ? t * 2 : (1 - t) * 2
        return maxW * 0.95 * Math.max(0.04, w)
      })
    }
  },
  hourglass: {
    keywords: ['hourglass', 'waist', 'narrow', 'pinch', 'bow', 'bowtie', 'corset', 'time', 'timer'],
    widths(maxW, total) {
      // Wide top and bottom, very narrow middle
      return Array.from({ length: total }, (_, i) => {
        const t = i / (total - 1)
        // V-shape centered at 0.5
        const dist = Math.abs(t - 0.5) * 2  // 1 at edges, 0 at center
        const w = 0.08 + dist * dist * 0.87  // quadratic for dramatic pinch
        return maxW * 0.95 * Math.max(0.05, w)
      })
    }
  },
  tree: {
    keywords: ['tree', 'forest', 'wood', 'oak', 'pine', 'redwood', 'grove', 'cypress', 'sequoia', 'cedar'],
    widths(maxW, total) {
      // Wide canopy (top 70%), narrow trunk (bottom 30%)
      const trunkStart = Math.floor(total * 0.72)
      return Array.from({ length: total }, (_, i) => {
        if (i >= trunkStart) {
          // Narrow trunk
          return maxW * 0.1
        }
        // Canopy: oval shape
        const t = i / trunkStart
        const r = Math.sin(t * Math.PI)
        return maxW * 0.9 * Math.max(0.1, r)
      })
    }
  },
  spiral: {
    keywords: ['spiral', 'vortex', 'whirl', 'spin', 'tornado', 'cyclone', 'funnel', 'drain'],
    widths(maxW, total, time) {
      // Wide at top, narrows with oscillation
      return Array.from({ length: total }, (_, i) => {
        const t = i / (total - 1)
        const decay = 1 - t * 0.85
        const osc = Math.sin(t * Math.PI * 6 + (time || 0) * 1.0) * 0.15
        return maxW * Math.max(0.04, (0.45 + osc) * decay)
      })
    }
  },
  cross: {
    keywords: ['cross', 'plus', 'church', 'faith', 'hospital', 'aid', 'holy'],
    widths(maxW, total) {
      // Cross: narrow vertical bar with wide horizontal bar in upper third
      return Array.from({ length: total }, (_, i) => {
        const t = i / (total - 1)
        // Horizontal bar between 25% and 40% from top
        if (t > 0.25 && t < 0.4) {
          return maxW * 0.9
        }
        return maxW * 0.18
      })
    }
  },
  rain: {
    keywords: ['rain', 'drip', 'drop', 'tears', 'cry', 'weep', 'pour', 'mist', 'fog'],
    widths(maxW, total) {
      // Alternating thin/thinner lines — like falling streaks
      return Array.from({ length: total }, (_, i) => {
        const base = 0.15 + Math.random() * 0.15  // intentionally jittery
        const streak = (i % 3 === 0) ? 0.4 : base
        return maxW * streak
      })
    },
    // Each line gets random offset for scattered look
    offsets(maxW, total) {
      // Cache offsets so they don't change every frame
      if (!SHAPES.rain._cachedOffsets || SHAPES.rain._cachedTotal !== total) {
        SHAPES.rain._cachedOffsets = Array.from({ length: total }, () =>
          (Math.random() - 0.5) * maxW * 0.5
        )
        SHAPES.rain._cachedTotal = total
      }
      return SHAPES.rain._cachedOffsets
    }
  },
  stairs: {
    keywords: ['stairs', 'steps', 'staircase', 'ladder', 'climb', 'ascend', 'descend', 'escalator'],
    widths(maxW, total) {
      // Staircase: discrete width steps
      const numSteps = 6
      return Array.from({ length: total }, (_, i) => {
        const step = Math.floor((i / total) * numSteps)
        const w = 0.15 + (step / (numSteps - 1)) * 0.8
        return maxW * w
      })
    }
  }
}

// --- Shape detection ---
function detectShape(text) {
  // AI override takes priority when a key is set
  if (aiShapeOverride && getApiKey()) {
    const shape = SHAPES[aiShapeOverride]
    if (shape) {
      return { name: aiShapeOverride, shape, keyword: null, source: 'ai' }
    }
  }

  const lower = text.toLowerCase()
  const words = lower.split(/\s+/)
  for (const [name, shape] of Object.entries(SHAPES)) {
    if (name === 'organic') continue
    if (!shape.keywords) continue
    for (const kw of shape.keywords) {
      if (words.includes(kw) || lower.includes(kw)) {
        return { name, shape, keyword: kw, source: 'keyword' }
      }
    }
  }
  return { name: 'organic', shape: SHAPES.organic, keyword: null, source: 'keyword' }
}

// --- Animation state ---
let currentWidths = null
let targetWidths = null
let animProgress = 1
let currentShapeName = 'organic'
let animTime = 0
let lastText = ''
let rafId = null

const FONT_SIZE = 13
const LINE_HEIGHT = FONT_SIZE * 1.5
const FONT = `${FONT_SIZE}px 'JetBrains Mono', monospace`

function resize() {
  const wrap = canvas.parentElement
  const dpr = window.devicePixelRatio || 1
  const w = wrap.clientWidth
  const h = wrap.clientHeight
  canvas.width = w * dpr
  canvas.height = h * dpr
  canvas.style.width = w + 'px'
  canvas.style.height = h + 'px'
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
}

function lerp(a, b, t) {
  return a + (b - a) * t
}

function easeInOut(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2
}

function render(timestamp) {
  rafId = requestAnimationFrame(render)
  animTime = timestamp / 1000

  const wrap = canvas.parentElement
  const canvasW = wrap.clientWidth
  const canvasH = wrap.clientHeight

  // Check for resize
  if (canvas.style.width !== canvasW + 'px' || canvas.style.height !== canvasH + 'px') {
    resize()
  }

  ctx.clearRect(0, 0, canvasW, canvasH)

  const rawText = input.value.trim()
  if (!rawText) {
    // Draw a faint prompt
    ctx.font = `italic 18px 'Fraunces', serif`
    ctx.fillStyle = '#C2714F44'
    ctx.textAlign = 'center'
    ctx.fillText('words become shapes', canvasW / 2, canvasH / 2)
    return
  }

  // Detect shape
  const { name, shape, keyword, source } = detectShape(rawText)

  // Update shape label
  if (keyword || source === 'ai') {
    shapeLabel.textContent = name
    shapeLabel.classList.add('visible')
  } else {
    shapeLabel.textContent = ''
    shapeLabel.classList.remove('visible')
  }

  // Compute target widths — use most of the canvas
  const maxWidth = Math.min(canvasW - 32, 700)
  const maxLines = Math.floor((canvasH - 16) / LINE_HEIGHT)
  const totalLines = Math.max(12, Math.min(maxLines, 50))

  const isAnimated = ['river', 'wave', 'spiral', 'organic'].includes(name)
  const newTargetWidths = shape.widths(maxWidth, totalLines, animTime)

  // Get center offsets if the shape defines them
  const offsets = shape.offsets ? shape.offsets(maxWidth, totalLines, animTime) : null

  // If shape changed, start animation
  if (name !== currentShapeName) {
    currentWidths = targetWidths ? [...targetWidths] : newTargetWidths.map(() => maxWidth * 0.5)
    while (currentWidths.length < totalLines) currentWidths.push(currentWidths[currentWidths.length - 1] || maxWidth * 0.5)
    currentWidths.length = totalLines
    animProgress = 0
    currentShapeName = name
  }

  targetWidths = newTargetWidths

  // Advance animation
  if (animProgress < 1) {
    animProgress = Math.min(1, animProgress + 0.02)
  }

  const easedProgress = easeInOut(animProgress)

  // Compute interpolated widths
  const widths = targetWidths.map((tw, i) => {
    if (isAnimated || animProgress >= 1) return tw
    const cw = currentWidths[i] !== undefined ? currentWidths[i] : tw
    return lerp(cw, tw, easedProgress)
  })

  // Build repeating text
  const repeatText = (rawText + '  ').repeat(Math.ceil(3000 / (rawText.length + 2)))

  // Prepare text with pretext
  ctx.font = FONT
  let prepared
  try {
    prepared = prepareWithSegments(repeatText, FONT)
  } catch (e) {
    return
  }

  // Layout lines
  const lines = []
  let cursor = { segmentIndex: 0, graphemeIndex: 0 }

  for (let i = 0; i < widths.length; i++) {
    const w = Math.max(widths[i], FONT_SIZE * 2)
    const line = layoutNextLine(prepared, cursor, w)
    if (!line) {
      // Reset cursor to loop the text
      cursor = { segmentIndex: 0, graphemeIndex: 0 }
      const line2 = layoutNextLine(prepared, cursor, w)
      if (!line2) break
      lines.push({ text: line2.text, width: w, offset: offsets ? offsets[i] : 0 })
      cursor = line2.end
    } else {
      lines.push({ text: line.text, width: w, offset: offsets ? offsets[i] : 0 })
      cursor = line.end
    }
  }

  if (lines.length === 0) return

  // Center the block vertically
  const blockHeight = lines.length * LINE_HEIGHT
  const startY = (canvasH - blockHeight) / 2 + FONT_SIZE

  ctx.font = FONT
  ctx.textAlign = 'center'

  // Draw each line centered on canvas, with optional offset
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i]
    const y = startY + i * LINE_HEIGHT

    // Subtle fade at top and bottom edges
    const edgeFade = Math.min(i, lines.length - 1 - i) / 4
    const alpha = Math.min(1, 0.35 + edgeFade * 0.3)

    ctx.fillStyle = `rgba(44, 44, 44, ${alpha})`
    const xCenter = canvasW / 2 + (line.offset || 0)
    ctx.fillText(line.text, xCenter, y)
  }
}

// --- Event listeners ---
input.addEventListener('input', () => {
  // Reset rain offsets cache on input change
  SHAPES.rain._cachedOffsets = null

  // Debounced AI shape detection
  const text = input.value.trim()
  if (getApiKey() && text) {
    clearTimeout(aiDebounceTimer)
    aiDebounceTimer = setTimeout(() => {
      triggerAIDetection(text)
    }, 500)
  } else {
    aiShapeOverride = null
  }
})

window.addEventListener('resize', resize)

// --- Init ---
resize()
rafId = requestAnimationFrame(render)

// Focus input on any keypress when not focused
document.addEventListener('keydown', (e) => {
  if (document.activeElement !== input && document.activeElement !== keyInput && !e.ctrlKey && !e.metaKey && e.key.length === 1) {
    input.focus()
  }
})
</script>
</body>
