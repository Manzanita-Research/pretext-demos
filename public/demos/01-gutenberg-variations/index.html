<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Gutenberg Variations</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@300;400;500;600;700&family=Commit+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #FAF9F6;
    color: #2C2C2C;
    font-family: 'Fraunces', Georgia, serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }

  /* Paper grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.03;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  #page-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #page {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  /* Vignette overlay */
  #vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: radial-gradient(ellipse at center, rgba(107,58,42,0) 30%, rgba(107,58,42,0.06) 100%);
  }

  #content-area {
    position: absolute;
    z-index: 1;
  }

  .column {
    position: absolute;
    top: 0;
    overflow: hidden;
  }

  .text-line {
    position: absolute;
    white-space: nowrap;
    left: 0;
    right: 0;
  }

  /* Headline */
  .headline-block {
    position: absolute;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 3;
  }

  .headline-main {
    font-weight: 700;
    margin: 0;
  }

  .headline-sub {
    margin: 0;
    font-style: italic;
    opacity: 0.55;
  }

  .headline-rule {
    position: absolute;
    left: 0;
    right: 0;
    height: 1px;
  }

  /* Pull quote */
  .pull-quote {
    position: absolute;
    font-style: italic;
    z-index: 3;
  }

  .pull-quote-rule {
    position: absolute;
    left: 0;
    top: -4px;
    bottom: -4px;
    width: 2px;
    opacity: 0.25;
  }

  .pull-quote .pq-line {
    position: absolute;
    white-space: nowrap;
    opacity: 0.65;
  }

  /* Image block */
  .image-block {
    position: absolute;
    z-index: 3;
  }

  .image-block-inner {
    width: 100%;
    height: 100%;
    border: 0.5px solid rgba(44,44,44,0.1);
    background: linear-gradient(135deg, rgba(44,44,44,0.06) 0%, rgba(44,44,44,0.1) 50%, rgba(44,44,44,0.06) 100%);
  }

  .image-caption {
    position: absolute;
    bottom: -18px;
    left: 8px;
    font-style: italic;
    opacity: 0.4;
    white-space: nowrap;
  }

  /* Drop cap */
  .drop-cap {
    position: absolute;
    font-weight: 600;
    opacity: 0.85;
    line-height: 1;
  }

  /* Decorative rules */
  .rule-line {
    position: absolute;
    z-index: 0;
  }

  /* SVG ornaments */
  .ornament-svg {
    position: absolute;
    z-index: 0;
    pointer-events: none;
  }

  #controls {
    padding: 20px 40px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: linear-gradient(to top, rgba(250,249,246,1) 0%, rgba(250,249,246,0.97) 60%, rgba(250,249,246,0) 100%);
    position: relative;
    z-index: 10;
  }

  #era-label {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #6B3A2A;
    min-height: 20px;
    font-optical-sizing: auto;
  }

  #year-display {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 64px;
    font-weight: 300;
    color: #2C2C2C;
    line-height: 1;
    letter-spacing: 0.02em;
    font-optical-sizing: auto;
  }

  #slider-row {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 720px;
  }

  .slider-bound {
    font-family: 'Commit Mono', monospace;
    font-size: 12px;
    color: #8B9E7E;
    letter-spacing: 0.05em;
    min-width: 36px;
    text-align: center;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 2px;
    background: #C49A3C;
    outline: none;
    border-radius: 1px;
    cursor: pointer;
    opacity: 0.4;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #C2714F;
    border: 2px solid #FAF9F6;
    box-shadow: 0 0 0 1px rgba(107,58,42,0.2), 0 2px 8px rgba(107,58,42,0.25);
    cursor: grab;
    transition: transform 0.15s ease;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  input[type="range"]::-webkit-slider-thumb:active {
    cursor: grabbing;
    transform: scale(1.1);
  }

  input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #C2714F;
    border: 2px solid #FAF9F6;
    box-shadow: 0 0 0 1px rgba(107,58,42,0.2), 0 2px 8px rgba(107,58,42,0.25);
    cursor: grab;
  }

  #title-overlay {
    position: absolute;
    top: 20px;
    left: 0;
    right: 0;
    text-align: center;
    pointer-events: none;
    z-index: 5;
  }

  #title-overlay h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #8B9E7E;
    font-optical-sizing: auto;
  }
</style>
</head>
<body>

<div id="title-overlay">
  <h1>The Gutenberg Variations</h1>
</div>

<div id="page-wrap">
  <div id="page"></div>
  <div id="vignette"></div>
</div>

<div id="controls">
  <div id="era-label"></div>
  <div id="year-display">1440</div>
  <div id="slider-row">
    <span class="slider-bound">1440</span>
    <input type="range" id="slider" min="1440" max="2026" value="1440" step="1">
    <span class="slider-bound">2026</span>
  </div>
</div>

<script type="module">
import { prepareWithSegments, layoutNextLine } from 'https://esm.sh/@chenglou/pretext'

// --- Article text ---
const ARTICLE_TEXT = `In the beginning was the Word, and the Word was set in type. For centuries the scribes had labored by candlelight, copying each letter with devotion and fatigue, their hands cramping over vellum as the hours dissolved into years. Every manuscript was singular, irreplaceable, alive with the tremor of a human wrist.

Then came the press. Johannes Gutenberg, a goldsmith from Mainz, saw what others could not: that language might be multiplied without diminishing. That a page, once composed in metal, could speak a thousand times. He cast his letters in lead and antimony, locked them into forms, and pulled the lever. The ink bit into paper. The world shifted on its axis.

What followed was not merely mechanical reproduction but a transformation of thought itself. Ideas that had been confined to monastery walls now traveled roads and rivers. A farmer's son in Lyon could read the same words as a bishop in Rome. The printing press did not just spread knowledge — it changed what knowledge meant. It became democratic, portable, dangerous.

The columns of early printed books mimicked the manuscripts they replaced: wide margins for annotation, generous leading between lines, text blocks that breathed. Aldus Manutius in Venice invented italic type and the pocket book. Robert Estienne numbered the verses of the Bible. Each innovation was a small revolution in how the eye moved across the page.

By the eighteenth century, newspapers had compressed language into narrow columns — information dense as city blocks, headlines shouting above the fold. The broadsheet became the rhythm of daily life. Morning light, coffee, ink-stained fingers turning pages that would be yesterday by noon.

The magazine era brought illustration and white space back into conversation with text. Pull quotes floated in margins like marginalia reborn. Photography arrived and demanded its place alongside words. Layouts became compositional, editorial — every spread a considered arrangement of seeing and reading.

The digital age collapsed the column. Text reflowed to fill whatever vessel held it: a desktop monitor, a laptop screen, a phone in your palm. Typography became responsive, fluid, untethered from the physical page. The reader scrolled instead of turning. The infinite canvas replaced the finite leaf.

And still the fundamental act persists: symbols arranged in sequence, decoded by a mind trained to find meaning in marks. From Gutenberg's press to this glowing rectangle, the work continues — setting words in order, making thought visible, believing that what we write might outlast the vessels that carry it.`

// --- DOM references ---
const page = document.getElementById('page')
const slider = document.getElementById('slider')
const yearDisplay = document.getElementById('year-display')
const eraLabel = document.getElementById('era-label')

// --- Era definitions ---
const ERAS = [
  { year: 1440, name: 'Incunabula', columns: 1, fontSize: 19, lineHeight: 30, marginX: 0.2, marginTop: 0.12, colGap: 0, dropCap: true, pullQuote: false, headline: false, imageBlock: false, font: 'Cormorant Garamond', fontFallback: 'Georgia, serif', headlineFont: 'Cormorant Garamond', textColor: '#3a3020', bgColor: '#f0e6d0', ornamentColor: '#6b5c3e', ruleColor: 'rgba(58,48,32,0.12)' },
  { year: 1500, name: 'Renaissance Print', columns: 2, fontSize: 15, lineHeight: 24, marginX: 0.1, marginTop: 0.08, colGap: 30, dropCap: false, pullQuote: false, headline: false, imageBlock: false, font: 'EB Garamond', fontFallback: 'Georgia, serif', headlineFont: 'EB Garamond', textColor: '#2e2a22', bgColor: '#ede6d6', ornamentColor: '#5a5040', ruleColor: 'rgba(46,42,34,0.1)' },
  { year: 1700, name: 'The Broadsheet Age', columns: 3, fontSize: 13, lineHeight: 20, marginX: 0.05, marginTop: 0.06, colGap: 20, dropCap: false, pullQuote: false, headline: true, imageBlock: false, font: 'Fraunces', fontFallback: 'Georgia, serif', headlineFont: 'Playfair Display', textColor: '#1a1a1a', bgColor: '#e8e0d0', ornamentColor: '#4a4438', ruleColor: 'rgba(26,26,26,0.15)' },
  { year: 1900, name: 'Editorial & Magazine', columns: 2, fontSize: 15, lineHeight: 24, marginX: 0.08, marginTop: 0.08, colGap: 36, dropCap: true, pullQuote: true, headline: false, imageBlock: true, font: 'Fraunces', fontFallback: 'Georgia, serif', headlineFont: 'Fraunces', textColor: '#2C2C2C', bgColor: '#f5f0e8', ornamentColor: '#6a5a44', ruleColor: 'rgba(44,44,44,0.1)' },
  { year: 1960, name: 'Modernist Typography', columns: 1, fontSize: 17, lineHeight: 28, marginX: 0.18, marginTop: 0.1, colGap: 0, dropCap: false, pullQuote: false, headline: false, imageBlock: false, font: 'Inter', fontFallback: 'system-ui, sans-serif', headlineFont: 'Inter', textColor: '#1a1a1a', bgColor: '#ffffff', ornamentColor: '#cccccc', ruleColor: 'rgba(0,0,0,0.08)' },
  { year: 2000, name: 'The Infinite Scroll', columns: 1, fontSize: 20, lineHeight: 34, marginX: 0.25, marginTop: 0.08, colGap: 0, dropCap: false, pullQuote: false, headline: false, imageBlock: false, font: 'system-ui', fontFallback: '-apple-system, Helvetica Neue, sans-serif', headlineFont: 'system-ui', textColor: '#2C2C2C', bgColor: '#FAF9F6', ornamentColor: '#e0ddd8', ruleColor: 'rgba(44,44,44,0.06)' },
]

function lerp(a, b, t) { return a + (b - a) * t }

function lerpColor(hexA, hexB, t) {
  const parse = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]
  const [r1,g1,b1] = parse(hexA)
  const [r2,g2,b2] = parse(hexB)
  const r = Math.round(lerp(r1,r2,t))
  const g = Math.round(lerp(g1,g2,t))
  const b = Math.round(lerp(b1,b2,t))
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`
}

function getEraParams(year) {
  let i = 0
  for (; i < ERAS.length - 1; i++) {
    if (year < ERAS[i + 1].year) break
  }
  if (i >= ERAS.length - 1) return { ...ERAS[ERAS.length - 1] }

  const eraA = ERAS[i]
  const eraB = ERAS[i + 1]
  const t = (year - eraA.year) / (eraB.year - eraA.year)
  const st = t * t * (3 - 2 * t)

  return {
    columns: Math.round(lerp(eraA.columns, eraB.columns, st)),
    fontSize: lerp(eraA.fontSize, eraB.fontSize, st),
    lineHeight: lerp(eraA.lineHeight, eraB.lineHeight, st),
    marginX: lerp(eraA.marginX, eraB.marginX, st),
    marginTop: lerp(eraA.marginTop, eraB.marginTop, st),
    colGap: lerp(eraA.colGap, eraB.colGap, st),
    dropCap: st < 0.5 ? eraA.dropCap : eraB.dropCap,
    pullQuote: st < 0.5 ? eraA.pullQuote : eraB.pullQuote,
    headline: st < 0.5 ? eraA.headline : eraB.headline,
    imageBlock: st < 0.5 ? eraA.imageBlock : eraB.imageBlock,
    font: st < 0.5 ? eraA.font : eraB.font,
    fontFallback: st < 0.5 ? eraA.fontFallback : eraB.fontFallback,
    headlineFont: st < 0.5 ? eraA.headlineFont : eraB.headlineFont,
    name: st < 0.5 ? eraA.name : eraB.name,
    textColor: lerpColor(eraA.textColor, eraB.textColor, st),
    bgColor: lerpColor(eraA.bgColor, eraB.bgColor, st),
    ornamentColor: eraA.ornamentColor,
    ruleColor: st < 0.5 ? eraA.ruleColor : eraB.ruleColor,
  }
}

// --- Pretext preparation cache ---
const preparedCache = new Map()
function getPrepared(text, fontStr) {
  const key = text.slice(0, 40) + '|' + fontStr
  if (!preparedCache.has(key)) {
    preparedCache.set(key, prepareWithSegments(text, fontStr))
  }
  return preparedCache.get(key)
}

// Pull quote & headline text
const PULL_QUOTE = 'Language might be multiplied without diminishing.'
const HEADLINE_TEXT = 'THE GUTENBERG PRESS'
const HEADLINE_SUB = 'How Movable Type Remade the Western World'

// --- SVG ornament path data ---
function createOrnamentSVG(color, alpha, flip) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg')
  svg.setAttribute('width', '28')
  svg.setAttribute('height', '20')
  svg.setAttribute('viewBox', '-2 -6 28 22')
  svg.style.opacity = alpha * 0.3

  const transform = flip ? 'scale(-1,1) translate(-24,0)' : ''

  const p1 = document.createElementNS('http://www.w3.org/2000/svg', 'path')
  p1.setAttribute('d', 'M0,0 C8,-4 16,-2 20,4 C24,10 18,14 12,10 C6,6 10,2 14,4')
  p1.setAttribute('fill', 'none')
  p1.setAttribute('stroke', color)
  p1.setAttribute('stroke-width', '1')
  if (transform) p1.setAttribute('transform', transform)

  const p2 = document.createElementNS('http://www.w3.org/2000/svg', 'path')
  p2.setAttribute('d', 'M0,0 C6,2 12,8 10,14')
  p2.setAttribute('fill', 'none')
  p2.setAttribute('stroke', color)
  p2.setAttribute('stroke-width', '1')
  if (transform) p2.setAttribute('transform', transform)

  svg.appendChild(p1)
  svg.appendChild(p2)
  return svg
}

// --- Main render (DOM-based) ---
function render() {
  const wrap = document.getElementById('page-wrap')
  const w = wrap.clientWidth
  const h = wrap.clientHeight

  const year = parseInt(slider.value)
  const p = getEraParams(year)

  // Clear previous content
  page.innerHTML = ''

  // Set page background
  page.style.backgroundColor = p.bgColor

  const marginX = Math.round(w * p.marginX)
  const marginTop = Math.round(h * p.marginTop)
  const contentWidth = w - marginX * 2
  const contentHeight = h - marginTop - 40
  const colWidth = (contentWidth - p.colGap * (p.columns - 1)) / p.columns
  const fontSize = Math.round(p.fontSize)
  const lineHeight = Math.round(p.lineHeight)
  const fontStr = `${fontSize}px "${p.font}", ${p.fontFallback}`
  const fontFamily = `"${p.font}", ${p.fontFallback}`

  // --- Decorative rules (SVG layer) ---
  const rulesSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg')
  rulesSvg.setAttribute('width', w)
  rulesSvg.setAttribute('height', h)
  rulesSvg.style.position = 'absolute'
  rulesSvg.style.left = '0'
  rulesSvg.style.top = '0'
  rulesSvg.style.pointerEvents = 'none'
  rulesSvg.style.zIndex = '0'

  // Top decorative rule
  const topRule = document.createElementNS('http://www.w3.org/2000/svg', 'line')
  topRule.setAttribute('x1', marginX)
  topRule.setAttribute('y1', marginTop - 8)
  topRule.setAttribute('x2', w - marginX)
  topRule.setAttribute('y2', marginTop - 8)
  topRule.setAttribute('stroke', p.ruleColor)
  topRule.setAttribute('stroke-width', '0.5')
  rulesSvg.appendChild(topRule)

  // Bottom decorative rule
  const bottomRule = document.createElementNS('http://www.w3.org/2000/svg', 'line')
  bottomRule.setAttribute('x1', marginX)
  bottomRule.setAttribute('y1', marginTop + contentHeight + 4)
  bottomRule.setAttribute('x2', w - marginX)
  bottomRule.setAttribute('y2', marginTop + contentHeight + 4)
  bottomRule.setAttribute('stroke', p.ruleColor)
  bottomRule.setAttribute('stroke-width', '0.5')
  rulesSvg.appendChild(bottomRule)

  // Column separator rules
  for (let c = 1; c < p.columns; c++) {
    const colX = marginX + c * (colWidth + p.colGap)
    const ruleX = colX - p.colGap / 2
    const colRule = document.createElementNS('http://www.w3.org/2000/svg', 'line')
    colRule.setAttribute('x1', ruleX)
    colRule.setAttribute('y1', marginTop)
    colRule.setAttribute('x2', ruleX)
    colRule.setAttribute('y2', marginTop + contentHeight)
    colRule.setAttribute('stroke', p.ruleColor)
    colRule.setAttribute('stroke-width', '0.5')
    rulesSvg.appendChild(colRule)
  }

  page.appendChild(rulesSvg)

  // --- Corner ornaments (early eras) ---
  if (year < 1600) {
    const ornAlpha = Math.max(0, 1 - (year - 1440) / 160)

    const ornLeft = createOrnamentSVG(p.ornamentColor, ornAlpha, false)
    ornLeft.classList.add('ornament-svg')
    ornLeft.style.left = (marginX - 4) + 'px'
    ornLeft.style.top = (marginTop - 16) + 'px'
    page.appendChild(ornLeft)

    const ornRight = createOrnamentSVG(p.ornamentColor, ornAlpha, true)
    ornRight.classList.add('ornament-svg')
    ornRight.style.left = (w - marginX + 4 - 28) + 'px'
    ornRight.style.top = (marginTop - 16) + 'px'
    page.appendChild(ornRight)
  }

  // --- Headline (newspaper era) ---
  let headlineOffset = 0
  if (p.headline) {
    const headFontSize = Math.round(fontSize * 2.2)
    const subFontSize = Math.round(fontSize * 1.1)

    const headBlock = document.createElement('div')
    headBlock.className = 'headline-block'
    headBlock.style.top = marginTop + 'px'
    headBlock.style.left = marginX + 'px'
    headBlock.style.right = marginX + 'px'
    headBlock.style.width = contentWidth + 'px'

    const headMain = document.createElement('div')
    headMain.className = 'headline-main'
    headMain.style.fontFamily = `"${p.headlineFont}", ${p.fontFallback}`
    headMain.style.fontSize = headFontSize + 'px'
    headMain.style.color = p.textColor
    headMain.style.lineHeight = '1.1'
    headMain.textContent = HEADLINE_TEXT
    headBlock.appendChild(headMain)

    const headSub = document.createElement('div')
    headSub.className = 'headline-sub'
    headSub.style.fontFamily = fontFamily
    headSub.style.fontSize = subFontSize + 'px'
    headSub.style.color = p.textColor
    headSub.style.marginTop = '8px'
    headSub.textContent = HEADLINE_SUB
    headBlock.appendChild(headSub)

    page.appendChild(headBlock)

    headlineOffset = headFontSize + subFontSize + 32

    // Headline rule (in SVG layer)
    const hRule = document.createElementNS('http://www.w3.org/2000/svg', 'line')
    const hRuleY = marginTop + headFontSize + subFontSize + 20
    hRule.setAttribute('x1', marginX)
    hRule.setAttribute('y1', hRuleY)
    hRule.setAttribute('x2', w - marginX)
    hRule.setAttribute('y2', hRuleY)
    hRule.setAttribute('stroke', p.ruleColor)
    hRule.setAttribute('stroke-width', '1')
    rulesSvg.appendChild(hRule)
  }

  // --- Image block (magazine era) ---
  let imageBlock = null
  if (p.imageBlock) {
    imageBlock = {
      col: 1,
      top: 60,
      width: colWidth,
      height: Math.round(colWidth * 0.6),
    }

    const imgColX = marginX + imageBlock.col * (colWidth + p.colGap)
    const imgY = marginTop + headlineOffset + imageBlock.top

    const imgEl = document.createElement('div')
    imgEl.className = 'image-block'
    imgEl.style.left = imgColX + 'px'
    imgEl.style.top = imgY + 'px'
    imgEl.style.width = imageBlock.width + 'px'
    imgEl.style.height = imageBlock.height + 'px'

    const imgInner = document.createElement('div')
    imgInner.className = 'image-block-inner'
    imgEl.appendChild(imgInner)

    const caption = document.createElement('div')
    caption.className = 'image-caption'
    caption.style.fontFamily = fontFamily
    caption.style.fontSize = Math.round(fontSize * 0.75) + 'px'
    caption.style.color = p.textColor
    caption.textContent = 'A compositor at his type case, circa 1900'
    imgEl.appendChild(caption)

    page.appendChild(imgEl)
  }

  // --- Pull quote (magazine era) ---
  let pullQuoteArea = null
  if (p.pullQuote) {
    pullQuoteArea = {
      col: 0,
      topLine: 8,
      lines: 5,
    }

    const pqFontSize = Math.round(fontSize * 1.6)
    const pqLineH = Math.round(pqFontSize * 1.45)
    const pqColX = marginX + pullQuoteArea.col * (colWidth + p.colGap)
    const pqY = marginTop + headlineOffset + pullQuoteArea.topLine * lineHeight
    const pqHeight = pullQuoteArea.lines * lineHeight
    const pqFontStr = `italic ${pqFontSize}px "${p.headlineFont}", ${p.fontFallback}`

    const pqEl = document.createElement('div')
    pqEl.className = 'pull-quote'
    pqEl.style.left = pqColX + 'px'
    pqEl.style.top = pqY + 'px'
    pqEl.style.width = colWidth + 'px'
    pqEl.style.height = pqHeight + 'px'

    // Left rule bar
    const pqRule = document.createElement('div')
    pqRule.className = 'pull-quote-rule'
    pqRule.style.backgroundColor = p.textColor
    pqEl.appendChild(pqRule)

    // Layout pull quote text with pretext
    const pqPrepared = getPrepared(PULL_QUOTE, pqFontStr)
    let pqCursor = { segmentIndex: 0, graphemeIndex: 0 }
    let pqLineY = 0

    while (true) {
      const line = layoutNextLine(pqPrepared, pqCursor, colWidth - 16)
      if (!line) break

      const pqLine = document.createElement('div')
      pqLine.className = 'pq-line'
      pqLine.style.left = '12px'
      pqLine.style.top = pqLineY + 'px'
      pqLine.style.fontFamily = `"${p.headlineFont}", ${p.fontFallback}`
      pqLine.style.fontStyle = 'italic'
      pqLine.style.fontSize = pqFontSize + 'px'
      pqLine.style.lineHeight = pqLineH + 'px'
      pqLine.style.color = p.textColor
      pqLine.textContent = line.text
      pqEl.appendChild(pqLine)

      pqCursor = line.end
      pqLineY += pqLineH
    }

    page.appendChild(pqEl)
  }

  // --- Prepare text with pretext ---
  const prepared = getPrepared(ARTICLE_TEXT, fontStr)

  // --- Layout text into columns as DOM elements ---
  let cursor = { segmentIndex: 0, graphemeIndex: 0 }
  const maxY = contentHeight - lineHeight

  let dropCapDone = false
  let isFirstLine = true

  for (let col = 0; col < p.columns; col++) {
    const colX = marginX + col * (colWidth + p.colGap)

    const colEl = document.createElement('div')
    colEl.className = 'column'
    colEl.style.left = colX + 'px'
    colEl.style.top = (marginTop + headlineOffset) + 'px'
    colEl.style.width = colWidth + 'px'
    colEl.style.height = (maxY) + 'px'

    let y = 0
    let lineIndex = 0

    while (y < maxY) {
      let skipLine = false

      // Check pull quote exclusion zone
      if (pullQuoteArea && col === pullQuoteArea.col) {
        const pqYRel = pullQuoteArea.topLine * lineHeight
        const pqHeightRel = pullQuoteArea.lines * lineHeight
        if (y >= pqYRel - lineHeight && y < pqYRel + pqHeightRel + lineHeight) {
          skipLine = true
        }
      }

      // Check image block exclusion zone
      if (imageBlock && col === imageBlock.col) {
        const imgYRel = imageBlock.top
        const imgBottom = imgYRel + imageBlock.height + 24
        if (y + lineHeight > imgYRel && y < imgBottom) {
          skipLine = true
        }
      }

      if (skipLine) {
        y += lineHeight
        lineIndex++
        continue
      }

      const effectiveWidth = colWidth

      // Drop cap handling
      if (p.dropCap && isFirstLine && !dropCapDone && col === 0) {
        dropCapDone = true
        isFirstLine = false

        const line = layoutNextLine(prepared, cursor, effectiveWidth)
        if (!line) break

        const dcChar = line.text.charAt(0)
        const dcFontSize = Math.round(fontSize * 3.8)
        // We need to measure the drop cap width - use a temp span
        const dcMeasure = document.createElement('span')
        dcMeasure.style.font = `600 ${dcFontSize}px ${fontFamily}`
        dcMeasure.style.position = 'absolute'
        dcMeasure.style.visibility = 'hidden'
        dcMeasure.textContent = dcChar
        document.body.appendChild(dcMeasure)
        const dcWidth = dcMeasure.offsetWidth + 6
        document.body.removeChild(dcMeasure)

        // Drop cap element
        const dcEl = document.createElement('div')
        dcEl.className = 'drop-cap'
        dcEl.style.left = '0px'
        dcEl.style.top = y + 'px'
        dcEl.style.fontSize = dcFontSize + 'px'
        dcEl.style.fontFamily = fontFamily
        dcEl.style.color = p.textColor
        dcEl.style.lineHeight = (lineHeight * 3.5) + 'px'
        dcEl.textContent = dcChar
        colEl.appendChild(dcEl)

        // First line (rest of text after drop cap char)
        const restText = line.text.substring(1).trimStart()
        const firstLineEl = document.createElement('div')
        firstLineEl.className = 'text-line'
        firstLineEl.style.top = y + 'px'
        firstLineEl.style.left = dcWidth + 'px'
        firstLineEl.style.fontFamily = fontFamily
        firstLineEl.style.fontSize = fontSize + 'px'
        firstLineEl.style.lineHeight = lineHeight + 'px'
        firstLineEl.style.color = p.textColor
        firstLineEl.textContent = restText
        colEl.appendChild(firstLineEl)

        cursor = line.end
        y += lineHeight

        // Indented lines next to drop cap
        const dcLines = 3
        for (let dl = 0; dl < dcLines && y < maxY; dl++) {
          const indentLine = layoutNextLine(prepared, cursor, effectiveWidth - dcWidth)
          if (!indentLine) break

          const lineEl = document.createElement('div')
          lineEl.className = 'text-line'
          lineEl.style.top = y + 'px'
          lineEl.style.left = dcWidth + 'px'
          lineEl.style.fontFamily = fontFamily
          lineEl.style.fontSize = fontSize + 'px'
          lineEl.style.lineHeight = lineHeight + 'px'
          lineEl.style.color = p.textColor
          lineEl.textContent = indentLine.text
          colEl.appendChild(lineEl)

          cursor = indentLine.end
          y += lineHeight
        }
        lineIndex += dcLines + 1
        continue
      }

      isFirstLine = false

      const line = layoutNextLine(prepared, cursor, effectiveWidth)
      if (!line) break

      const lineEl = document.createElement('div')
      lineEl.className = 'text-line'
      lineEl.style.top = y + 'px'
      lineEl.style.fontFamily = fontFamily
      lineEl.style.fontSize = fontSize + 'px'
      lineEl.style.lineHeight = lineHeight + 'px'
      lineEl.style.color = p.textColor
      lineEl.textContent = line.text
      colEl.appendChild(lineEl)

      cursor = line.end
      y += lineHeight
      lineIndex++
    }

    page.appendChild(colEl)
  }
}

// --- Event handling with rAF throttle ---
let renderPending = false
function scheduleRender() {
  if (!renderPending) {
    renderPending = true
    requestAnimationFrame(() => {
      renderPending = false
      render()
    })
  }
}

slider.addEventListener('input', () => {
  const year = parseInt(slider.value)
  yearDisplay.textContent = year
  eraLabel.textContent = getEraParams(year).name
  scheduleRender()
})

// Initialize era label
eraLabel.textContent = getEraParams(parseInt(slider.value)).name

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
    slider.value = Math.min(2026, parseInt(slider.value) + 1)
    slider.dispatchEvent(new Event('input'))
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
    slider.value = Math.max(1440, parseInt(slider.value) - 1)
    slider.dispatchEvent(new Event('input'))
  }
})

// Resize handling
window.addEventListener('resize', () => scheduleRender())

// Wait for fonts to load before first render
document.fonts.ready.then(() => {
  preparedCache.clear()
  render()
})
render()
</script>
</body>
</html>
