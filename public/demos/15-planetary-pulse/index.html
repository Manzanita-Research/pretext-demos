 atmosphere but the instruments were young and the data was sparse and the world was busy building railroads and telegraph lines and electrical grids. Carbon dioxide was a known gas. Arrhenius had done the math. But math and consequence live in different time zones and the distance between a calculation on paper and a warming planet was still measured in generations nobody alive would see. The first world war burned through Europe and the smoke mixed with the ordinary clouds. The twenties roared on coal and oil and the exuberance of a species that had learned to fly. The numbers barely moved. A tenth of a degree here. A cold year there. The signal was still buried. The Depression slowed the factories and for a few years the air over Pittsburgh and Manchester and the Ruhr Valley thinned slightly and the rivers ran a little cleaner before the next war demanded everything the forges could produce. Then the atmosphere began to shift. Not dramatically. Not yet. But the running average started to lift off the baseline like a plane taxiing before anyone notices it has left the ground. Something was different in the arithmetic of heat. The postwar boom poured concrete across three continents and the cars multiplied and the suburbs spread and the power plants burned around the clock to feed the appetite of a species discovering convenience. Charles David Keeling drove to the top of Mauna Loa and started counting carbon dioxide molecules with a precision nobody had attempted before. Three hundred and fifteen parts per million. He kept counting. Three sixteen. Three seventeen. The line went up. It did not come back down. The sixties and seventies brought the first warnings that carried weight. Rachel Carson wrote about silence in spring. The Cuyahoga River caught fire. Scientists began to see the curve bending upward in their temperature records, a slow arc that was starting to look less like noise and more like a trend. The first Earth Day drew millions into the streets. The ozone layer developed a hole over Antarctica and the world actually cooperated to fix it, which proved that collective action was possible when the evidence was clear and the political will existed. But carbon dioxide was a harder problem. It was not a single chemical from a single industry. It was everything. It was how the world ran. The eighties arrived and the warmth became undeniable. James Hansen testified before Congress that the greenhouse effect was here, not theoretical, not future tense, but present and measurable and accelerating. The ten warmest years in the instrumental record started stacking up like a hand of cards dealt from a loaded deck. The glaciers were retreating visibly now, leaving behind moraines and meltwater lakes where ice had been for millennia. Coral reefs began to bleach in water too warm for the algae that gave them color and life. The Arctic sea ice started its long decline, each summer melting further than models had predicted. The numbers stopped pretending. Each year warmer than the last in the running average. Each decade a new record. The nineties brought the Kyoto Protocol and the first serious attempt to put a framework around emissions reductions, and it was not enough, and everyone who looked at the data honestly knew it was not enough. The permafrost began to thaw. Methane bubbled up from Siberian lakes. The West Antarctic ice sheet showed signs of instability that glaciologists had warned about for decades. The sea level kept rising. Millimeters per year that added up to centimeters per decade that would become meters per century if the trajectories held. The new millennium opened with the warmest year in the instrumental record and then broke that record and broke it again. Hurricane seasons intensified. Wildfire seasons lengthened until the word season stopped making sense because the fires burned year-round. The Arctic was warming three times faster than the global average. Greenland lost ice mass measured in gigatons. The heat was not abstract anymore. It was the farmer in the Sahel watching the rains fail. It was the coastal city planning for a flood line that moved upward with each new projection. It was the insect populations collapsing quietly while we argued about the data. Every fraction of a degree mattered now in ways that would have seemed theoretical a generation ago. The Paris Agreement set targets. One point five degrees. Two degrees. Lines in the sand drawn by diplomats who understood the physics even when the politics lagged behind. The world began to build wind farms and solar arrays at a pace that surprised even the optimists, and the emissions kept rising because the system had momentum and momentum does not care about intentions. Twenty-twenty brought a pandemic that grounded the planes and emptied the highways and for a few weeks the satellite data showed the sky clearing over cities that had not seen clean air in decades, and then it all came back. The last ten years shattered every record. Heat domes settled over cities built for rain. Ocean temperatures hit levels that made marine biologists stare at their instruments and check the calibration twice. The Antarctic recorded temperatures sixty degrees above normal. The Canadian wildfire season burned an area larger than some countries. Each data point a year. Each year a choice made and a consequence delivered. The line on the graph is not a prediction anymore. It is a measurement of what we have already done. The atmosphere does not negotiate. The physics is not partisan. The ice does not care about quarterly earnings. The question was never whether the planet would survive. It always has. The question is what kind of earth we leave behind and whether the word winter will mean what it meant to us or become something our grandchildren learn about from books. We are still writing this story. The next line has not been set yet.`

// --- Manzanita brand colors for temperature gradient ---
function tempColor(anomaly) {
  const t = (anomaly + 0.5) / 1.8
  const clamped = Math.max(0, Math.min(1, t))

  if (clamped < 0.3) {
    const s = clamped / 0.3
    const r = Math.round(50 + s * 57)
    const g = Math.round(80 + s * 47)
    const b = Math.round(70 + s * 24)
    return `rgb(${r}, ${g}, ${b})`
  } else if (clamped < 0.5) {
    const s = (clamped - 0.3) / 0.2
    const r = Math.round(107 + s * 89)
    const g = Math.round(127 + s * 27)
    const b = Math.round(94 - s * 36)
    return `rgb(${r}, ${g}, ${b})`
  } else if (clamped < 0.75) {
    const s = (clamped - 0.5) / 0.25
    const r = Math.round(196)
    const g = Math.round(154 - s * 61)
    const b = Math.round(58 + s * 4)
    return `rgb(${r}, ${g}, ${b})`
  } else {
    const s = (clamped - 0.75) / 0.25
    const r = Math.round(196 + s * 24)
    const g = Math.round(93 - s * 43)
    const b = Math.round(62 - s * 22)
    return `rgb(${r}, ${g}, ${b})`
  }
}

function co2Color(ppm) {
  const t = (ppm - 288) / (442 - 288)
  const clamped = Math.max(0, Math.min(1, t))

  if (clamped < 0.4) {
    const s = clamped / 0.4
    const r = Math.round(50 + s * 57)
    const g = Math.round(80 + s * 47)
    const b = Math.round(70 + s * 24)
    return `rgb(${r}, ${g}, ${b})`
  } else if (clamped < 0.7) {
    const s = (clamped - 0.4) / 0.3
    const r = Math.round(107 + s * 89)
    const g = Math.round(127 + s * 27)
    const b = Math.round(94 - s * 36)
    return `rgb(${r}, ${g}, ${b})`
  } else {
    const s = (clamped - 0.7) / 0.3
    const r = Math.round(196 + s * 24)
    const g = Math.round(154 - s * 104)
    const b = Math.round(58 - s * 18)
    return `rgb(${r}, ${g}, ${b})`
  }
}

function seaLevelColor(mm) {
  const t = (mm - (-150)) / (115 - (-150))
  const clamped = Math.max(0, Math.min(1, t))

  if (clamped < 0.35) {
    const s = clamped / 0.35
    const r = Math.round(55 + s * 52)
    const g = Math.round(85 + s * 42)
    const b = Math.round(65 + s * 29)
    return `rgb(${r}, ${g}, ${b})`
  } else if (clamped < 0.65) {
    const s = (clamped - 0.35) / 0.3
    const r = Math.round(107 + s * 89)
    const g = Math.round(127 + s * 27)
    const b = Math.round(94 - s * 36)
    return `rgb(${r}, ${g}, ${b})`
  } else {
    const s = (clamped - 0.65) / 0.35
    const r = Math.round(196 + s * 14)
    const g = Math.round(154 - s * 82)
    const b = Math.round(58 - s * 13)
    return `rgb(${r}, ${g}, ${b})`
  }
}

// --- Data normalization for width mapping ---
function getWidthForIndex(i, data, minWidth, maxWidth, breathOffset) {
  let normalized
  if (activeDataset === 'temp') {
    normalized = (data[i] - (-0.5)) / (1.3 - (-0.5))
  } else if (activeDataset === 'co2') {
    normalized = (data[i] - 288) / (444 - 288)
  } else {
    normalized = (data[i] - (-150)) / (115 - (-150))
  }
  normalized = Math.max(0, Math.min(1, normalized))
  const curved = Math.pow(normalized, 0.6)
  return minWidth + curved * (maxWidth - minWidth) + breathOffset
}

function getColorForIndex(i, data) {
  if (activeDataset === 'temp') return tempColor(data[i])
  if (activeDataset === 'co2') return co2Color(data[i])
  return seaLevelColor(data[i])
}

function getLabelForIndex(i, data) {
  if (activeDataset === 'temp') {
    const v = data[i]
    const sign = v >= 0 ? '+' : ''
    return sign + v.toFixed(2) + ' \u00b0C anomaly'
  } else if (activeDataset === 'co2') {
    return data[i] + ' ppm CO\u2082'
  } else {
    const v = data[i]
    const sign = v >= 0 ? '+' : ''
    return sign + v + ' mm sea level'
  }
}

  const numLines = data.length

  const totalTextHeight = numLines * lineHeight
  const marginTop = Math.max(70, (H - totalTextHeight) / 2)
  const layoutMaxWidth = Math.min(W - 120, 700)
  const layoutMinWidth = layoutMaxWidth * 0.15

  // Clear previous
  linesArea.innerHTML = ''
  lineElements = []
  labelElements = []
  tickElements = []

  linesArea.style.paddingTop = marginTop + 'px'

  // Use pretext for line breaking at the MAX width (we'll visually constrain via CSS width)
  // Actually, we need per-line widths for accurate line breaking
  let cursor = { segmentIndex: 0, graphemeIndex: 0 }

  for (let i = 0; i < numLines; i++) {
    const width = getWidthForIndex(i, data, layoutMinWidth, layoutMaxWidth, 0)
    const clampedWidth = Math.max(80, Math.min(width, layoutMaxWidth))

    const line = layoutNextLine(prepared, cursor, clampedWidth)
    if (!line) break

    const color = getColorForIndex(i, data)
    const year = START_YEAR + i

    // Create line div
    const lineDiv = document.createElement('div')
    lineDiv.className = 'text-line'
    lineDiv.style.width = clampedWidth + 'px'
    lineDiv.style.color = color
    lineDiv.setAttribute('data-index', i)
    lineDiv.setAttribute('role', 'text')
    lineDiv.setAttribute('aria-label', `${year}: ${line.text}`)

    // Hover background
    const hoverBg = document.createElement('div')
    hoverBg.className = 'hover-bg'
    hoverBg.style.background = color.replace('rgb', 'rgba').replace(')', ', 0.1)')
    lineDiv.appendChild(hoverBg)

    // Text content span
    const textSpan = document.createElement('span')
    textSpan.className = 'text-line-content'
    textSpan.textContent = line.text
    lineDiv.appendChild(textSpan)

    // Hover events for tooltip
    lineDiv.addEventListener('mouseenter', (e) => showTooltip(i, e))
    lineDiv.addEventListener('mousemove', (e) => moveTooltip(e))
    lineDiv.addEventListener('mouseleave', hideTooltip)

    linesArea.appendChild(lineDiv)
    lineElements.push({ el: lineDiv, hoverBg, textSpan, lineText: line.text, lineEnd: line.end })

    cursor = line.end

    // Year labels for decades and endpoints
    const isDecade = year % 10 === 0
    const isEndpoint = i === 0 || i === numLines - 1

    if (isDecade || isEndpoint) {
      const label = document.createElement('div')
      label.className = 'year-label' + (isEndpoint && !isDecade ? ' endpoint' : '')
      label.textContent = year.toString()
      label.style.top = (marginTop + i * lineHeight + 1) + 'px'
      // Position label to the left of the max-width area
      const labelRight = (W + layoutMaxWidth) / 2 + 12
      label.style.right = labelRight + 'px'
      label.style.width = '40px'
      linesArea.appendChild(label)
      labelElements.push({ el: label, index: i })

      // Tick marks for decades
      if (isDecade) {
        const tick = document.createElement('div')
        tick.className = 'tick-line'
        tick.style.top = (marginTop + i * lineHeight + lineHeight / 2) + 'px'
        const labelLeftEdge = W - labelRight
        const lineLeftEdge = (W - clampedWidth) / 2
        tick.style.left = (labelLeftEdge + 44) + 'px'
        tick.style.width = Math.max(0, lineLeftEdge - labelLeftEdge - 46) + 'px'
        linesArea.appendChild(tick)
        tickElements.push({ el: tick, index: i })
      }
    }
  }

  builtForDataset = activeDataset
}

// --- Update widths and colors during breath animation (no DOM rebuild) ---
function updateBreath() {
  const wrap = document.getElementById('text-wrap')
  const W = wrap.clientWidth
  const H = wrap.clientHeight

  const data = activeDataset === 'temp' ? tempAnomalies : activeDataset === 'co2' ? co2Data : seaLevelData
  const layoutMaxWidth = Math.min(W - 120, 700)
  const layoutMinWidth = layoutMaxWidth * 0.15
  const breathAmount = 2

  lineWidths = []
  lineYPositions = []

  const totalTextHeight = lineElements.length * lineHeight
  const marginTop = Math.max(70, (H - totalTextHeight) / 2)

  for (let i = 0; i < lineElements.length; i++) {
    const perLineBreath = Math.sin(breathPhase + i * 0.08) * breathAmount
    const width = getWidthForIndex(i, data, layoutMinWidth, layoutMaxWidth, perLineBreath)
    const clampedWidth = Math.max(80, Math.min(width, layoutMaxWidth))

    lineElements[i].el.style.width = clampedWidth + 'px'
    lineWidths.push(clampedWidth)
    lineYPositions.push(marginTop + i * lineHeight)
  }

  // Update SVG overlay
  updateSVG(W, H, layoutMaxWidth, marginTop)
}

// --- SVG silhouette and mini chart ---
function updateSVG(W, H, layoutMaxWidth, marginTop) {
  if (lineWidths.length < 2) return

  const data = activeDataset === 'temp' ? tempAnomalies : activeDataset === 'co2' ? co2Data : seaLevelData
  const svgNS = 'http://www.w3.org/2000/svg'

  // Build paths
  // Left silhouette edge
  let leftPath = ''
  let rightPath = ''
  let fillPath = ''

  for (let i = 0; i < lineWidths.length; i++) {
    const xOffset = (W - lineWidths[i]) / 2
    const y = lineYPositions[i] + lineHeight / 2
    const xRight = xOffset + lineWidths[i]

    if (i === 0) {
      leftPath = `M ${xOffset} ${y}`
      rightPath = `M ${xRight} ${y}`
      fillPath = `M ${xOffset} ${y}`
    } else {
      leftPath += ` L ${xOffset} ${y}`
      rightPath += ` L ${xRight} ${y}`
      fillPath += ` L ${xOffset} ${y}`
    }
  }

  // Complete fill path (go back along right edge)
  for (let i = lineWidths.length - 1; i >= 0; i--) {
    const xOffset = (W - lineWidths[i]) / 2
    const xRight = xOffset + lineWidths[i]
    const y = lineYPositions[i] + lineHeight / 2
    fillPath += ` L ${xRight} ${y}`
  }
  fillPath += ' Z'

  // Mini chart on the right margin
  const chartX = (W + layoutMaxWidth) / 2 + 30
  const chartWidth = 40
  let miniChartPath = ''
  let showMiniChart = chartX + chartWidth < W - 10

  if (showMiniChart) {
    const chartTop = lineYPositions[0]
    const chartBottom = lineYPositions[lineYPositions.length - 1] + lineHeight

    for (let i = 0; i < lineWidths.length; i++) {
      let norm
      if (activeDataset === 'temp') {
        norm = (data[i] - (-0.5)) / (1.3 - (-0.5))
      } else if (activeDataset === 'co2') {
        norm = (data[i] - 288) / (444 - 288)
      } else {
        norm = (data[i] - (-150)) / (115 - (-150))
      }
      norm = Math.max(0, Math.min(1, norm))
      const cx = chartX + norm * chartWidth
      const cy = lineYPositions[i] + lineHeight / 2
      if (i === 0) miniChartPath = `M ${cx} ${cy}`
      else miniChartPath += ` L ${cx} ${cy}`
    }
  }

  // Build SVG content
  svgOverlay.setAttribute('viewBox', `0 0 ${W} ${H}`)
  svgOverlay.style.width = W + 'px'
  svgOverlay.style.height = H + 'px'

  let svgContent = ''

  // Fill area
  svgContent += `<path d="${fillPath}" fill="rgba(232, 228, 220, 0.02)" />`

  // Left silhouette edge
  svgContent += `<path d="${leftPath}" fill="none" stroke="rgba(232, 228, 220, 0.08)" stroke-width="1" />`

  // Right silhouette edge (the hockey stick side)
  svgContent += `<path d="${rightPath}" fill="none" stroke="rgba(232, 228, 220, 0.12)" stroke-width="1.5" />`

  // Mini chart
  if (showMiniChart) {
    const chartTop = lineYPositions[0]
    const chartBottom = lineYPositions[lineYPositions.length - 1] + lineHeight

    // Baseline
    svgContent += `<line x1="${chartX}" y1="${chartTop}" x2="${chartX}" y2="${chartBottom}" stroke="rgba(232, 228, 220, 0.06)" stroke-width="0.5" />`

    // The curve
    svgContent += `<path d="${miniChartPath}" fill="none" stroke="rgba(196, 93, 62, 0.3)" stroke-width="1.5" />`
  }

  svgOverlay.innerHTML = svgContent
}

// --- Tooltip handling ---
function showTooltip(index, e) {
  const data = activeDataset === 'temp' ? tempAnomalies : activeDataset === 'co2' ? co2Data : seaLevelData
  const year = START_YEAR + index
  const color = getColorForIndex(index, data)

  tooltipYear.textContent = year
  tooltipYear.style.color = color
  tooltipAnomaly.textContent = getLabelForIndex(index, data)
  tooltipAnomaly.style.color = color

  const ctx_text = tooltipContextData[year]
  if (ctx_text) {
    tooltipContextEl.textContent = ctx_text
    tooltipContextEl.style.display = 'block'
  } else {
    tooltipContextEl.style.display = 'none'
  }

  tooltip.classList.add('visible')
  moveTooltip(e)
}

function moveTooltip(e) {
  const wrap = document.getElementById('text-wrap')
  const wrapRect = wrap.getBoundingClientRect()
  let tx = e.clientX - wrapRect.left + 16
  let ty = e.clientY - wrapRect.top - 10
  if (tx + 200 > wrapRect.width) tx = e.clientX - wrapRect.left - 210
  if (ty < 0) ty = 10
  tooltip.style.left = tx + 'px'
  tooltip.style.top = ty + 'px'
}

function hideTooltip() {
  tooltip.classList.remove('visible')
}

// --- Dataset toggle ---
document.querySelectorAll('#dataset-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#dataset-toggle button').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    activeDataset = btn.dataset.set

    const caption = document.getElementById('caption')
    if (activeDataset === 'temp') {
      caption.innerHTML = 'Each line is one year &middot; wider = warmer &middot; NASA GISS 1880&ndash;2024'
    } else if (activeDataset === 'co2') {
      caption.innerHTML = 'Each line is one year &middot; wider = more CO\u2082 &middot; Mauna Loa / ice core 1880&ndash;2024'
    } else {
      caption.innerHTML = 'Each line is one year &middot; wider = higher seas &middot; satellite + tide gauge 1880&ndash;2024'
    }

    // Rebuild lines with new dataset (different line breaks per width)
    buildLines()
  })
})

// --- Animation loop ---
function animate() {
  breathPhase += 0.012
  updateBreath()
  animFrame = requestAnimationFrame(animate)
}

// --- Resize handler ---
function handleResize() {
  buildLines()
}

// --- Init ---
window.addEventListener('resize', handleResize)
buildLines()
animate()
</script>
