<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Tectonics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #08080e;
    font-family: Georgia, serif;
  }

  #scene {
    position: fixed; inset: 0;
    overflow: hidden;
    cursor: grab;
  }
  #scene.grabbing { cursor: grabbing; }

  /* Background fault lines — CSS-only subtle vertical stripes */
  #fault-lines {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0.012;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 69px,
      rgba(255,255,255,1) 69px,
      rgba(255,255,255,1) 70px
    );
  }

  /* Rift glow between plates */
  #rift-glow {
    position: absolute;
    top: 0; bottom: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.05s;
  }
  #rift-glow-inner {
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, rgba(210,170,60,0.3) 0%, rgba(196,154,60,0) 70%);
  }
  #rift-line {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 2px;
    margin-left: -1px;
    pointer-events: none;
    background: rgba(196,154,60,0.4);
    opacity: 0;
  }

  /* Plate containers */
  .plate {
    position: absolute;
    top: 0; left: 0;
    will-change: transform;
    padding: 14px;
    user-select: text;
    -webkit-user-select: text;
  }

  .plate-line {
    white-space: pre;
    will-change: transform, opacity;
    line-height: 22px;
    font-size: 15px;
    font-family: Georgia, serif;
  }

  .plate-a .plate-line { color: #C2714F; }
  .plate-b .plate-line { color: #8B9E7E; }

  /* Debris particles */
  .debris {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    will-change: transform, opacity;
    background: rgb(120, 70, 45);
  }

  /* HUD */
  #hud {
    position: fixed;
    bottom: 18px;
    left: 0; right: 0;
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }
  #hud-title {
    font: 10px Fraunces, Georgia;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }
  #hud-hint {
    font: 10px Fraunces, Georgia;
    color: rgba(255,255,255,0.09);
  }

  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #665544; font: 15px Fraunces, Georgia; letter-spacing: 0.04em;
    background: #08080e; z-index: 10; transition: opacity 0.8s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="loading">deep time loading...</div>
<div id="scene">
  <div id="fault-lines"></div>
  <div id="rift-glow"><div id="rift-glow-inner"></div></div>
  <div id="rift-line"></div>
  <div id="plate-a" class="plate plate-a"></div>
  <div id="plate-b" class="plate plate-b"></div>
  <div id="debris-layer"></div>
</div>
<div id="hud">
  <div id="hud-title">T E X T &nbsp; T E C T O N I C S</div>
  <div id="hud-hint">drag plates to move them</div>
</div>

<script type="module">
import { prepareWithSegments, layoutNextLine } from 'https://esm.sh/@chenglou/pretext'

// --- Geology text ---
const TEXT_A = `The earth remembers in stone. Four billion years of pressure and drift written into every fold of granite, every vein of quartz. Continents are not permanent — they are slow travelers, grinding across the mantle at the speed fingernails grow. What feels solid underfoot is a thin crust riding molten rock, cracking and healing and cracking again. The Himalayas are still rising. The Atlantic is still widening. Pangaea broke apart and its children have been wandering ever since, colliding in slow motion, building mountains where they meet.`

const TEXT_B = `Below the crust the mantle convects in loops that take a hundred million years to complete. Heat from the core drives plumes of magma upward, spreading the seafloor apart at mid-ocean ridges, pulling it back down at subduction zones. Where one plate slides beneath another, rock melts and volcanoes bloom. The Ring of Fire circles the Pacific like a scar. Earthquakes are the sound of the planet adjusting its grip. Every tremor is a sentence in a conversation between plates — a negotiation of pressure ongoing since the Hadean eon, when the first crust cooled from a sea of lava.`

const FONT_SIZE = 15
const FONT = `${FONT_SIZE}px Georgia`
const LINE_HEIGHT = 22
const PLATE_WIDTH = 400
const PAD = 14

const COLOR_A = '#C2714F'
const COLOR_B = '#8B9E7E'

const scene = document.getElementById('scene')
const plateElA = document.getElementById('plate-a')
const plateElB = document.getElementById('plate-b')
const riftGlow = document.getElementById('rift-glow')
const riftLine = document.getElementById('rift-line')
const debrisLayer = document.getElementById('debris-layer')

let W = window.innerWidth
let H = window.innerHeight

window.addEventListener('resize', () => {
  W = window.innerWidth
  H = window.innerHeight
})

// Prepare text with pretext
const prepA = prepareWithSegments(TEXT_A, FONT)
const prepB = prepareWithSegments(TEXT_B, FONT)

// Plate state
const plates = [
  { x: 0, y: 0, vx: 0.4, vy: 0, prep: prepA, el: plateElA, color: COLOR_A, lineEls: [] },
  { x: 0, y: 0, vx: -0.4, vy: 0, prep: prepB, el: plateElB, color: COLOR_B, lineEls: [] }
]

// Initialize positions off-screen
plates[0].x = -PLATE_WIDTH - 80
plates[1].x = W + 80

// Layout a plate into lines at a given width
function layoutLines(prep, width) {
  const lines = []
  let cursor = { segmentIndex: 0, graphemeIndex: 0 }
  const w = Math.max(60, width)
  while (true) {
    const line = layoutNextLine(prep, cursor, w)
    if (!line) break
    lines.push(line)
    cursor = line.end
  }
  return lines
}

function plateHeight(lineCount) {
  return lineCount * LINE_HEIGHT
}

// Ensure a plate has enough line DOM elements, reuse them
function ensureLineEls(plate, count) {
  while (plate.lineEls.length < count) {
    const div = document.createElement('div')
    div.className = 'plate-line'
    plate.el.appendChild(div)
    plate.lineEls.push(div)
  }
  // Hide extras
  for (let i = 0; i < plate.lineEls.length; i++) {
    plate.lineEls[i].style.display = i < count ? '' : 'none'
  }
}

// --- Interaction ---
let dragging = null
let dragOX = 0, dragOY = 0

scene.addEventListener('pointerdown', e => {
  const px = e.clientX
  const py = e.clientY
  // Check plates in reverse order (top first)
  for (let i = 1; i >= 0; i--) {
    const pl = plates[i]
    const lines = layoutLines(pl.prep, PLATE_WIDTH)
    const ph = plateHeight(lines.length)
    const plateY = H / 2 - ph / 2 + pl.y
    const plateLeft = pl.x
    const plateRight = pl.x + PLATE_WIDTH + PAD * 2
    if (px >= plateLeft && px <= plateRight &&
        py >= plateY - PAD && py <= plateY + ph + PAD) {
      dragging = i
      dragOX = px - pl.x
      dragOY = py - pl.y
      scene.classList.add('grabbing')
      scene.setPointerCapture(e.pointerId)
      return
    }
  }
})

scene.addEventListener('pointermove', e => {
  if (dragging !== null) {
    plates[dragging].x = e.clientX - dragOX
    plates[dragging].y = e.clientY - dragOY
    plates[dragging].vx = 0
    plates[dragging].vy = 0
  }
})

scene.addEventListener('pointerup', () => {
  dragging = null
  scene.classList.remove('grabbing')
})

// --- Quake state ---
let quakeIntensity = 0

function quakeShake() {
  if (quakeIntensity < 0.2) return { x: 0, y: 0 }
  return {
    x: (Math.random() - 0.5) * quakeIntensity * 3,
    y: (Math.random() - 0.5) * quakeIntensity * 3
  }
}

// --- Debris particles as DOM elements ---
const debris = []
const MAX_DEBRIS_ELS = 120
const debrisPool = []

function getDebrisEl() {
  if (debrisPool.length > 0) {
    const el = debrisPool.pop()
    el.style.display = ''
    return el
  }
  if (debrisLayer.children.length >= MAX_DEBRIS_ELS) return null
  const el = document.createElement('div')
  el.className = 'debris'
  debrisLayer.appendChild(el)
  return el
}

function releaseDebrisEl(el) {
  el.style.display = 'none'
  debrisPool.push(el)
}

function spawnDebris(cx, yMin, yMax, count) {
  for (let i = 0; i < count; i++) {
    const el = getDebrisEl()
    if (!el) continue
    const lifespan = 40 + Math.random() * 60
    const size = 1 + Math.random() * 2
    el.style.width = size + 'px'
    el.style.height = size + 'px'
    debris.push({
      x: cx + (Math.random() - 0.5) * 20,
      y: yMin + Math.random() * (yMax - yMin),
      vx: (Math.random() - 0.5) * 1.5,
      vy: -0.5 - Math.random() * 2,
      life: lifespan,
      maxLife: lifespan,
      el
    })
  }
}

function updateDebris() {
  for (let i = debris.length - 1; i >= 0; i--) {
    const d = debris[i]
    d.x += d.vx
    d.y += d.vy
    d.vy += 0.02
    d.life--
    const a = (d.life / d.maxLife) * 0.5
    d.el.style.transform = `translate(${d.x}px, ${d.y}px)`
    d.el.style.opacity = a
    if (d.life <= 0) {
      releaseDebrisEl(d.el)
      debris.splice(i, 1)
    }
  }
}

// --- Main loop ---
let lastCollisionSpawn = 0

function render(t) {
  // --- Physics update ---
  for (let i = 0; i < 2; i++) {
    if (dragging !== i) {
      plates[i].x += plates[i].vx
      plates[i].y += plates[i].vy
      plates[i].vy *= 0.98
    }
  }

  // Edges of the two plates facing each other
  const rightEdgeA = plates[0].x + PLATE_WIDTH + PAD * 2
  const leftEdgeB = plates[1].x
  const gap = leftEdgeB - rightEdgeA
  const overlap = -gap

  // Collision response
  if (overlap > 0) {
    if (dragging === null) {
      plates[0].vx *= 0.995
      plates[1].vx *= 0.995
      const pushForce = 0.001 + overlap * 0.00005
      plates[0].vx -= pushForce
      plates[1].vx += pushForce
      plates[0].vx = Math.max(plates[0].vx, -0.3)
      plates[1].vx = Math.min(plates[1].vx, 0.3)
    }

    quakeIntensity += overlap * 0.002
    quakeIntensity = Math.min(quakeIntensity, 10)

    // Spawn debris
    if (t - lastCollisionSpawn > 100 && overlap > 5) {
      const cx = (rightEdgeA + leftEdgeB) / 2
      const linesA = layoutLines(prepA, PLATE_WIDTH)
      const ph = plateHeight(linesA.length)
      const baseY = H / 2 - ph / 2
      spawnDebris(cx, baseY, baseY + ph, Math.min(Math.floor(overlap * 0.05), 6))
      lastCollisionSpawn = t
    }
  } else {
    // Auto-drift toward center
    if (dragging !== 0) {
      const targetA = W / 2 - PLATE_WIDTH - PAD * 2 - 10
      const diffA = targetA - plates[0].x
      plates[0].vx += diffA * 0.0001
      plates[0].vx *= 0.998
    }
    if (dragging !== 1) {
      const targetB = W / 2 + 10
      const diffB = targetB - plates[1].x
      plates[1].vx += diffB * 0.0001
      plates[1].vx *= 0.998
    }
  }

  quakeIntensity *= 0.95

  // --- Rift glow when plates separated ---
  if (gap > 15) {
    const riftL = rightEdgeA
    const riftR = leftEdgeB
    const riftW = riftR - riftL
    const intensity = Math.min(riftW * 0.001, 0.3)
    const linesA = layoutLines(prepA, PLATE_WIDTH)
    const ph = plateHeight(linesA.length)
    const baseY = H / 2 - ph / 2

    riftGlow.style.left = riftL + 'px'
    riftGlow.style.width = riftW + 'px'
    riftGlow.style.top = (baseY - 30) + 'px'
    riftGlow.style.height = (ph + 60) + 'px'
    riftGlow.style.opacity = intensity

    riftLine.style.left = (riftL + riftW / 2) + 'px'
    riftLine.style.top = (baseY - 15) + 'px'
    riftLine.style.height = (ph + 30) + 'px'
    riftLine.style.opacity = Math.min(0.5, intensity * 1.5)
  } else {
    riftGlow.style.opacity = 0
    riftLine.style.opacity = 0
  }

  // --- Render plates ---
  const overlapClamped = Math.max(0, overlap)

  for (let pi = 0; pi < 2; pi++) {
    const plate = plates[pi]

    // Compression
    const compressionRatio = overlapClamped > 0
      ? Math.max(0.4, 1 - overlapClamped / (PLATE_WIDTH * 2))
      : 1
    const effectiveW = PLATE_WIDTH * compressionRatio
    const lines = layoutLines(plate.prep, effectiveW)
    const ph = plateHeight(lines.length)
    const baseY = H / 2 - ph / 2

    const shake = quakeShake()

    const anchorX = plate.x + shake.x
    const anchorY = baseY + plate.y + shake.y

    // Position plate container
    plate.el.style.transform = `translate(${anchorX}px, ${anchorY}px)`
    plate.el.style.width = (effectiveW + PAD * 2) + 'px'

    // Ensure enough line elements
    ensureLineEls(plate, lines.length)

    for (let li = 0; li < lines.length; li++) {
      const line = lines[li]
      const lineEl = plate.lineEls[li]
      const ly = li * LINE_HEIGHT

      // Skip off-screen lines
      if (anchorY + ly < -LINE_HEIGHT * 2 || anchorY + ly > H + LINE_HEIGHT * 2) {
        lineEl.style.display = 'none'
        continue
      }
      lineEl.style.display = ''

      let dx = 0, dy = 0, sx = 1, alpha = 1, fs = FONT_SIZE

      if (overlapClamped > 0) {
        const collisionX = (rightEdgeA + leftEdgeB) / 2
        let lineCenter
        if (pi === 0) {
          lineCenter = anchorX + PAD + effectiveW
        } else {
          lineCenter = anchorX + PAD
        }

        const distFromCollision = Math.abs(lineCenter - collisionX)
        const proximity = Math.max(0, 1 - distFromCollision / (PLATE_WIDTH * 0.6))

        // Mountain building
        const mountainAmp = proximity * Math.min(overlapClamped * 0.5, 50)
        const fold = Math.sin(li * 0.8 + t * 0.0008) * proximity * 5
        const bucklePeak = Math.sin(li * 1.7) * proximity * Math.min(overlapClamped * 0.15, 12)
        dy = -mountainAmp + fold + bucklePeak

        // Horizontal crumple
        const crumpleAmt = proximity * Math.min(overlapClamped * 0.0015, 0.12)
        sx = 1 - crumpleAmt

        // Subduction: right plate slides under
        if (pi === 1 && overlapClamped > 20) {
          const subDepth = Math.min((overlapClamped - 20) / 250, 0.8)
          const subFactor = proximity * subDepth
          alpha = 1 - subFactor * 0.65
          fs = FONT_SIZE * (1 - subFactor * 0.3)
          dy += subFactor * 12
        }

        // Overthrust: left plate rides up
        if (pi === 0 && overlapClamped > 20) {
          const thrustDepth = Math.min((overlapClamped - 20) / 300, 0.5)
          const thrustFactor = proximity * thrustDepth
          dy -= thrustFactor * 8
        }

        // Seismic jitter
        if (proximity > 0.2) {
          dx += Math.sin(li * 3.1 + t * 0.004) * proximity * 1.5
        }
      }

      // Apply transform and styles to line element
      lineEl.style.transform = `translate(${dx}px, ${ly + dy}px) scaleX(${sx})`
      lineEl.style.opacity = alpha
      lineEl.style.fontSize = fs + 'px'

      // Update text content only when it changes
      const text = line.text
      if (lineEl._cachedText !== text) {
        lineEl.textContent = text
        lineEl._cachedText = text
      }
    }
  }

  // --- Debris ---
  updateDebris()

  requestAnimationFrame(render)
}

// Start
document.getElementById('loading').classList.add('hidden')
requestAnimationFrame(render)
</script>
</body>
</html>
