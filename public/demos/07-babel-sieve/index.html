<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babel Sieve</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #08080e;
    color: #c8c8d0;
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #arena {
    position: relative;
    flex: 1;
    overflow: hidden;
    cursor: crosshair;
  }

  /* Word spans */
  .word {
    position: absolute;
    top: 0;
    left: 0;
    font-family: Literata, Georgia, serif;
    font-size: 14px;
    line-height: 20px;
    white-space: nowrap;
    will-change: transform;
    pointer-events: none;
    user-select: text;
  }

  /* Sieve bar elements */
  .sieve-bar {
    position: absolute;
    top: 0;
    left: 0;
    height: 5px;
    background: rgba(155, 142, 168, 0.1);
    border-top: 1px solid rgba(155, 142, 168, 0.18);
    will-change: transform;
    pointer-events: none;
  }

  /* Gap glow elements */
  .sieve-gap {
    position: absolute;
    top: 0;
    left: 0;
    height: 5px;
    will-change: transform;
    pointer-events: none;
  }

  /* Floor line */
  #floor-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 1px;
    background: rgba(155, 142, 168, 0.08);
    pointer-events: none;
  }

  #ui {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: rgba(8, 8, 14, 0.85);
    border-top: 1px solid rgba(200, 200, 208, 0.08);
    font-size: 12px;
    z-index: 10;
    gap: 16px;
  }

  #stats {
    display: flex;
    gap: 18px;
    opacity: 0.6;
    flex-shrink: 0;
    font-family: Fraunces, Georgia, serif;
    font-variation-settings: 'WONK' 1, 'SOFT' 100;
  }

  #stats span { white-space: nowrap; }

  #input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  #word-input {
    background: rgba(200, 200, 208, 0.06);
    border: 1px solid rgba(200, 200, 208, 0.12);
    color: #c8c8d0;
    font-family: Literata, Georgia, serif;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 4px;
    width: 160px;
    outline: none;
  }

  #word-input:focus {
    border-color: rgba(194, 113, 79, 0.4);
  }

  #word-input::placeholder {
    color: rgba(200, 200, 208, 0.25);
  }

  #hint {
    opacity: 0.35;
    font-size: 11px;
    white-space: nowrap;
    font-family: Literata, Georgia, serif;
  }
</style>
</head>
<body>

<div id="arena">
  <div id="floor-line"></div>
</div>

<div id="ui">
  <div id="stats">
    <span id="stat-falling">falling: 0</span>
    <span id="stat-stuck">stuck: 0</span>
    <span id="stat-through">through: 0</span>
  </div>
  <div id="input-wrap">
    <input id="word-input" type="text" placeholder="type a word, press enter" autocomplete="off" spellcheck="false" />
    <span id="hint">click anywhere to drop words</span>
  </div>
</div>

<script type="module">
import { prepareWithSegments, layoutNextLine } from 'https://esm.sh/@chenglou/pretext';

// ── Word pool ──────────────────────────────────────────────────────
const WORD_POOL = [
  // tiny
  'a','I','no','go','be','do','if','an','or','so','up','we','am','is','it','ox',
  // short
  'the','and','but','for','not','you','all','can','had','her','was','one','our',
  'out','day','get','has','him','his','how','its','may','new','now','old','see',
  'way','who','oil','did','let','say','she','too','use','run','ask','own','put',
  // medium
  'word','time','long','make','look','come','just','know','take','some','good',
  'give','most','only','tell','very','when','also','back','call','hand','much',
  'then','well','here','must','into','year','them','life','with','from','work',
  'part','keep','last','real','self','hold','song','note','echo','drum','bass',
  'tone','beat','haze','glow','dusk','hush','pine','salt','wind','root','seed',
  // long
  'about','other','which','their','there','first','would','after','think','these',
  'sound','water','small','place','where','right','still','again','music','light',
  'world','house','never','heart','earth','north','voice','stone','dream','ocean',
  'quiet','bloom','ember','grain','river','smoke','ghost','vapor','amber','cedar',
  // longer
  'between','through','another','because','thought','before','number','system',
  'shadow','garden','harbor','lantern','feather','whisper','passage','current',
  'gravity','silence','texture','surface','pattern','weather','nothing','morning',
  'evening','strange','thunder','voltage','mineral','horizon','pilgrim',
  // longest
  'something','beautiful','different','important','community','together','remember',
  'frequency','resonance','migration','continent','sculpture','telephone','blueprint',
  'trembling','cloudcover','watershed','gestation','turbulence','revolution',
  'architecture','constellation','understanding','transformation','Mediterranean',
  'electromagnetic','crystallography','bioluminescence','kaleidoscope','seismograph'
];

// ── Constants ──────────────────────────────────────────────────────
const GRAVITY = 0.18;
const FRICTION = 0.92;
const BOUNCE = 0.3;
const FONT_SIZE = 14;
const LINE_HEIGHT = FONT_SIZE + 6;
const NUM_SIEVE_LEVELS = 5;
const INITIAL_WORDS = 35;
const BATCH_INTERVAL = 2800;
const BATCH_SIZE = 4;
const FLOOR_MARGIN = 50;

// ── Arena setup ────────────────────────────────────────────────────
const arena = document.getElementById('arena');
const floorLine = document.getElementById('floor-line');
let W, H;

// ── Pretext measurement ────────────────────────────────────────────
// We use pretext's prepareWithSegments to measure word widths accurately
// matching the DOM font rendering
function measureWord(word) {
  const cursor = prepareWithSegments(
    [{ text: word, style: { fontFamily: 'Literata, Georgia, serif', fontSize: FONT_SIZE } }],
    { lineWidth: 99999 }
  );
  const line = layoutNextLine(cursor);
  if (!line) return word.length * FONT_SIZE * 0.6; // fallback
  // line width is the total advance
  return line.width;
}

// ── Color by width ─────────────────────────────────────────────────
function colorForWidth(w) {
  const minW = 8, maxW = 180;
  const t = Math.min(1, Math.max(0, (w - minW) / (maxW - minW)));
  if (t < 0.35) {
    const s = t / 0.35;
    const r = Math.round(139 + s * 57);
    const g = Math.round(158 - s * 4);
    const b = Math.round(126 - s * 66);
    return `rgb(${r},${g},${b})`;
  } else if (t < 0.65) {
    const s = (t - 0.35) / 0.3;
    const r = Math.round(196 - s * 2);
    const g = Math.round(154 - s * 41);
    const b = Math.round(60 + s * 19);
    return `rgb(${r},${g},${b})`;
  } else {
    const s = (t - 0.65) / 0.35;
    const r = Math.round(194 - s * 34);
    const g = Math.round(113 - s * 31);
    const b = Math.round(79 - s * 34);
    return `rgb(${r},${g},${b})`;
  }
}

// ── Sieve bars ─────────────────────────────────────────────────────
let sieveLevels = [];
let barElements = [];  // DOM elements for bars
let gapElements = [];  // DOM elements for gap glows

function clearSieveDOM() {
  for (const el of barElements) el.remove();
  for (const el of gapElements) el.remove();
  barElements = [];
  gapElements = [];
}

function buildSieve() {
  clearSieveDOM();
  sieveLevels = [];
  const topMargin = 60;
  const bottomMargin = FLOOR_MARGIN + 60;
  const usableH = H - topMargin - bottomMargin;
  const levelSpacing = usableH / (NUM_SIEVE_LEVELS + 1);

  for (let i = 0; i < NUM_SIEVE_LEVELS; i++) {
    const y = topMargin + levelSpacing * (i + 1);
    const numGaps = 3 + i;
    const bars = [];
    const totalBars = numGaps + 1;
    const avgBarWidth = W / (totalBars + numGaps * 0.6);

    let x = 0;
    for (let b = 0; b < totalBars; b++) {
      const barWidth = avgBarWidth * (0.7 + Math.random() * 0.6);
      bars.push({
        x: x,
        width: barWidth,
        baseGap: 30 + Math.random() * 50,
        gapPhase: Math.random() * Math.PI * 2,
        gapSpeed: 0.3 + Math.random() * 0.7,
      });
      x += barWidth + bars[bars.length - 1].baseGap;
    }

    // Scale to fit width
    const totalW = x - bars[bars.length - 1].baseGap;
    const scale = W / totalW;
    for (const bar of bars) {
      bar.x *= scale;
      bar.width *= scale;
      bar.baseGap *= scale;
    }

    // Create DOM elements for each bar and gap
    const barEls = [];
    const gapEls = [];
    for (const bar of bars) {
      const barEl = document.createElement('div');
      barEl.className = 'sieve-bar';
      arena.appendChild(barEl);
      barEls.push(barEl);

      const gapEl = document.createElement('div');
      gapEl.className = 'sieve-gap';
      arena.appendChild(gapEl);
      gapEls.push(gapEl);
    }
    barElements.push(...barEls);
    gapElements.push(...gapEls);

    sieveLevels.push({ y, bars, thickness: 5, barEls, gapEls });
  }
}

// Get bar geometry at current time for a sieve level
function getBarRects(level, time) {
  const rects = [];
  let x = 0;
  const bars = level.bars;
  for (let i = 0; i < bars.length; i++) {
    const bar = bars[i];
    const gapOsc = Math.sin(time * bar.gapSpeed + bar.gapPhase);
    const gapWidth = bar.baseGap * (0.5 + 0.5 * gapOsc);

    rects.push({
      x: x,
      y: level.y,
      width: bar.width,
      height: level.thickness,
      gapAfter: gapWidth,
    });
    x += bar.width + gapWidth;
  }

  // Rescale so bars always span full width
  const totalUsed = x - (rects.length > 0 ? rects[rects.length - 1].gapAfter : 0);
  if (totalUsed > 0) {
    const scale = W / totalUsed;
    let cx = 0;
    for (const r of rects) {
      r.x = cx;
      r.width *= scale;
      r.gapAfter *= scale;
      cx += r.width + r.gapAfter;
    }
  }
  return rects;
}

// ── Word objects ───────────────────────────────────────────────────
let words = [];
let wordIdCounter = 0;

function createWord(text, x, y) {
  const width = measureWord(text);
  const el = document.createElement('span');
  el.className = 'word';
  el.textContent = text;
  el.style.color = colorForWidth(width);
  arena.appendChild(el);

  return {
    id: wordIdCounter++,
    text,
    x: x ?? (Math.random() * (W - width)),
    y: y ?? (-LINE_HEIGHT - Math.random() * 100),
    vx: (Math.random() - 0.5) * 0.5,
    vy: Math.random() * 0.5,
    width,
    height: LINE_HEIGHT,
    mass: width,
    color: colorForWidth(width),
    settled: false,
    settledTime: 0,
    throughSieve: false,
    alpha: 1,
    el,
  };
}

function spawnRandom(x, y) {
  const text = WORD_POOL[Math.floor(Math.random() * WORD_POOL.length)];
  words.push(createWord(text, x, y));
}

function spawnWord(text, x, y) {
  words.push(createWord(text, x, y));
}

// ── Physics ────────────────────────────────────────────────────────
function simulate(time, dt) {
  const floorY = H - FLOOR_MARGIN;

  // Precompute bar rects for each level
  const allBarRects = sieveLevels.map(l => getBarRects(l, time));

  for (const w of words) {
    if (w.settled) continue;

    // Gravity
    w.vy += GRAVITY;

    // Air drag (light)
    w.vx *= 0.998;
    w.vy *= 0.999;

    // Tentative position
    let nx = w.x + w.vx;
    let ny = w.y + w.vy;

    // Collision with sieve bars
    for (const barRects of allBarRects) {
      for (const bar of barRects) {
        const wordLeft = nx;
        const wordRight = nx + w.width;
        const barLeft = bar.x;
        const barRight = bar.x + bar.width;

        const hOverlap = wordRight > barLeft && wordLeft < barRight;
        if (!hOverlap) continue;

        const barTop = bar.y;
        const barBottom = bar.y + bar.height;
        const wordBottom = ny + w.height;

        // Falling onto top of bar
        if (w.vy > 0 && wordBottom > barTop && w.y + w.height <= barTop + w.vy + 2) {
          ny = barTop - w.height;
          w.vy = -w.vy * BOUNCE;
          if (Math.abs(w.vy) < 0.5) w.vy = 0;

          // Slide toward nearest gap
          const wordCenter = nx + w.width / 2;
          let nearestGapX = null;
          let nearestDist = Infinity;

          for (const b of barRects) {
            const gapCenter = b.x + b.width + b.gapAfter / 2;
            const dist = Math.abs(wordCenter - gapCenter);
            if (dist < nearestDist) {
              nearestDist = dist;
              nearestGapX = gapCenter;

              if (b.gapAfter > w.width + 4) {
                const slideForce = 0.08 * w.mass * 0.005;
                w.vx += (gapCenter - wordCenter) > 0 ? slideForce : -slideForce;
              }
            }
          }

          w.vx += (Math.random() - 0.5) * 0.15;
        }

        // Rising into bottom of bar
        if (w.vy < 0 && ny < barBottom && w.y >= barBottom + w.vy - 2) {
          ny = barBottom;
          w.vy = -w.vy * BOUNCE * 0.5;
        }
      }
    }

    // Floor collision
    if (ny + w.height > floorY) {
      ny = floorY - w.height;
      w.vy = -w.vy * BOUNCE * 0.5;
      if (Math.abs(w.vy) < 0.3) {
        w.vy = 0;
        w.settledTime += dt;
        if (w.settledTime > 1) w.settled = true;
      }
      w.vx *= FRICTION;
    }

    // Wall collision
    if (nx < 0) { nx = 0; w.vx = Math.abs(w.vx) * BOUNCE; }
    if (nx + w.width > W) { nx = W - w.width; w.vx = -Math.abs(w.vx) * BOUNCE; }

    // Ceiling
    if (ny < -200) ny = -200;

    w.x = nx;
    w.y = ny;
  }

  // Simple word-word collision (push apart when overlapping)
  for (let i = 0; i < words.length; i++) {
    const a = words[i];
    if (a.settled && a.vy === 0) continue;
    for (let j = i + 1; j < words.length; j++) {
      const b = words[j];

      const hOverlap = a.x + a.width > b.x && a.x < b.x + b.width;
      const vOverlap = a.y + a.height > b.y && a.y < b.y + b.height;

      if (hOverlap && vOverlap) {
        const overlapY = Math.min(a.y + a.height - b.y, b.y + b.height - a.y);
        const overlapX = Math.min(a.x + a.width - b.x, b.x + b.width - a.x);

        if (overlapY < overlapX) {
          if (a.y < b.y) {
            a.y -= overlapY * 0.5;
            b.y += overlapY * 0.5;
            if (a.vy > 0 && b.vy <= 0) {
              const transfer = a.vy * 0.4;
              b.vy += transfer;
              a.vy -= transfer;
            }
          } else {
            b.y -= overlapY * 0.5;
            a.y += overlapY * 0.5;
            if (b.vy > 0 && a.vy <= 0) {
              const transfer = b.vy * 0.4;
              a.vy += transfer;
              b.vy -= transfer;
            }
          }
        } else {
          if (a.x < b.x) {
            a.x -= overlapX * 0.3;
            b.x += overlapX * 0.3;
          } else {
            b.x -= overlapX * 0.3;
            a.x += overlapX * 0.3;
          }
          const avgVx = (a.vx + b.vx) * 0.5;
          a.vx = avgVx + (a.vx - avgVx) * 0.5;
          b.vx = avgVx + (b.vx - avgVx) * 0.5;
        }

        a.settled = false;
        a.settledTime = 0;
        b.settled = false;
        b.settledTime = 0;
      }
    }
  }

  // Track which words have passed below the last sieve
  if (sieveLevels.length > 0) {
    const lastSieveY = sieveLevels[sieveLevels.length - 1].y;
    for (const w of words) {
      if (!w.throughSieve && w.y > lastSieveY + 10) {
        w.throughSieve = true;
      }
    }
  }
}

// ── Rendering (DOM updates) ────────────────────────────────────────
function render(time) {
  // Update sieve bar positions
  for (const level of sieveLevels) {
    const rects = getBarRects(level, time);
    for (let i = 0; i < rects.length; i++) {
      const r = rects[i];
      const barEl = level.barEls[i];
      const gapEl = level.gapEls[i];

      barEl.style.transform = `translate3d(${r.x}px, ${r.y}px, 0)`;
      barEl.style.width = r.width + 'px';

      // Gap glow
      const gapX = r.x + r.width;
      const gapW = r.gapAfter;
      gapEl.style.transform = `translate3d(${gapX}px, ${r.y}px, 0)`;
      gapEl.style.width = gapW + 'px';
      gapEl.style.background = `rgba(200, 200, 208, ${0.02 + 0.02 * Math.min(1, gapW / 80)})`;
    }
  }

  // Update word positions
  for (const w of words) {
    const alpha = w.alpha * (w.settled ? 0.6 : 1);
    w.el.style.transform = `translate3d(${w.x}px, ${w.y}px, 0)`;
    w.el.style.opacity = alpha;
  }
}

// ── Stats ──────────────────────────────────────────────────────────
const statFalling = document.getElementById('stat-falling');
const statStuck = document.getElementById('stat-stuck');
const statThrough = document.getElementById('stat-through');

function updateStats() {
  let falling = 0, stuck = 0, through = 0;
  const lastSieveY = sieveLevels.length > 0
    ? sieveLevels[sieveLevels.length - 1].y
    : H;

  for (const w of words) {
    if (w.throughSieve) {
      through++;
    } else if (w.settled || (w.vy === 0 && w.y > 0 && w.y < lastSieveY)) {
      stuck++;
    } else {
      falling++;
    }
  }
  statFalling.textContent = `falling: ${falling}`;
  statStuck.textContent = `stuck: ${stuck}`;
  statThrough.textContent = `through: ${through}`;
}

// ── Main loop ──────────────────────────────────────────────────────
let lastTime = 0;
let simTime = 0;
let statTick = 0;

function frame(ts) {
  const dt = Math.min(0.05, (ts - lastTime) / 1000);
  lastTime = ts;
  simTime += dt;

  simulate(simTime, dt);
  render(simTime);

  statTick += dt;
  if (statTick > 0.3) {
    updateStats();
    statTick = 0;
  }

  requestAnimationFrame(frame);
}

// ── Resize ─────────────────────────────────────────────────────────
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  floorLine.style.top = (H - FLOOR_MARGIN) + 'px';
  buildSieve();
}
window.addEventListener('resize', resize);

// ── Input ──────────────────────────────────────────────────────────
arena.addEventListener('click', (e) => {
  const rect = arena.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  for (let i = 0; i < 3; i++) {
    spawnRandom(x + (Math.random() - 0.5) * 60, y + (Math.random() - 0.5) * 20);
  }
});

const wordInput = document.getElementById('word-input');
wordInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && wordInput.value.trim()) {
    const text = wordInput.value.trim();
    const parts = text.split(/\s+/);
    for (const part of parts) {
      if (part.length > 0) {
        spawnWord(part, W / 2 - measureWord(part) / 2 + (Math.random() - 0.5) * 100, -20);
      }
    }
    wordInput.value = '';
  }
});

// Prevent space/key events from triggering when typing
wordInput.addEventListener('keydown', (e) => e.stopPropagation());

// ── Init ───────────────────────────────────────────────────────────
resize();

// Spawn initial words
for (let i = 0; i < INITIAL_WORDS; i++) {
  spawnRandom(
    Math.random() * W,
    -LINE_HEIGHT - Math.random() * 300
  );
}

// Periodically drop more words
setInterval(() => {
  if (words.length < 200) {
    for (let i = 0; i < BATCH_SIZE; i++) {
      spawnRandom(
        Math.random() * W,
        -LINE_HEIGHT - Math.random() * 40
      );
    }
  }
}, BATCH_INTERVAL);

// Cull words that have been settled too long at the very bottom to keep performance
setInterval(() => {
  if (words.length > 150) {
    const before = words.length;
    words = words.filter(w => {
      if (w.settled && w.settledTime > 10 && w.throughSieve) {
        if (Math.random() > 0.3) {
          return true;
        }
        w.el.remove(); // clean up DOM element
        return false;
      }
      return true;
    });
  }
}, 5000);

requestAnimationFrame(frame);
</script>

</body>
</html>
