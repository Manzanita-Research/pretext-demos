<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ouroboros — Text That Reads Itself</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Fraunces:opsz,wght@7..72,400;7..72,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #08080e; }

  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #665544; font: 15px Fraunces, Georgia, serif; letter-spacing: 0.04em;
    background: #08080e; z-index: 10; transition: opacity 0.8s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }

  /* --- Intro overlay --- */
  #intro {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: center;
    pointer-events: none; z-index: 5;
    padding-top: min(8vh, 48px);
  }
  #intro-inner {
    max-width: 520px; padding: 0 24px;
    text-align: center;
    transition: opacity 1.2s ease;
  }
  #intro h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-variation-settings: "WONK" 1, "SOFT" 100;
    font-weight: 300;
    font-size: clamp(20px, 3.2vw, 28px);
    line-height: 1.25;
    letter-spacing: -0.02em;
    color: #E8E5DF;
    opacity: 0.72;
    margin-bottom: 12px;
  }
  #intro p {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 14px;
    line-height: 1.7;
    color: #E8E5DF;
    opacity: 0.32;
  }
  #intro p .ochre { color: #C49A3C; opacity: 1; }

  /* --- Drag handle --- */
  #handle {
    position: fixed; top: 0; width: 12px; height: 100%;
    cursor: col-resize; z-index: 20;
    background: transparent;
  }
  #handle::before {
    content: ''; position: absolute; top: 0; left: 5px;
    width: 2px; height: 100%;
    background: rgba(232, 228, 220, 0.04);
    transition: background 0.3s;
  }
  #handle:hover::before, #handle.active::before {
    background: rgba(196, 154, 60, 0.25);
  }
  /* handle grip dots */
  #handle::after {
    content: '· · ·';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(90deg);
    font-size: 14px; letter-spacing: 3px;
    color: rgba(232, 228, 220, 0);
    transition: color 0.3s;
    pointer-events: none;
  }
  #handle:hover::after, #handle.active::after {
    color: rgba(196, 154, 60, 0.4);
  }

  /* --- Hint pill --- */
  #hint {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Fraunces', Georgia, serif;
    font-size: 12px;
    color: rgba(232, 228, 220, 0.25);
    letter-spacing: 0.03em;
    z-index: 15;
    transition: opacity 2s ease;
    pointer-events: none;
  }
  #hint.faded { opacity: 0; }
  #hint span { color: #C49A3C; opacity: 0.5; }

  /* --- Main layout container --- */
  #stage {
    position: fixed; inset: 0;
    display: flex; justify-content: center;
    pointer-events: none;
    z-index: 1;
  }

  #text-container {
    position: relative;
    font: 16px/28px Fraunces, Georgia, serif;
    color: rgba(232, 228, 220, 0.7);
    pointer-events: auto;
  }

  #text-container .line {
    white-space: pre;
    height: 28px;
    position: relative;
  }

  /* --- Meta value spans --- */
  .meta {
    position: relative;
    border-radius: 2px;
    padding: 0 2px;
    margin: 0 -2px;
    transition: color 0.3s ease;
  }
  .meta-bg {
    position: absolute; inset: -1px -2px;
    border-radius: 2px;
    pointer-events: none;
    z-index: -1;
  }

  .meta.ochre { color: #C49A3C; }
  .meta.sage { color: #8B9E7E; }
  .meta.terracotta { color: #C2714F; }
  .meta.ochre .meta-bg { background: rgba(196, 154, 60, 0.08); }
  .meta.sage .meta-bg { background: rgba(139, 158, 126, 0.08); }
  .meta.terracotta .meta-bg { background: rgba(194, 113, 79, 0.08); }

  /* Flash animation on value change */
  @keyframes meta-flash {
    0% { filter: brightness(1.8); }
    100% { filter: brightness(1); }
  }
  .meta.flash {
    animation: meta-flash 0.6s ease-out;
  }
  @keyframes bg-flash {
    0% { opacity: 0.25; }
    100% { opacity: 1; }
  }
  .meta.flash .meta-bg {
    animation: bg-flash 0.6s ease-out;
  }

  /* --- Status line --- */
  #status-bar {
    position: absolute; top: -26px; left: 0; right: 0;
    display: flex; justify-content: space-between;
    font: 11px Fraunces, Georgia, serif;
    pointer-events: none;
  }
  #status-text { transition: color 0.3s; }
  #width-label { color: rgba(232, 228, 220, 0.15); }

  /* --- Iteration dots --- */
  #iteration-area {
    position: absolute; left: 0;
    display: flex; align-items: center; gap: 0;
    font: 10px Fraunces, Georgia, serif;
    color: rgba(232, 228, 220, 0.18);
    pointer-events: none;
  }
  #iteration-area .label { margin-right: 12px; }
  .dot-container {
    display: flex; align-items: center;
  }
  .iter-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: transform 0.2s ease, opacity 0.2s ease;
    transform: scale(0.5);
    opacity: 0;
  }
  .iter-dot.visible {
    transform: scale(1);
    opacity: 0.4;
  }
  .iter-dot.last {
    width: 9px; height: 9px;
    opacity: 0.8;
  }
  .iter-dot.last.visible {
    opacity: 0.8;
  }
  .dot-line {
    width: 10px; height: 1px;
    background: rgba(232, 228, 220, 0.06);
    flex-shrink: 0;
  }
  .converge-check {
    margin-left: 8px;
    color: rgba(139, 158, 126, 0.5);
    font-size: 10px;
  }

  /* --- Container edge guides --- */
  #edge-left, #edge-right {
    position: absolute; top: -32px; width: 1px;
    pointer-events: none;
  }
  #edge-left { left: -1px; }
  #edge-right { right: -1px; }

  /* --- Convergence glow --- */
  #glow {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s ease;
    background: radial-gradient(ellipse at center, rgba(139, 158, 126, 0.06) 0%, transparent 70%);
  }
  #glow.active { opacity: 1; }

  /* --- Footer --- */
  #footer {
    position: fixed; bottom: 20px;
    font: 10px Fraunces, Georgia, serif;
    color: rgba(232, 228, 220, 0.1);
    letter-spacing: 0.04em;
    z-index: 1;
    pointer-events: none;
  }

  /* --- Oscillation crossfade --- */
  .osc-layer {
    position: absolute; top: 0; left: 0; right: 0;
    transition: opacity 0.05s linear;
  }
</style>
</head>
<body>
<div id="loading">the text is thinking about itself...</div>

<div id="intro">
  <div id="intro-inner">
    <h1>This text describes itself.</h1>
    <p>When it's wrong, it rewrites itself to be right. But rewriting changes the shape, which makes it wrong again. <span class="ochre">The serpent eats its tail.</span></p>
  </div>
</div>

<div id="stage">
  <div id="text-container">
    <div id="glow"></div>
    <div id="status-bar">
      <span id="status-text"></span>
      <span id="width-label"></span>
    </div>
    <div id="text-body"></div>
    <div id="iteration-area">
      <span class="label">attempts</span>
      <div id="dots-row" style="display:flex;align-items:center;gap:0;"></div>
    </div>
    <div id="edge-left"></div>
    <div id="edge-right"></div>
  </div>
</div>

<div id="handle"></div>
<div id="hint">Try <span>resizing the right edge</span> to change the shape</div>
<div id="footer">OUROBOROS</div>

<script type="module">
import { prepareWithSegments, layoutNextLine } from 'https://esm.sh/@chenglou/pretext'

// --- Brand tokens ---
const OCHRE = '#C49A3C'
const SAGE = '#8B9E7E'
const TERRACOTTA = '#C2714F'
const CREAM = '#E8E5DF'

const FONT_SIZE = 16
const FONT = `${FONT_SIZE}px Fraunces, Georgia, serif`
const LINE_HEIGHT = 28
const MARGIN = 50

const handle = document.getElementById('handle')
const hint = document.getElementById('hint')
const textContainer = document.getElementById('text-container')
const textBody = document.getElementById('text-body')
const statusTextEl = document.getElementById('status-text')
const widthLabelEl = document.getElementById('width-label')
const iterationArea = document.getElementById('iteration-area')
const dotsRow = document.getElementById('dots-row')
const glowEl = document.getElementById('glow')
const edgeLeft = document.getElementById('edge-left')
const edgeRight = document.getElementById('edge-right')
const footerEl = document.getElementById('footer')

let W, H
let containerWidth = 560
let dragging = false
let needsRecalc = true
let hasInteracted = false

function resize() {
  W = window.innerWidth
  H = window.innerHeight
  containerWidth = Math.min(containerWidth, W - MARGIN * 2)
  positionElements()
}

function positionElements() {
  // Position handle
  handle.style.left = `${(W + containerWidth) / 2 - 6}px`
  // Position footer
  footerEl.style.left = `${(W - containerWidth) / 2}px`
}

resize()
window.addEventListener('resize', () => {
  resize()
  scheduleRecalc()
})

// --- Drag handle ---
handle.addEventListener('pointerdown', (e) => {
  dragging = true
  handle.classList.add('active')
  handle.setPointerCapture(e.pointerId)
  e.preventDefault()
  if (!hasInteracted) {
    hasInteracted = true
    hint.classList.add('faded')
  }
})
window.addEventListener('pointermove', (e) => {
  if (!dragging) return
  const halfW = Math.max(160, Math.min((W - MARGIN) / 2, e.clientX - W / 2))
  containerWidth = Math.round(halfW * 2)
  positionElements()
  scheduleRecalc()
})
window.addEventListener('pointerup', () => {
  if (dragging) { dragging = false; handle.classList.remove('active') }
})

function scheduleRecalc() {
  needsRecalc = true
}

// --- Layout using pretext for measurement only ---
function layoutText(text, maxWidth) {
  const prepared = prepareWithSegments(text, FONT)
  const lines = []
  let cursor = { segmentIndex: 0, graphemeIndex: 0 }
  let safety = 0
  while (safety++ < 300) {
    const line = layoutNextLine(prepared, cursor, maxWidth)
    if (!line) break
    lines.push(line)
    cursor = line.end
  }
  return lines
}

function getMetrics(lines) {
  const n = lines.length
  if (n === 0) return null
  const widths = lines.map(l => l.width)
  const texts = lines.map(l => l.text)
  const trimmed = texts.map(t => t.trim())
  const wordCounts = trimmed.map(t => t.split(/\s+/).filter(Boolean).length)

  let widestIdx = 0
  for (let i = 1; i < n; i++) if (widths[i] > widths[widestIdx]) widestIdx = i

  const allText = texts.join('')
  const allWords = allText.split(/\s+/).filter(Boolean)

  return {
    lineCount: n,
    maxWidth: Math.round(Math.max(...widths)),
    minWidth: Math.round(Math.min(...widths)),
    totalHeight: n * LINE_HEIGHT,
    firstLineWords: wordCounts[0],
    lastLineWords: wordCounts[n - 1],
    lastLineText: trimmed[n - 1],
    widestLine: widestIdx + 1,
    totalChars: allText.length,
    totalWords: allWords.length,
    texts,
    trimmed,
    widths,
    wordCounts
  }
}

// Generate description with meta ranges
function generateDescription(m) {
  const parts = []
  const ranges = []
  const values = []
  const labels = []
  let len = 0

  function add(str) { parts.push(str); len += str.length }
  function addMeta(val, label) {
    const s = String(val)
    ranges.push([len, len + s.length])
    values.push(val)
    labels.push(label)
    parts.push(s)
    len += s.length
  }

  add('This paragraph is rendered across ')
  addMeta(m.lineCount, 'lineCount')
  add(' lines. The first line contains ')
  addMeta(m.firstLineWords, 'firstLineWords')
  add(' words. The widest line is number ')
  addMeta(m.widestLine, 'widestLine')
  add(', spanning ')
  addMeta(m.maxWidth, 'maxWidth')
  add(' pixels. The total height of the text is ')
  addMeta(m.totalHeight, 'totalHeight')
  add(' pixels. There are ')
  addMeta(m.totalChars, 'totalChars')
  add(' characters visible right now, forming ')
  addMeta(m.totalWords, 'totalWords')
  add(' words. The last line has ')
  addMeta(m.lastLineWords, 'lastLineWords')
  add(' words. The narrowest line measures ')
  addMeta(m.minWidth, 'minWidth')
  add(' pixels. Every claim here describes the shape of this very text. If any number is wrong, the passage rewrites itself — but that changes the shape, changing the numbers, demanding another rewrite. The serpent eats its tail.')

  return { text: parts.join(''), metaRanges: ranges, metaValues: values, metaLabels: labels }
}

function metricsKey(m) {
  return [m.lineCount, m.maxWidth, m.minWidth, m.totalHeight,
    m.firstLineWords, m.lastLineWords, m.widestLine,
    m.totalChars, m.totalWords].join(',')
}

function checkCorrectness(values, labels, actualMetrics) {
  return labels.map((label, i) => values[i] === actualMetrics[label])
}

function findFixedPoint(maxWidth, maxIter = 6) {
  const seed = {
    lineCount: 1, maxWidth: 0, minWidth: 0, totalHeight: LINE_HEIGHT,
    firstLineWords: 1, lastLineWords: 1, lastLineText: '',
    widestLine: 1, totalChars: 0, totalWords: 0,
    texts: [], trimmed: [], widths: [], wordCounts: []
  }

  let desc = generateDescription(seed)
  let text = desc.text
  let metaRanges = desc.metaRanges
  let metaValues = desc.metaValues
  let metaLabels = desc.metaLabels
  const history = []

  for (let i = 0; i < maxIter; i++) {
    const lines = layoutText(text, maxWidth)
    const metrics = getMetrics(lines)
    const key = metricsKey(metrics)
    const correctness = checkCorrectness(metaValues, metaLabels, metrics)

    history.push({ text, metaRanges, metaValues, metaLabels, metrics, lines, key, correctness })

    const newDesc = generateDescription(metrics)
    const newText = newDesc.text

    if (newText === text) {
      return {
        converged: true,
        iterations: i + 1,
        current: { text, metaRanges, metaValues, metaLabels, metrics, lines, correctness: correctness.map(() => true) },
        history
      }
    }

    const newLines = layoutText(newText, maxWidth)
    const newMetrics = getMetrics(newLines)
    const newKey = metricsKey(newMetrics)

    for (let j = history.length - 1; j >= Math.max(0, history.length - 8); j--) {
      if (history[j].key === newKey) {
        const period = history.length - j
        const cycleStates = []
        for (let k = j; k < history.length; k++) {
          cycleStates.push(history[k])
        }
        const newCorrectness = checkCorrectness(newDesc.metaValues, newDesc.metaLabels, newMetrics)
        cycleStates.push({
          text: newText, metaRanges: newDesc.metaRanges,
          metaValues: newDesc.metaValues, metaLabels: newDesc.metaLabels,
          metrics: newMetrics, lines: newLines, key: newKey, correctness: newCorrectness
        })
        return {
          converged: false,
          oscillating: true,
          period,
          iterations: i + 1,
          states: cycleStates.slice(0, period),
          current: history[history.length - 1],
          history
        }
      }
    }

    text = newText
    metaRanges = newDesc.metaRanges
    metaValues = newDesc.metaValues
    metaLabels = newDesc.metaLabels
  }

  const lines = layoutText(text, maxWidth)
  const metrics = getMetrics(lines)
  const correctness = checkCorrectness(metaValues, metaLabels, metrics)
  return {
    converged: false, oscillating: false, iterations: maxIter,
    current: { text, metaRanges, metaValues, metaLabels, metrics, lines, correctness },
    history
  }
}

// --- DOM Rendering ---

// Track previous meta values for flash detection
let prevMetaValues = null
let changedIndices = new Set()

// Build DOM for a text state — returns array of line divs
function buildLineDOMs(state, showCorrectness) {
  const { lines, metaRanges, metaValues, metaLabels, correctness } = state
  const fragment = document.createDocumentFragment()
  let charOffset = 0

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i]
    const lineText = line.text
    const lineDiv = document.createElement('div')
    lineDiv.className = 'line'

    // Build segments: runs of meta vs non-meta text
    let pos = 0
    while (pos < lineText.length) {
      const absPos = charOffset + pos
      // Check if this position is inside a meta range
      let metaIdx = -1
      for (let r = 0; r < metaRanges.length; r++) {
        if (absPos >= metaRanges[r][0] && absPos < metaRanges[r][1]) {
          metaIdx = r
          break
        }
      }

      if (metaIdx >= 0) {
        // Meta span — find how much of this meta range is on this line
        const rangeEnd = metaRanges[metaIdx][1]
        const lineEnd = charOffset + lineText.length
        const segEnd = Math.min(rangeEnd, lineEnd) - charOffset
        const segment = lineText.slice(pos, segEnd)

        const span = document.createElement('span')
        span.className = 'meta'

        // Color class based on correctness
        if (showCorrectness && correctness) {
          span.classList.add(correctness[metaIdx] ? 'sage' : 'terracotta')
        } else {
          span.classList.add('ochre')
        }

        // Flash if value changed
        if (changedIndices.has(metaIdx)) {
          span.classList.add('flash')
        }

        // Background highlight
        const bg = document.createElement('span')
        bg.className = 'meta-bg'
        span.appendChild(bg)
        span.appendChild(document.createTextNode(segment))
        lineDiv.appendChild(span)
        pos = segEnd
      } else {
        // Plain text — find the end of this non-meta run
        let runEnd = pos + 1
        while (runEnd < lineText.length) {
          const testAbs = charOffset + runEnd
          let inMeta = false
          for (let r = 0; r < metaRanges.length; r++) {
            if (testAbs >= metaRanges[r][0] && testAbs < metaRanges[r][1]) {
              inMeta = true
              break
            }
          }
          if (inMeta) break
          runEnd++
        }
        lineDiv.appendChild(document.createTextNode(lineText.slice(pos, runEnd)))
        pos = runEnd
      }
    }

    fragment.appendChild(lineDiv)
    charOffset += lineText.length
  }

  return fragment
}

// --- Rendering state ---
let result = null
let oscillationTime = 0
let animStartTime = 0
let oscAnimFrame = null

function renderResult() {
  if (!result) return

  const maxLines = result.oscillating && result.states
    ? Math.max(...result.states.map(s => s.lines.length))
    : result.current.lines.length
  const introHeight = Math.min(window.innerHeight * 0.08, 48) + 80
  const totalH = maxLines * LINE_HEIGHT
  const textTop = Math.max(introHeight + 30, (H - totalH) / 2 + 20)

  // Position container
  textContainer.style.width = `${containerWidth}px`
  textContainer.style.top = `${textTop}px`
  textContainer.style.left = `${(W - containerWidth) / 2}px`
  textContainer.style.position = 'fixed'

  // Edge guides
  const edgeH = totalH + 54
  edgeLeft.style.height = `${edgeH}px`
  edgeRight.style.height = `${edgeH}px`
  const edgeAlpha = result.converged ? 0.06 : 0.04
  const edgeColor = `rgba(232, 228, 220, ${edgeAlpha})`
  edgeLeft.style.background = edgeColor
  edgeRight.style.background = edgeColor

  // Status
  if (result.converged) {
    statusTextEl.style.color = `rgba(139, 158, 126, 0.55)`
    statusTextEl.textContent = `converged after ${result.iterations} iteration${result.iterations !== 1 ? 's' : ''}`
  } else if (result.oscillating) {
    statusTextEl.style.color = `rgba(194, 113, 79, 0.45)`
    statusTextEl.textContent = `oscillating · period ${result.period} · ${result.iterations} iterations`
  } else {
    statusTextEl.style.color = `rgba(194, 113, 79, 0.45)`
    statusTextEl.textContent = `drifting · ${result.iterations} iterations · no fixed point found`
  }
  widthLabelEl.textContent = `${containerWidth}px`

  // Convergence glow
  if (result.converged) {
    const glowSize = Math.max(containerWidth, totalH) * 1.4
    glowEl.style.width = `${glowSize}px`
    glowEl.style.height = `${glowSize}px`
    glowEl.style.left = `${(containerWidth - glowSize) / 2}px`
    glowEl.style.top = `${(totalH - glowSize) / 2}px`
    glowEl.classList.add('active')
  } else {
    glowEl.classList.remove('active')
  }

  // Render text
  textBody.innerHTML = ''
  if (result.oscillating && result.states && result.states.length >= 2) {
    startOscillation()
  } else {
    stopOscillation()
    const dom = buildLineDOMs(result.current, result.converged)
    textBody.appendChild(dom)
  }

  // Iteration dots
  renderDots()

  // Iteration area position
  iterationArea.style.top = `${totalH + 30}px`
}

// --- Oscillation animation (DOM crossfade) ---
let oscIndex = 0
let oscLayerA = null
let oscLayerB = null
let oscPhase = 0

function startOscillation() {
  stopOscillation()
  oscIndex = 0
  oscPhase = 0

  // Create two layers for crossfade
  oscLayerA = document.createElement('div')
  oscLayerA.className = 'osc-layer'
  oscLayerB = document.createElement('div')
  oscLayerB.className = 'osc-layer'
  oscLayerB.style.opacity = '0'

  const states = result.states
  oscLayerA.appendChild(buildLineDOMs(states[0], true))
  oscLayerB.appendChild(buildLineDOMs(states[1 % states.length], true))

  textBody.appendChild(oscLayerA)
  textBody.appendChild(oscLayerB)

  oscillationTime = 0
  animStartTime = performance.now()

  function oscTick(now) {
    const dt = Math.min(now - (oscTick._last || now), 50)
    oscTick._last = now
    oscillationTime += dt * 0.001

    const period = states.length
    const phase = oscillationTime * 0.6
    const raw = phase % period
    const idx = Math.floor(raw)
    const frac = raw - idx
    const eased = frac < 0.5
      ? 2 * frac * frac
      : 1 - 2 * (1 - frac) * (1 - frac)

    // Update layers if index changed
    if (idx !== oscIndex) {
      oscIndex = idx
      // Swap layers: A becomes current, B becomes next
      oscLayerA.innerHTML = ''
      oscLayerA.appendChild(buildLineDOMs(states[idx % period], true))
      oscLayerB.innerHTML = ''
      oscLayerB.appendChild(buildLineDOMs(states[(idx + 1) % period], true))
    }

    oscLayerA.style.opacity = String(1 - eased)
    oscLayerB.style.opacity = String(eased)

    // Pulse the status text opacity
    const statusAlpha = 0.3 + 0.25 * (0.5 + 0.5 * Math.sin(oscillationTime * 3))
    statusTextEl.style.color = `rgba(194, 113, 79, ${statusAlpha})`

    oscAnimFrame = requestAnimationFrame(oscTick)
  }

  oscAnimFrame = requestAnimationFrame(oscTick)
}

function stopOscillation() {
  if (oscAnimFrame) {
    cancelAnimationFrame(oscAnimFrame)
    oscAnimFrame = null
  }
  oscLayerA = null
  oscLayerB = null
}

// --- Iteration dots ---
function renderDots() {
  dotsRow.innerHTML = ''
  if (!result || result.history.length <= 1) {
    iterationArea.style.display = 'none'
    return
  }
  iterationArea.style.display = 'flex'

  const count = result.history.length
  for (let i = 0; i < count; i++) {
    const isLast = i === count - 1

    // Similarity coloring
    let similarity = 0
    if (i < count - 1) {
      similarity = result.history[i].key === result.history[i + 1].key ? 1 : 0.3
    } else if (result.converged) {
      similarity = 1
    }

    const r = Math.round(lerp(194, 139, similarity)) // terracotta -> sage
    const g = Math.round(lerp(113, 158, similarity))
    const b = Math.round(lerp(79, 126, similarity))

    const dot = document.createElement('div')
    dot.className = 'iter-dot' + (isLast ? ' last' : '')
    dot.style.background = `rgb(${r}, ${g}, ${b})`

    // Stagger reveal
    const delay = i * 120
    setTimeout(() => dot.classList.add('visible'), delay)

    const wrapper = document.createElement('div')
    wrapper.className = 'dot-container'
    wrapper.appendChild(dot)

    // Connecting line (except after last)
    if (i < count - 1) {
      const line = document.createElement('div')
      line.className = 'dot-line'
      wrapper.appendChild(line)
    }

    dotsRow.appendChild(wrapper)
  }

  // Converged checkmark
  if (result.converged) {
    const check = document.createElement('span')
    check.className = 'converge-check'
    check.textContent = '✓'
    dotsRow.appendChild(check)
  }
}

function lerp(a, b, t) { return a + (b - a) * t }

// --- Main loop ---
function tick() {
  requestAnimationFrame(tick)

  if (needsRecalc) {
    needsRecalc = false

    // Detect changed values for flash
    if (result && result.current && result.current.metaValues) {
      prevMetaValues = [...result.current.metaValues]
    }

    result = findFixedPoint(containerWidth)

    changedIndices = new Set()
    if (result.current.metaValues && prevMetaValues) {
      result.current.metaValues.forEach((v, i) => {
        if (prevMetaValues[i] !== undefined && prevMetaValues[i] !== v) {
          changedIndices.add(i)
        }
      })
    }

    renderResult()
  }
}

// --- Init ---
document.fonts.ready.then(() => {
  const loading = document.getElementById('loading')
  loading.classList.add('hidden')
  setTimeout(() => loading.remove(), 1000)
  requestAnimationFrame(tick)
})
</script>
