<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ouroboros — Text That Reads Itself</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Literata:opsz,wght@7..72,400;7..72,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #08080e; }
  canvas { display: block; width: 100%; height: 100%; cursor: default; }

  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #665544; font: 15px Literata, Georgia, serif; letter-spacing: 0.04em;
    background: #08080e; z-index: 10; transition: opacity 0.8s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }

  /* --- Intro overlay --- */
  #intro {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: center;
    pointer-events: none; z-index: 5;
    padding-top: min(8vh, 48px);
  }
  #intro-inner {
    max-width: 520px; padding: 0 24px;
    text-align: center;
    transition: opacity 1.2s ease;
  }
  #intro h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-variation-settings: "WONK" 1, "SOFT" 100;
    font-weight: 300;
    font-size: clamp(20px, 3.2vw, 28px);
    line-height: 1.25;
    letter-spacing: -0.02em;
    color: #E8E5DF;
    opacity: 0.72;
    margin-bottom: 12px;
  }
  #intro p {
    font-family: 'Literata', Georgia, serif;
    font-size: 14px;
    line-height: 1.7;
    color: #E8E5DF;
    opacity: 0.32;
  }
  #intro p .ochre { color: #C49A3C; opacity: 1; }

  /* --- Drag handle --- */
  #handle {
    position: fixed; top: 0; width: 12px; height: 100%;
    cursor: col-resize; z-index: 20;
    background: transparent;
  }
  #handle::before {
    content: ''; position: absolute; top: 0; left: 5px;
    width: 2px; height: 100%;
    background: rgba(232, 228, 220, 0.04);
    transition: background 0.3s;
  }
  #handle:hover::before, #handle.active::before {
    background: rgba(196, 154, 60, 0.25);
  }
  /* handle grip dots */
  #handle::after {
    content: '· · ·';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(90deg);
    font-size: 14px; letter-spacing: 3px;
    color: rgba(232, 228, 220, 0);
    transition: color 0.3s;
    pointer-events: none;
  }
  #handle:hover::after, #handle.active::after {
    color: rgba(196, 154, 60, 0.4);
  }

  /* --- Hint pill --- */
  #hint {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Literata', Georgia, serif;
    font-size: 12px;
    color: rgba(232, 228, 220, 0.25);
    letter-spacing: 0.03em;
    z-index: 15;
    transition: opacity 2s ease;
    pointer-events: none;
  }
  #hint.faded { opacity: 0; }
  #hint span { color: #C49A3C; opacity: 0.5; }

  /* --- Iteration counter --- */
  #iteration-counter {
    position: fixed;
    font-family: 'Literata', Georgia, serif;
    font-size: 12px;
    color: rgba(232, 228, 220, 0);
    letter-spacing: 0.04em;
    z-index: 15;
    pointer-events: none;
    transition: color 0.3s ease;
    white-space: nowrap;
  }
  #iteration-counter.visible {
    color: rgba(232, 228, 220, 0.4);
  }
  #iteration-counter .attempt-num {
    color: #C49A3C;
    font-weight: 600;
  }
</style>
</head>
<body>
<div id="loading">the text is thinking about itself...</div>

<div id="intro">
  <div id="intro-inner">
    <h1>This text describes itself.</h1>
    <p>When it's wrong, it rewrites itself to be right. But rewriting changes the shape, which makes it wrong again. <span class="ochre">The serpent eats its tail.</span></p>
  </div>
</div>

<canvas id="canvas"></canvas>
<div id="handle"></div>
<div id="hint">Try <span>resizing the right edge</span> to change the shape</div>
<div id="iteration-counter"></div>

<script type="module">
import { prepareWithSegments, layoutNextLine } from 'https://esm.sh/@chenglou/pretext'

// --- Brand tokens (dark mode) ---
const OCHRE = '#C49A3C'
const SAGE = '#8B9E7E'
const TERRACOTTA = '#C2714F'
const CREAM = '#E8E5DF'
const FOG = '#5C5C5C'
const BG = '#08080e'

const OCHRE_RGB = [196, 154, 60]
const SAGE_RGB = [139, 158, 126]
const TERRACOTTA_RGB = [194, 113, 79]
const CREAM_RGB = [232, 228, 220]
const FOG_RGB = [92, 92, 92]

const FONT_SIZE = 16
const FONT = `${FONT_SIZE}px Literata, Georgia, serif`
const LINE_HEIGHT = 28
const MARGIN = 50

const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')
const handle = document.getElementById('handle')
const hint = document.getElementById('hint')
const iterCounter = document.getElementById('iteration-counter')

let W, H, dpr
let containerWidth = 560
let dragging = false
let needsRecalc = true
let hasInteracted = false

function resize() {
  dpr = window.devicePixelRatio || 1
  W = window.innerWidth
  H = window.innerHeight
  canvas.width = W * dpr
  canvas.height = H * dpr
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
  containerWidth = Math.min(containerWidth, W - MARGIN * 2)
  positionHandle()
}

function positionHandle() {
  handle.style.left = `${(W + containerWidth) / 2 - 6}px`
}

resize()
window.addEventListener('resize', () => {
  resize()
  scheduleRecalc()
})

// --- Drag handle ---
handle.addEventListener('pointerdown', (e) => {
  dragging = true
  handle.classList.add('active')
  handle.setPointerCapture(e.pointerId)
  e.preventDefault()
  if (!hasInteracted) {
    hasInteracted = true
    hint.classList.add('faded')
  }
})
window.addEventListener('pointermove', (e) => {
  if (!dragging) return
  const halfW = Math.max(160, Math.min((W - MARGIN) / 2, e.clientX - W / 2))
  containerWidth = Math.round(halfW * 2)
  positionHandle()
  scheduleRecalc()
})
window.addEventListener('pointerup', () => {
  if (dragging) { dragging = false; handle.classList.remove('active') }
})

function scheduleRecalc() {
  needsRecalc = true
}

// --- Layout ---
function layoutText(text, maxWidth) {
  const prepared = prepareWithSegments(text, FONT)
  const lines = []
  let cursor = { segmentIndex: 0, graphemeIndex: 0 }
  let safety = 0
  while (safety++ < 300) {
    const line = layoutNextLine(prepared, cursor, maxWidth)
    if (!line) break
    lines.push(line)
    cursor = line.end
  }
  return lines
}

function getMetrics(lines) {
  const n = lines.length
  if (n === 0) return null
  const widths = lines.map(l => l.width)
  const texts = lines.map(l => l.text)
  const trimmed = texts.map(t => t.trim())
  const wordCounts = trimmed.map(t => t.split(/\s+/).filter(Boolean).length)

  let widestIdx = 0
  for (let i = 1; i < n; i++) if (widths[i] > widths[widestIdx]) widestIdx = i

  const allText = texts.join('')
  const allWords = allText.split(/\s+/).filter(Boolean)

  return {
    lineCount: n,
    maxWidth: Math.round(Math.max(...widths)),
    minWidth: Math.round(Math.min(...widths)),
    totalHeight: n * LINE_HEIGHT,
    firstLineWords: wordCounts[0],
    lastLineWords: wordCounts[n - 1],
    lastLineText: trimmed[n - 1],
    widestLine: widestIdx + 1,
    totalChars: allText.length,
    totalWords: allWords.length,
    texts,
    trimmed,
    widths,
    wordCounts
  }
}

// Generate description — returns { text, metaRanges, metaValues, metaLabels }
// metaRanges: array of [start, end] for highlighted values
// metaValues: the numeric values at each range
// metaLabels: the metric key for each range (for correctness checking)
function generateDescription(m) {
  const parts = []
  const ranges = []
  const values = []
  const labels = []
  let len = 0

  function add(str) { parts.push(str); len += str.length }
  function addMeta(val, label) {
    const s = String(val)
    ranges.push([len, len + s.length])
    values.push(val)
    labels.push(label)
    parts.push(s)
    len += s.length
  }

  add('This paragraph is rendered across ')
  addMeta(m.lineCount, 'lineCount')
  add(' lines. The first line contains ')
  addMeta(m.firstLineWords, 'firstLineWords')
  add(' words. The widest line is number ')
  addMeta(m.widestLine, 'widestLine')
  add(', spanning ')
  addMeta(m.maxWidth, 'maxWidth')
  add(' pixels. The total height of the text is ')
  addMeta(m.totalHeight, 'totalHeight')
  add(' pixels. There are ')
  addMeta(m.totalChars, 'totalChars')
  add(' characters visible right now, forming ')
  addMeta(m.totalWords, 'totalWords')
  add(' words. The last line has ')
  addMeta(m.lastLineWords, 'lastLineWords')
  add(' words. The narrowest line measures ')
  addMeta(m.minWidth, 'minWidth')
  add(' pixels. Every claim here describes the shape of this very text. If any number is wrong, the passage rewrites itself — but that changes the shape, changing the numbers, demanding another rewrite. The serpent eats its tail.')

  return { text: parts.join(''), metaRanges: ranges, metaValues: values, metaLabels: labels }
}

// Canonical key for metrics comparison
function metricsKey(m) {
  return [m.lineCount, m.maxWidth, m.minWidth, m.totalHeight,
    m.firstLineWords, m.lastLineWords, m.widestLine,
    m.totalChars, m.totalWords].join(',')
}

function findFixedPoint(maxWidth, maxIter = 6) {
  const seed = {
    lineCount: 1, maxWidth: 0, minWidth: 0, totalHeight: LINE_HEIGHT,
    firstLineWords: 1, lastLineWords: 1, lastLineText: '',
    widestLine: 1, totalChars: 0, totalWords: 0,
    texts: [], trimmed: [], widths: [], wordCounts: []
  }

  let desc = generateDescription(seed)
  let text = desc.text
  let metaRanges = desc.metaRanges
  let metaValues = desc.metaValues
  let metaLabels = desc.metaLabels
  const history = []

  for (let i = 0; i < maxIter; i++) {
    const lines = layoutText(text, maxWidth)
    const metrics = getMetrics(lines)
    const key = metricsKey(metrics)

    // Check which values are correct vs incorrect
    const correctness = checkCorrectness(metaValues, metaLabels, metrics)

    history.push({ text, metaRanges, metaValues, metaLabels, metrics, lines, key, correctness })

    const newDesc = generateDescription(metrics)
    const newText = newDesc.text

    // Converged?
    if (newText === text) {
      return {
        converged: true,
        iterations: i + 1,
        current: { text, metaRanges, metaValues, metaLabels, metrics, lines, correctness: correctness.map(() => true) },
        history
      }
    }

    // Check for cycles
    const newLines = layoutText(newText, maxWidth)
    const newMetrics = getMetrics(newLines)
    const newKey = metricsKey(newMetrics)

    for (let j = history.length - 1; j >= Math.max(0, history.length - 8); j--) {
      if (history[j].key === newKey) {
        const period = history.length - j
        const cycleStates = []
        for (let k = j; k < history.length; k++) {
          cycleStates.push(history[k])
        }
        const newCorrectness = checkCorrectness(newDesc.metaValues, newDesc.metaLabels, newMetrics)
        cycleStates.push({
          text: newText, metaRanges: newDesc.metaRanges,
          metaValues: newDesc.metaValues, metaLabels: newDesc.metaLabels,
          metrics: newMetrics, lines: newLines, key: newKey, correctness: newCorrectness
        })
        return {
          converged: false,
          oscillating: true,
          period,
          iterations: i + 1,
          states: cycleStates.slice(0, period),
          current: history[history.length - 1],
          history
        }
      }
    }

    text = newText
    metaRanges = newDesc.metaRanges
    metaValues = newDesc.metaValues
    metaLabels = newDesc.metaLabels
  }

  const lines = layoutText(text, maxWidth)
  const metrics = getMetrics(lines)
  const correctness = checkCorrectness(metaValues, metaLabels, metrics)
  return {
    converged: false, oscillating: false, iterations: maxIter,
    current: { text, metaRanges, metaValues, metaLabels, metrics, lines, correctness },
    history
  }
}

function checkCorrectness(values, labels, actualMetrics) {
  return labels.map((label, i) => values[i] === actualMetrics[label])
}

// --- Rendering state ---
let result = null
let oscillationTime = 0
let convergenceGlow = 0
let statusText = ''
let statusColor = TERRACOTTA_RGB

// Animation state for iteration reveal
let iterationRevealStart = 0
let currentIterationShowing = 0
let animPhase = 'idle' // 'iterating', 'converged', 'oscillating', 'idle'
let animStartTime = 0

// Track previous values for flash animation
let prevMetaValues = null
let flashTimers = [] // per-meta-range flash progress (1 = just changed, fades to 0)

// --- Determine which characters in a line are meta ---
function getLineMetaInfo(lineText, lineStartInFullText, metaRanges) {
  // Returns array of { isMeta, rangeIndex } per character
  const info = []
  for (let c = 0; c < lineText.length; c++) {
    let found = -1
    const absPos = lineStartInFullText + c
    for (let r = 0; r < metaRanges.length; r++) {
      if (absPos >= metaRanges[r][0] && absPos < metaRanges[r][1]) {
        found = r
        break
      }
    }
    info.push(found)
  }
  return info
}

function lerp(a, b, t) { return a + (b - a) * t }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)) }

// --- Draw a single text state ---
function drawState(state, baseX, textTop, alpha, showCorrectness) {
  const { lines, metaRanges, correctness } = state
  ctx.font = FONT
  ctx.textBaseline = 'top'

  let charOffset = 0
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i]
    const lineText = line.text
    const y = textTop + i * LINE_HEIGHT
    const metaInfo = getLineMetaInfo(lineText, charOffset, metaRanges)

    let x = baseX
    let runStart = 0
    while (runStart < lineText.length) {
      const rangeIdx = metaInfo[runStart]
      let runEnd = runStart + 1
      while (runEnd < lineText.length && metaInfo[runEnd] === rangeIdx) runEnd++

      const segment = lineText.slice(runStart, runEnd)
      if (rangeIdx >= 0) {
        // This is a self-referential number
        let r, g, b
        const flash = flashTimers[rangeIdx] || 0

        if (showCorrectness && correctness) {
          if (correctness[rangeIdx]) {
            // Correct: sage
            r = SAGE_RGB[0]; g = SAGE_RGB[1]; b = SAGE_RGB[2]
          } else {
            // Incorrect: terracotta
            r = TERRACOTTA_RGB[0]; g = TERRACOTTA_RGB[1]; b = TERRACOTTA_RGB[2]
          }
        } else {
          // Default ochre with convergence blend to sage
          r = lerp(OCHRE_RGB[0], SAGE_RGB[0], convergenceGlow * 0.8)
          g = lerp(OCHRE_RGB[1], SAGE_RGB[1], convergenceGlow * 0.8)
          b = lerp(OCHRE_RGB[2], SAGE_RGB[2], convergenceGlow * 0.8)
        }

        // Flash effect: brighten toward white
        if (flash > 0) {
          r = lerp(r, 255, flash * 0.5)
          g = lerp(g, 255, flash * 0.5)
          b = lerp(b, 255, flash * 0.5)
        }

        const baseAlpha = alpha * (0.95 + flash * 0.05)
        ctx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, ${baseAlpha})`

        // Draw a subtle background highlight behind the number
        if (alpha > 0.3) {
          const tw = ctx.measureText(segment).width
          ctx.save()
          ctx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, ${alpha * 0.08 + flash * 0.12})`
          const pad = 2
          ctx.fillRect(x - pad, y - 1, tw + pad * 2, FONT_SIZE + 4)
          ctx.restore()
          // Re-set text color
          ctx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, ${baseAlpha})`
        }
      } else {
        ctx.fillStyle = `rgba(${CREAM_RGB[0]}, ${CREAM_RGB[1]}, ${CREAM_RGB[2]}, ${alpha * 0.7})`
      }
      ctx.fillText(segment, x, y)
      x += ctx.measureText(segment).width
      runStart = runEnd
    }

    charOffset += lineText.length
  }
}

// --- Main render ---
let lastTime = 0

function render(time) {
  requestAnimationFrame(render)
  const dt = Math.min(time - lastTime, 50)
  lastTime = time

  if (needsRecalc) {
    needsRecalc = false
    oscillationTime = 0
    animPhase = 'iterating'
    animStartTime = time
    currentIterationShowing = 0

    // Save previous values for flash detection
    if (result && result.current) {
      prevMetaValues = result.current.metaValues ? [...result.current.metaValues] : null
    }

    result = findFixedPoint(containerWidth)

    // Detect which values changed and trigger flash
    if (result.current.metaValues) {
      flashTimers = result.current.metaValues.map((v, i) => {
        if (prevMetaValues && prevMetaValues[i] !== undefined && prevMetaValues[i] !== v) {
          return 1.0 // full flash
        }
        return 0
      })
    }

    if (result.converged) {
      statusText = `converged after ${result.iterations} iteration${result.iterations !== 1 ? 's' : ''}`
      statusColor = SAGE_RGB
      animPhase = 'converged'
    } else if (result.oscillating) {
      statusText = `oscillating · period ${result.period} · ${result.iterations} iterations`
      statusColor = TERRACOTTA_RGB
      animPhase = 'oscillating'
    } else {
      statusText = `drifting · ${result.iterations} iterations · no fixed point found`
      statusColor = TERRACOTTA_RGB
      animPhase = 'oscillating'
    }
  }

  if (!result) return

  // Decay flash timers
  for (let i = 0; i < flashTimers.length; i++) {
    if (flashTimers[i] > 0) {
      flashTimers[i] = Math.max(0, flashTimers[i] - dt * 0.003)
    }
  }

  // Animate
  if (result.oscillating) {
    oscillationTime += dt * 0.001
  }
  const targetGlow = result.converged ? 1 : 0
  convergenceGlow += (targetGlow - convergenceGlow) * 0.04

  // Iteration counter animation
  const iterElapsed = time - animStartTime
  if (animPhase === 'iterating' || animPhase === 'converged' || animPhase === 'oscillating') {
    currentIterationShowing = Math.min(result.history.length, Math.floor(iterElapsed / 120) + 1)
  }

  // Clear
  ctx.clearRect(0, 0, W, H)

  const baseX = (W - containerWidth) / 2
  const maxLines = result.oscillating && result.states
    ? Math.max(...result.states.map(s => s.lines.length))
    : result.current.lines.length

  // Compute intro height to offset text below it
  const introHeight = Math.min(window.innerHeight * 0.08, 48) + 80
  const totalH = maxLines * LINE_HEIGHT
  const textTop = Math.max(introHeight + 30, (H - totalH) / 2 + 20)

  // Position iteration counter
  iterCounter.style.left = `${baseX}px`
  iterCounter.style.top = `${textTop - 28}px`

  // Convergence glow (soft sage shadow behind text)
  if (convergenceGlow > 0.01) {
    const cx = W / 2, cy = textTop + totalH / 2
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(containerWidth, totalH) * 0.7)
    grad.addColorStop(0, `rgba(${SAGE_RGB[0]}, ${SAGE_RGB[1]}, ${SAGE_RGB[2]}, ${convergenceGlow * 0.06})`)
    grad.addColorStop(1, 'transparent')
    ctx.fillStyle = grad
    ctx.fillRect(0, 0, W, H)
  }

  // Draw text states
  if (result.oscillating && result.states && result.states.length >= 2) {
    const period = result.states.length
    const phase = oscillationTime * 0.6
    const raw = phase % period
    const idx = Math.floor(raw)
    const frac = raw - idx
    const eased = frac < 0.5
      ? 2 * frac * frac
      : 1 - 2 * (1 - frac) * (1 - frac)

    const stateA = result.states[idx % period]
    const stateB = result.states[(idx + 1) % period]

    drawState(stateA, baseX, textTop, 1 - eased, true)
    drawState(stateB, baseX, textTop, eased, true)
  } else {
    drawState(result.current, baseX, textTop, 1, result.converged)
  }

  // --- Status line ---
  ctx.font = '11px Literata, Georgia, serif'
  ctx.textBaseline = 'top'
  let statusAlpha = 0.55
  if (result.oscillating) {
    statusAlpha = 0.3 + 0.25 * (0.5 + 0.5 * Math.sin(oscillationTime * 3))
  }
  ctx.fillStyle = `rgba(${statusColor[0]}, ${statusColor[1]}, ${statusColor[2]}, ${statusAlpha})`
  ctx.fillText(statusText, baseX, textTop - 26)

  // Container width label
  ctx.fillStyle = `rgba(${CREAM_RGB[0]}, ${CREAM_RGB[1]}, ${CREAM_RGB[2]}, 0.15)`
  const wLabel = `${containerWidth}px`
  ctx.fillText(wLabel, baseX + containerWidth - ctx.measureText(wLabel).width, textTop - 26)

  // --- Iteration dots ---
  if (result.history.length > 1) {
    const dotY = textTop + totalH + 30
    const dotSpacing = 18
    ctx.font = '10px Literata, Georgia, serif'
    ctx.fillStyle = `rgba(${CREAM_RGB[0]}, ${CREAM_RGB[1]}, ${CREAM_RGB[2]}, 0.18)`
    ctx.fillText('attempts', baseX, dotY - 4)

    const visibleCount = Math.min(currentIterationShowing, result.history.length)

    for (let i = 0; i < visibleCount; i++) {
      const x = baseX + 68 + i * dotSpacing
      const isLast = i === result.history.length - 1

      let similarity = 0
      if (i < result.history.length - 1) {
        similarity = result.history[i].key === result.history[i + 1].key ? 1 : 0.3
      } else if (result.converged) {
        similarity = 1
      }

      const r = lerp(TERRACOTTA_RGB[0], SAGE_RGB[0], similarity)
      const g = lerp(TERRACOTTA_RGB[1], SAGE_RGB[1], similarity)
      const b = lerp(TERRACOTTA_RGB[2], SAGE_RGB[2], similarity)

      // Animate dot appearance
      const dotAge = clamp((time - animStartTime - i * 120) / 200, 0, 1)
      const dotScale = dotAge < 1 ? 0.5 + dotAge * 0.5 : 1

      ctx.beginPath()
      const radius = (isLast ? 4.5 : 3) * dotScale
      ctx.arc(x, dotY + 3, radius, 0, Math.PI * 2)
      ctx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, ${(isLast ? 0.8 : 0.4) * dotAge})`
      ctx.fill()

      // Attempt number on hover area
      if (isLast && result.converged) {
        // Subtle check mark for converged
        ctx.font = '10px Literata, Georgia, serif'
        ctx.fillStyle = `rgba(${SAGE_RGB[0]}, ${SAGE_RGB[1]}, ${SAGE_RGB[2]}, 0.5)`
        ctx.fillText('✓', x + 8, dotY - 2)
      }

      if (i < visibleCount - 1) {
        ctx.strokeStyle = `rgba(${CREAM_RGB[0]}, ${CREAM_RGB[1]}, ${CREAM_RGB[2]}, 0.06)`
        ctx.lineWidth = 1
        ctx.beginPath()
        ctx.moveTo(x + 4, dotY + 3)
        ctx.lineTo(x + dotSpacing - 4, dotY + 3)
        ctx.stroke()
      }
    }
  }

  // --- Container edge guides ---
  const edgeAlpha = result.converged ? 0.06 : 0.04
  ctx.strokeStyle = `rgba(${CREAM_RGB[0]}, ${CREAM_RGB[1]}, ${CREAM_RGB[2]}, ${edgeAlpha})`
  ctx.lineWidth = 1
  ctx.beginPath()
  ctx.moveTo(baseX - 1, textTop - 32)
  ctx.lineTo(baseX - 1, textTop + totalH + 22)
  ctx.stroke()
  ctx.beginPath()
  ctx.moveTo(baseX + containerWidth + 1, textTop - 32)
  ctx.lineTo(baseX + containerWidth + 1, textTop + totalH + 22)
  ctx.stroke()

  // --- Footer ---
  ctx.font = '10px Literata, Georgia, serif'
  ctx.fillStyle = `rgba(${CREAM_RGB[0]}, ${CREAM_RGB[1]}, ${CREAM_RGB[2]}, 0.1)`
  ctx.textBaseline = 'bottom'
  ctx.fillText('OUROBOROS', baseX, H - 20)
  ctx.textBaseline = 'top'
}

// --- Init ---
document.fonts.ready.then(() => {
  const loading = document.getElementById('loading')
  loading.classList.add('hidden')
  setTimeout(() => loading.remove(), 1000)
  requestAnimationFrame(render)
})
</script>
</body>
