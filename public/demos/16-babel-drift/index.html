<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babel Drift</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=Fraunces:opsz,wght@7..72,400;7..72,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #08080e; }

  #scene {
    position: fixed; inset: 0;
    overflow: hidden;
  }

  /* Spark canvas — only used for particle effects, not text */
  #spark-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 5;
  }

  /* Vignette overlay */
  #vignette {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 6;
    background: radial-gradient(ellipse at center, rgba(8,8,14,0) 35%, rgba(8,8,14,0.4) 100%);
  }

  .stream {
    position: absolute;
    top: 0; left: 0;
    will-change: transform;
    pointer-events: none;
  }

  .stream-label {
    font: 500 13px 'Fraunces', Georgia, serif;
    letter-spacing: 0.08em;
    opacity: 0.7;
    margin-bottom: 10px;
    white-space: nowrap;
  }

  .stream-line {
    font: 18px/28px 'Fraunces', Georgia, serif;
    white-space: nowrap;
    overflow: hidden;
    height: 28px;
    pointer-events: auto;
    user-select: text;
    -webkit-user-select: text;
  }

  /* Collision zone container */
  .collision-zone {
    position: absolute;
    top: 0; left: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 3;
    will-change: transform;
  }

  .collision-glow {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .contact-label {
    position: absolute;
    font: italic 14px 'Fraunces', Georgia, serif;
    color: #C49A3C;
    white-space: nowrap;
    pointer-events: none;
  }

  .pidgin-line {
    font: 500 20px/28px 'Fraunces', Georgia, serif;
    white-space: nowrap;
    height: 28px;
    pointer-events: auto;
    user-select: text;
    -webkit-user-select: text;
  }

  .pidgin-char {
    display: inline;
    text-shadow: 0 0 6px #C49A3C;
  }

  #intro {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #08080e; z-index: 30;
    transition: opacity 1.4s ease-out;
    cursor: pointer;
  }
  #intro.hidden { opacity: 0; pointer-events: none; }
  #intro h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 300; font-size: 42px;
    color: #e8e4dc; letter-spacing: -0.01em;
    margin-bottom: 16px;
  }
  #intro p {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 17px; color: #998877;
    max-width: 400px; text-align: center;
    line-height: 1.6; margin-bottom: 32px;
  }
  #intro .start-hint {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 13px; color: #665544;
    letter-spacing: 0.06em;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }

  #controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 16px; align-items: center;
    background: rgba(8, 8, 14, 0.85); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; padding: 10px 18px;
    font: 13px 'Fraunces', Georgia, serif; color: #665544; z-index: 10;
    backdrop-filter: blur(8px);
  }

  #controls label { display: flex; align-items: center; gap: 6px; white-space: nowrap; }

  #controls input[type="range"] {
    width: 80px; accent-color: #C2714F;
  }

  #controls select {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: #998877; font: 12px 'Fraunces', Georgia, serif; padding: 4px 6px; border-radius: 4px;
  }

  #controls input[type="text"] {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: #c8c0b8; font: 12px 'Fraunces', Georgia, serif; padding: 4px 8px; border-radius: 4px;
    width: 160px;
  }

  #controls button {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    color: #998877; font: 12px 'Fraunces', Georgia, serif; padding: 4px 10px; border-radius: 4px;
    cursor: pointer;
  }
  #controls button:hover { background: rgba(255,255,255,0.12); }

  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #665544; font: 15px 'Fraunces', Georgia, serif; letter-spacing: 0.04em;
    background: #08080e; z-index: 40; transition: opacity 0.8s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="loading">tongues drifting...</div>
<div id="intro">
  <h1>Babel Drift</h1>
  <p>Languages drift. When they collide, something new is born.</p>
  <span class="start-hint">click anywhere to begin</span>
</div>
<div id="scene"></div>
<canvas id="spark-canvas"></canvas>
<div id="vignette"></div>
<div id="controls">
  <label>speed <input type="range" id="speed" min="0" max="3" step="0.1" value="0.6"></label>
  <select id="streamSelect">
    <option value="0">English</option>
    <option value="1">Arabic</option>
    <option value="2">Chinese</option>
    <option value="3">Spanish</option>
  </select>
  <input type="text" id="userText" placeholder="type into stream...">
  <button id="injectBtn">inject</button>
</div>
<script type="module">
import { prepareWithSegments, layoutNextLine } from 'https://esm.sh/@chenglou/pretext'

// --- Text content ---

const englishText = `Language is the oldest technology. Before wheels, before fire pits lined with stone, humans shaped breath into meaning. Every sentence is an act of compression — centuries of shared experience packed into vibrations that cross the air between two people. Writing pushed that further. Marks on clay, ink on paper, pixels on glass: each leap let us speak across time. Typography is how we give that impulse a body. The word carries the weight of every mouth that has spoken it, every hand that has written it, every eye that has read it. And still we keep talking, keep writing, keep reaching.`

const arabicText = `اللغة هي أقدم تقنية عرفها الإنسان. قبل العجلات وقبل مواقد النار، صاغ البشر أنفاسهم في معانٍ. كل جملة هي فعل ضغط — قرون من التجارب المشتركة مكثفة في اهتزازات تعبر الهواء بين شخصين. والكتابة دفعت ذلك أبعد. علامات على الطين وحبر على الورق وبكسلات على الزجاج: كل قفزة أتاحت لنا أن نتحدث عبر الزمن. فن الخط هو كيف نمنح ذلك الدافع جسداً. الكلمة تحمل ثقل كل فم نطقها وكل يد كتبتها وكل عين قرأتها. ومع ذلك نستمر في الكلام والكتابة والتواصل.`

const chineseText = `语言是人类最古老的技术。在车轮之前，在石砌火坑之前，人类就将呼吸塑造成意义。每一个句子都是一次压缩——几个世纪的共同经验被浓缩在两个人之间穿越空气的振动中。书写将这一切推得更远。泥板上的刻痕、纸上的墨迹、玻璃上的像素：每一次飞跃都让我们跨越时间说话。字体排印，就是我们赋予这种冲动以形体的方式。文字承载着每一张说过它的嘴、每一只写过它的手、每一双读过它的眼的重量。而我们仍在说，仍在写，仍在伸出手去。`

const spanishText = `El lenguaje es la tecnología más antigua. Antes de las ruedas, antes de los fogones de piedra, los humanos daban forma al aliento en significado. Cada oración es un acto de compresión — siglos de experiencia compartida empaquetados en vibraciones que cruzan el aire entre dos personas. La escritura fue más lejos. Marcas en arcilla, tinta en papel, píxeles en cristal: cada salto nos permitió hablar a través del tiempo. La tipografía es cómo le damos cuerpo a ese impulso. La palabra lleva el peso de cada boca que la ha pronunciado, cada mano que la ha escrito, cada ojo que la ha leído. Y seguimos hablando, escribiendo, alcanzando.`

// --- Config ---

const FONT_SIZE = 18
const LINE_HEIGHT = 28
const STREAM_WIDTH = 360
const BG = '#08080e'
const PIDGIN_COLOR = '#C49A3C'

const COLORS = {
  english: '#C2714F',
  arabic:  '#C49A3C',
  chinese: '#8B9E7E',
  spanish: '#9B8EA8'
}

const LABEL_NAMES = {
  english: 'English',
  arabic: 'العربية',
  chinese: '中文',
  spanish: 'Español'
}

// --- Spark canvas (particles only, no text) ---

const sparkCanvas = document.getElementById('spark-canvas')
const sparkCtx = sparkCanvas.getContext('2d')
let W, H, dpr

function resize() {
  dpr = window.devicePixelRatio || 1
  W = window.innerWidth
  H = window.innerHeight
  sparkCanvas.width = W * dpr
  sparkCanvas.height = H * dpr
  sparkCtx.setTransform(dpr, 0, 0, dpr, 0, 0)
}
resize()
window.addEventListener('resize', resize)

// --- Scene container ---

const scene = document.getElementById('scene')

// --- Stream state ---

const streamFont = `${FONT_SIZE}px 'Fraunces', Georgia, serif`
const defaultTexts = [englishText, arabicText, chineseText, spanishText]
const colorKeys = ['english', 'arabic', 'chinese', 'spanish']

const streams = []

// --- Phased introduction ---
let phase = 0
let phaseTimer = 0
const PHASE_1_DELAY = 480
const PHASE_2_DELAY = 360
let firstCollisionFrame = -1
let streamsActive = [true, true, false, false]

function initStreams() {
  const texts = defaultTexts.slice()

  streams[0] = {
    x: -STREAM_WIDTH - 40, y: H * 0.38,
    vx: 0.35, vy: 0,
    color: COLORS.english,
    text: texts[0],
    prepared: null,
    lines: null,
    name: 'english',
    opacity: 1,
    el: null
  }

  streams[1] = {
    x: W + 40, y: H * 0.38,
    vx: -0.35, vy: 0,
    color: COLORS.arabic,
    text: texts[1],
    prepared: null,
    lines: null,
    name: 'arabic',
    opacity: 1,
    el: null
  }

  streams[2] = {
    x: W * 0.55, y: -300,
    vx: 0, vy: 0.3,
    color: COLORS.chinese,
    text: texts[2],
    prepared: null,
    lines: null,
    name: 'chinese',
    opacity: 0,
    el: null
  }

  streams[3] = {
    x: W * 0.18, y: H + 40,
    vx: 0, vy: -0.3,
    color: COLORS.spanish,
    text: texts[3],
    prepared: null,
    lines: null,
    name: 'spanish',
    opacity: 0,
    el: null
  }

  // Create DOM elements for each stream
  for (let i = 0; i < 4; i++) {
    const s = streams[i]
    const el = document.createElement('div')
    el.className = 'stream'
    el.style.width = STREAM_WIDTH + 'px'
    scene.appendChild(el)
    s.el = el
  }
}

function prepareStream(s) {
  s.prepared = prepareWithSegments(s.text, streamFont)
  s.lines = layoutAllLines(s.prepared)
  rebuildStreamDOM(s)
}

function layoutAllLines(prepared) {
  const lines = []
  let cursor = { segmentIndex: 0, graphemeIndex: 0 }
  while (true) {
    const line = layoutNextLine(prepared, cursor, STREAM_WIDTH)
    if (!line) break
    lines.push(line)
    cursor = line.end
  }
  return lines
}

function rebuildStreamDOM(s) {
  if (!s.el || !s.lines) return
  s.el.innerHTML = ''

  // Label
  const label = document.createElement('div')
  label.className = 'stream-label'
  label.style.color = s.color
  label.textContent = LABEL_NAMES[s.name] || ''
  s.el.appendChild(label)

  // Text lines
  for (const line of s.lines) {
    const lineEl = document.createElement('div')
    lineEl.className = 'stream-line'
    lineEl.style.color = s.color
    lineEl.style.opacity = '0.85'
    lineEl.textContent = line.text
    s.el.appendChild(lineEl)
  }
}

// --- Spark particles (canvas-only, no text) ---

const sparkParticles = []

function spawnSpark(x, y, colorA, colorB) {
  if (sparkParticles.length > 300) return
  const count = 2 + Math.floor(Math.random() * 3)
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2
    const speed = 0.5 + Math.random() * 2
    const isPidgin = Math.random() > 0.5
    sparkParticles.push({
      x: x + (Math.random() - 0.5) * 20,
      y: y + (Math.random() - 0.5) * 16,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 40 + Math.random() * 80,
      maxLife: 40 + Math.random() * 80,
      size: isPidgin ? 2 + Math.random() * 3 : 1 + Math.random() * 2,
      color: isPidgin ? PIDGIN_COLOR : (Math.random() > 0.5 ? colorA : colorB)
    })
  }
}

function updateSparkParticles() {
  for (let i = sparkParticles.length - 1; i >= 0; i--) {
    const p = sparkParticles[i]
    p.x += p.vx
    p.y += p.vy
    p.vx *= 0.98
    p.vy *= 0.98
    p.life--
    if (p.life <= 0) sparkParticles.splice(i, 1)
  }
}

function drawSparkParticles() {
  sparkCtx.clearRect(0, 0, W, H)
  for (const p of sparkParticles) {
    const t = p.life / p.maxLife
    const alpha = t * 0.8
    sparkCtx.globalAlpha = alpha
    sparkCtx.fillStyle = p.color
    sparkCtx.shadowColor = p.color
    sparkCtx.shadowBlur = 6 * t
    sparkCtx.beginPath()
    sparkCtx.arc(p.x, p.y, p.size * t, 0, Math.PI * 2)
    sparkCtx.fill()
  }
  sparkCtx.shadowBlur = 0
  sparkCtx.globalAlpha = 1
}

// --- Collision detection ---

function getStreamBounds(s) {
  const lineCount = s.lines ? s.lines.length : 0
  return {
    x: s.x,
    y: s.y,
    w: STREAM_WIDTH,
    h: lineCount * LINE_HEIGHT + 38 // label height offset
  }
}

function overlapRect(a, b) {
  const x = Math.max(a.x, b.x)
  const y = Math.max(a.y, b.y)
  const x2 = Math.min(a.x + a.w, b.x + b.w)
  const y2 = Math.min(a.y + a.h, b.y + b.h)
  if (x2 <= x || y2 <= y) return null
  return { x, y, w: x2 - x, h: y2 - y }
}

// --- Interleave characters for pidgin effect ---

function interleaveStrings(a, b) {
  let result = ''
  const len = Math.max(a.length, b.length)
  for (let i = 0; i < len; i++) {
    if (i < a.length) result += a[i]
    if (i < b.length) result += b[i]
  }
  return result
}

// --- Collision zone DOM management ---

const collisionZones = []

function getOrCreateCollisionZone(idx) {
  if (!collisionZones[idx]) {
    const el = document.createElement('div')
    el.className = 'collision-zone'
    scene.appendChild(el)
    collisionZones[idx] = { el, lastKey: '' }
  }
  return collisionZones[idx]
}

function hideCollisionZones(activeCount) {
  for (let i = activeCount; i < collisionZones.length; i++) {
    if (collisionZones[i]) {
      collisionZones[i].el.style.display = 'none'
    }
  }
}

function buildCollisionZoneContent(zone, ov, sA, sB, t) {
  const el = zone.el
  el.style.display = 'block'
  el.style.transform = `translate(${ov.x}px, ${ov.y}px)`
  el.style.width = ov.w + 'px'
  el.style.height = ov.h + 'px'

  // Collect text lines from each stream in the overlap region
  const linesA = []
  // Account for label height (approx 38px)
  const labelOffset = 38
  for (let l = 0; l < sA.lines.length; l++) {
    const ly = sA.y + labelOffset + l * LINE_HEIGHT
    if (ly + LINE_HEIGHT > ov.y && ly < ov.y + ov.h) {
      linesA.push({ text: sA.lines[l].text, y: ly })
    }
  }

  const linesB = []
  for (let l = 0; l < sB.lines.length; l++) {
    const ly = sB.y + labelOffset + l * LINE_HEIGHT
    if (ly + LINE_HEIGHT > ov.y && ly < ov.y + ov.h) {
      linesB.push({ text: sB.lines[l].text, y: ly })
    }
  }

  // Build a key to avoid rebuilding DOM every frame
  const key = `${Math.round(ov.x)},${Math.round(ov.y)},${Math.round(ov.w)},${Math.round(ov.h)},${linesA.length},${linesB.length}`

  // Only rebuild content when the line pairing changes significantly
  if (zone.lastKey !== key) {
    zone.lastKey = key
    el.innerHTML = ''

    // Glow background layers (CSS-based)
    const shimmer = 0.25 + Math.sin(t * 0.002) * 0.1
    const glow = document.createElement('div')
    glow.className = 'collision-glow'
    const radius = Math.max(ov.w, ov.h) * 0.9
    glow.style.background = `
      radial-gradient(ellipse at center, rgba(196,154,60,${(shimmer * 0.35).toFixed(3)}) 0%, rgba(194,113,79,${(shimmer * 0.15).toFixed(3)}) 40%, transparent 100%),
      radial-gradient(ellipse at center, rgba(255,230,180,${(shimmer * 0.2).toFixed(3)}) 0%, transparent 100%)
    `
    glow.style.inset = `-${radius * 0.3}px`
    el.appendChild(glow)

    // Contact label
    const contactLabel = document.createElement('div')
    contactLabel.className = 'contact-label'
    contactLabel.textContent = 'contact zone'
    contactLabel.style.left = ((ov.w / 2) - 38) + 'px'
    contactLabel.style.top = '-20px'
    contactLabel.style.opacity = (0.5 + Math.sin(t * 0.003) * 0.15).toFixed(3)
    el.appendChild(contactLabel)

    // Pidgin text lines
    for (let la = 0; la < linesA.length; la++) {
      const lineA = linesA[la]
      let closestB = linesB[0]
      let closestDist = Infinity
      for (const lb of linesB) {
        const d = Math.abs(lb.y - lineA.y)
        if (d < closestDist) { closestDist = d; closestB = lb }
      }

      if (closestB) {
        const pidgin = interleaveStrings(lineA.text, closestB.text)
        const pidginChars = [...pidgin]

        const pidginLine = document.createElement('div')
        pidginLine.className = 'pidgin-line'
        pidginLine.style.position = 'absolute'
        pidginLine.style.top = (lineA.y - ov.y) + 'px'
        pidginLine.style.left = '0'
        pidginLine.style.width = ov.w + 'px'
        pidginLine.style.overflow = 'hidden'

        for (let c = 0; c < pidginChars.length; c++) {
          const charSpan = document.createElement('span')
          charSpan.className = 'pidgin-char'
          charSpan.textContent = pidginChars[c]

          const phaseVal = Math.sin(t * 0.004 + c * 0.25) * 0.5 + 0.5
          if (c % 3 === 0) {
            charSpan.style.color = PIDGIN_COLOR
          } else if (c % 3 === 1) {
            charSpan.style.color = sA.color
          } else {
            charSpan.style.color = sB.color
          }
          charSpan.style.opacity = (0.75 + phaseVal * 0.25).toFixed(3)
          pidginLine.appendChild(charSpan)
        }
        el.appendChild(pidginLine)
      }
    }
  }
}

// --- Speed control ---

const speedSlider = document.getElementById('speed')
let speedMul = 0.6

speedSlider.addEventListener('input', () => {
  speedMul = parseFloat(speedSlider.value)
})

// --- User text injection ---

const streamSelect = document.getElementById('streamSelect')
const userTextInput = document.getElementById('userText')
const injectBtn = document.getElementById('injectBtn')

injectBtn.addEventListener('click', () => {
  const idx = parseInt(streamSelect.value)
  const txt = userTextInput.value.trim()
  if (!txt || !streamsActive[idx]) return
  streams[idx].text = txt + ' ' + streams[idx].text
  prepareStream(streams[idx])
  userTextInput.value = ''
})

userTextInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') injectBtn.click()
})

// --- Toroidal wrapping ---

function wrapStream(s) {
  const bounds = getStreamBounds(s)
  if (s.vx > 0 && s.x > W + 20) s.x = -bounds.w - 20
  if (s.vx < 0 && s.x + bounds.w < -20) s.x = W + 20
  if (s.vy > 0 && s.y > H + 20) s.y = -bounds.h - 20
  if (s.vy < 0 && s.y + bounds.h < -20) s.y = H + 20
}

// --- Render ---

let frameCount = 0
let started = false

function render(t) {
  requestAnimationFrame(render)
  if (!started) return
  frameCount++

  // Update phase: introduce streams over time
  if (phase === 0 && firstCollisionFrame > 0 && frameCount - firstCollisionFrame > PHASE_1_DELAY) {
    phase = 1
    phaseTimer = frameCount
    streamsActive[2] = true
  }
  if (phase === 1 && frameCount - phaseTimer > PHASE_2_DELAY) {
    phase = 2
    streamsActive[3] = true
  }

  // Fade in newly activated streams
  for (let i = 2; i < 4; i++) {
    if (streamsActive[i] && streams[i].opacity < 1) {
      streams[i].opacity = Math.min(1, streams[i].opacity + 0.005)
    }
  }

  // Update stream positions
  for (let i = 0; i < 4; i++) {
    if (!streamsActive[i]) continue
    const s = streams[i]
    s.x += s.vx * speedMul
    s.y += s.vy * speedMul
    wrapStream(s)
  }

  // Update DOM positions for streams
  for (let i = 0; i < 4; i++) {
    const s = streams[i]
    if (!streamsActive[i] || !s.el) {
      if (s.el) s.el.style.display = 'none'
      continue
    }
    s.el.style.display = 'block'
    s.el.style.transform = `translate(${s.x}px, ${s.y}px)`
    s.el.style.opacity = s.opacity
  }

  // Find all collision pairs
  const collisions = []
  for (let i = 0; i < 4; i++) {
    if (!streamsActive[i]) continue
    for (let j = i + 1; j < 4; j++) {
      if (!streamsActive[j]) continue
      if (!streams[i].lines || !streams[j].lines) continue
      const boundsA = getStreamBounds(streams[i])
      const boundsB = getStreamBounds(streams[j])
      const overlap = overlapRect(boundsA, boundsB)
      if (overlap) {
        collisions.push({ i, j, overlap })
        if (firstCollisionFrame < 0) {
          firstCollisionFrame = frameCount
        }
      }
    }
  }

  // Update collision zones
  for (let ci = 0; ci < collisions.length; ci++) {
    const col = collisions[ci]
    const sA = streams[col.i]
    const sB = streams[col.j]
    const zone = getOrCreateCollisionZone(ci)
    buildCollisionZoneContent(zone, col.overlap, sA, sB, t)

    // Spawn spark particles at collision boundary edges
    if (frameCount % 4 === 0) {
      const ov = col.overlap
      spawnSpark(ov.x + Math.random() * ov.w, ov.y, sA.color, sB.color)
      spawnSpark(ov.x + Math.random() * ov.w, ov.y + ov.h, sA.color, sB.color)
      spawnSpark(ov.x, ov.y + Math.random() * ov.h, sA.color, sB.color)
      spawnSpark(ov.x + ov.w, ov.y + Math.random() * ov.h, sA.color, sB.color)
    }
  }
  hideCollisionZones(collisions.length)

  // Draw spark particles on canvas (non-text visual effect)
  updateSparkParticles()
  drawSparkParticles()
}

// --- Init ---

initStreams()

Promise.all(streams.map(s => {
  return new Promise(resolve => {
    try {
      prepareStream(s)
    } catch(e) {
      console.warn('Failed to prepare stream:', s.name, e)
    }
    resolve()
  })
})).then(() => {
  const loading = document.getElementById('loading')
  loading.classList.add('hidden')
  setTimeout(() => loading.remove(), 800)
  requestAnimationFrame(render)

  const intro = document.getElementById('intro')
  intro.addEventListener('click', () => {
    intro.classList.add('hidden')
    started = true
    setTimeout(() => intro.remove(), 1500)
  })
})

</script>
