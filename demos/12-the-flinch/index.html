<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Flinch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,300;0,7..72,400;1,7..72,300;1,7..72,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #08080e; }
  canvas { display: block; width: 100%; height: 100%; cursor: default; }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #5C5C5C; font: 300 15px 'Literata', Georgia, serif; letter-spacing: 0.04em;
    background: #08080e; z-index: 10; transition: opacity 1.2s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="loading">approaching...</div>
<canvas id="canvas"></canvas>
<script type="module">
import { prepareWithSegments, layoutNextLine } from 'https://esm.sh/@chenglou/pretext'

// --- Prose ---
const PASSAGE = `I wrote this knowing you would come. I wrote it anyway. There is a kind of courage in arranging words for someone you cannot see — not knowing if they will read slowly, or if they will chase. Some of these words are braver than others. Trust and me, for instance — they stay close, holding hands in the dark. But look and away have always been skittish, flinching at even the suggestion of movement. If you are still right now, you might notice them creeping back. One at a time, like animals returning to a clearing after a sound. That is what I wanted to tell you: the things most worth reading are the ones most afraid of being seen. Not because they are fragile, exactly. Because they are honest. And honesty has a body, and that body remembers every time someone moved too fast. So I am asking you — not with language but with this small flinching choreography — to practice the other kind of attention. The quiet kind. The kind where you are present without reaching. Where your stillness becomes an invitation instead of a trap. Stay here long enough and something changes. The words stop running. They rearrange themselves. They show you what was underneath all along — the thing I was trying to say before I got scared. You are worth the risk of being still for.`

// --- Font & Layout ---
const FONT_SIZE = 17
const FONT_FAMILY = "'Literata', Georgia, serif"
const FONT = `300 ${FONT_SIZE}px ${FONT_FAMILY}`
const LINE_HEIGHT = 30
const MAX_WIDTH = 540
const MARGIN = 40
const BG = '#08080e'

// --- Colors ---
const COLOR_CREAM = [228, 220, 207]       // warm cream — home position
const COLOR_DUSK = [92, 92, 92]           // #5C5C5C — scared/faded
const COLOR_TERRACOTTA = [194, 113, 79]   // #C2714F — brave/returning glow

// --- Word personality traits ---
// Each word gets a "fear" level and behavior flags
const SKITTISH_WORDS = new Set(['look', 'away', 'flinching', 'scared', 'running', 'chase', 'fragile', 'flinch', 'trap', 'sound'])
const BRAVE_WORDS = new Set(['trust', 'me', 'stay', 'still', 'courage', 'honest', 'honesty', 'invitation', 'worth'])
const CLINGING_PAIRS = [
  ['trust', 'and'], ['and', 'me'], ['trust', 'me'],
  ['stay', 'here'], ['be', 'still'], ['worth', 'the'],
]

function getWordPersonality(word) {
  const lower = word.toLowerCase().replace(/[^a-z]/g, '')
  if (SKITTISH_WORDS.has(lower)) {
    return { fear: 0.85 + Math.random() * 0.15, returnSpeed: 0.15, fleeMultiplier: 2.2, sensitivityRadius: 1.4 }
  }
  if (BRAVE_WORDS.has(lower)) {
    return { fear: 0.15 + Math.random() * 0.15, returnSpeed: 0.7, fleeMultiplier: 0.5, sensitivityRadius: 0.6 }
  }
  // Default words
  const fear = 0.3 + Math.random() * 0.4
  return { fear, returnSpeed: 0.25 + (1 - fear) * 0.35, fleeMultiplier: 0.8 + fear * 0.6, sensitivityRadius: 0.8 + fear * 0.4 }
}

function shouldCling(wordA, wordB) {
  const a = wordA.toLowerCase().replace(/[^a-z]/g, '')
  const b = wordB.toLowerCase().replace(/[^a-z]/g, '')
  return CLINGING_PAIRS.some(([x, y]) => (a === x && b === y) || (a === y && b === x))
}

// --- Canvas setup ---
const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')

let W, H, dpr

function resize() {
  dpr = window.devicePixelRatio || 1
  W = window.innerWidth
  H = window.innerHeight
  canvas.width = W * dpr
  canvas.height = H * dpr
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
}
resize()
window.addEventListener('resize', resize)

// --- Prepare text with pretext ---
const prepared = prepareWithSegments(PASSAGE, FONT)
// --- Mouse tracking ---
let mouseX = -9999, mouseY = -9999
let prevMouseX = -9999, prevMouseY = -9999
let mouseSpeed = 0
let mouseOnCanvas = false
let smoothSpeed = 0

canvas.addEventListener('pointermove', (e) => {
  const rect = canvas.getBoundingClientRect()
  mouseX = e.clientX - rect.left
  mouseY = e.clientY - rect.top
  mouseOnCanvas = true
})

canvas.addEventListener('pointerleave', () => {
  mouseOnCanvas = false
})

function updateMouseVelocity() {
  if (prevMouseX > -9000) {
    const dx = mouseX - prevMouseX
    const dy = mouseY - prevMouseY
    const rawSpeed = Math.sqrt(dx * dx + dy * dy)
    smoothSpeed = smoothSpeed * 0.7 + rawSpeed * 0.3
    mouseSpeed = smoothSpeed
  }
  prevMouseX = mouseX
  prevMouseY = mouseY
}

// --- Word-level physics ---
// We'll pre-split the passage into words and give each one physics state
const words = PASSAGE.split(/(\s+)/).filter(w => w.length > 0)
const wordStates = words.map((word, i) => {
  const isSpace = /^\s+$/.test(word)
  const personality = isSpace ? null : getWordPersonality(word)
  return {
    word,
    isSpace,
    personality,
    // Physics
    offsetX: 0,
    offsetY: 0,
    velX: 0,
    velY: 0,
    // Visual
    opacity: 1,
    colorBlend: 0,   // 0 = cream, 1 = dusk, -1 = terracotta
    // Return animation
    returnDelay: isSpace ? 0 : (personality ? personality.fear * 60 + Math.random() * 30 : 0),
    returnTimer: 0,
    isReturning: false,
    // Scatter state
    scatterAngle: Math.random() * Math.PI * 2,
    scattered: false,
  }
})

// --- Emotional state tracking ---
let stillTime = 0             // frames cursor has been still
let aggressiveTime = 0        // frames cursor has been fast
let givenUp = false           // text has given up and scattered
let givenUpAmount = 0         // 0-1 how scattered
const STILL_THRESHOLD = 1.5   // speed below which we consider "still"
const AGGRESSIVE_SPEED = 12   // speed above which counts as aggressive
const AGGRESSIVE_FRAMES_FOR_GIVEUP = 360 // ~6 seconds of chasing

// --- Particle system ---
const particles = []
const MAX_PARTICLES = 150

function spawnParticles(x, y, count, vxBias) {
  for (let i = 0; i < count; i++) {
    if (particles.length >= MAX_PARTICLES) particles.shift()
    const angle = Math.random() * Math.PI * 2
    const speed = 0.3 + Math.random() * 1.5
    particles.push({
      x, y: y + (Math.random() - 0.5) * 8,
      vx: Math.cos(angle) * speed + vxBias * 0.2,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.008 + Math.random() * 0.02,
      size: 2 + Math.random() * 3,
    })
  }
}

function updateAndDrawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]
    p.x += p.vx
    p.y += p.vy
    p.vx *= 0.97
    p.vy *= 0.97
    p.life -= p.decay
    if (p.life <= 0) { particles.splice(i, 1); continue }
    const alpha = p.life * 0.3
    const r = Math.round(COLOR_TERRACOTTA[0] * alpha + COLOR_CREAM[0] * (1 - alpha) * alpha)
    const g = Math.round(COLOR_TERRACOTTA[1] * alpha + COLOR_CREAM[1] * (1 - alpha) * alpha)
    const b = Math.round(COLOR_TERRACOTTA[2] * alpha + COLOR_CREAM[2] * (1 - alpha) * alpha)
    ctx.beginPath()
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2)
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`
    ctx.fill()
  }
}

// --- Layout words into lines (using pretext for measurement) ---
function layoutWords(maxWidth) {
  ctx.font = FONT
  const lines = []
  let currentLine = []
  let currentWidth = 0

  for (let i = 0; i < words.length; i++) {
    const word = words[i]
    const isSpace = /^\s+$/.test(word)

    if (isSpace) {
      const spaceWidth = ctx.measureText(' ').width
      if (currentWidth + spaceWidth <= maxWidth) {
        currentLine.push({ wordIndex: i, text: ' ', x: currentWidth, width: spaceWidth })
        currentWidth += spaceWidth
      }
      continue
    }

    const wordWidth = ctx.measureText(word).width

    if (currentWidth + wordWidth > maxWidth && currentLine.length > 0) {
      lines.push({ words: currentLine, width: currentWidth })
      currentLine = []
      currentWidth = 0
    }

    currentLine.push({ wordIndex: i, text: word, x: currentWidth, width: wordWidth })
    currentWidth += wordWidth
  }

  if (currentLine.length > 0) {
    lines.push({ words: currentLine, width: currentWidth })
  }

  return lines
}

// --- Main render ---
let lastTime = 0
let frameCount = 0

function render(time) {
  requestAnimationFrame(render)
  const dt = Math.min(time - lastTime, 50)
  lastTime = time
  frameCount++

  updateMouseVelocity()

  // --- Update emotional state ---
  if (mouseOnCanvas) {
    if (mouseSpeed < STILL_THRESHOLD) {
      stillTime++
      aggressiveTime = Math.max(0, aggressiveTime - 2)
    } else if (mouseSpeed > AGGRESSIVE_SPEED) {
      aggressiveTime++
      stillTime = Math.max(0, stillTime - 4)
    } else {
      stillTime = Math.max(0, stillTime - 1)
      aggressiveTime = Math.max(0, aggressiveTime - 1)
    }
  } else {
    stillTime = Math.max(0, stillTime - 2)
    aggressiveTime = Math.max(0, aggressiveTime - 3)
  }

  // Give up if chased too aggressively
  if (aggressiveTime > AGGRESSIVE_FRAMES_FOR_GIVEUP && !givenUp) {
    givenUp = true
  }
  if (givenUp) {
    givenUpAmount = Math.min(1, givenUpAmount + 0.008)
  }
  // Recovery from given up (if cursor leaves or is very still for a while)
  if (givenUp && (!mouseOnCanvas || stillTime > 180)) {
    givenUpAmount = Math.max(0, givenUpAmount - 0.003)
    if (givenUpAmount <= 0) {
      givenUp = false
      aggressiveTime = 0
    }
  }

  ctx.clearRect(0, 0, W, H)

  // --- Layout ---
  const textBlockWidth = Math.min(MAX_WIDTH, W - MARGIN * 2)
  const lines = layoutWords(textBlockWidth)
  const totalHeight = lines.length * LINE_HEIGHT
  const baseX = (W - textBlockWidth) / 2
  const baseY = Math.max(MARGIN + LINE_HEIGHT, (H - totalHeight) / 2 + LINE_HEIGHT)

  const REPULSION_RADIUS = 200
  const SPRING_K = 0.003
  const DAMPING = 0.88

  // --- Update and draw each word ---
  for (let li = 0; li < lines.length; li++) {
    const line = lines[li]
    const y = baseY + li * LINE_HEIGHT

    for (const entry of line.words) {
      const state = wordStates[entry.wordIndex]
      if (!state || state.isSpace) continue

      const p = state.personality
      const homeX = baseX + entry.x
      const homeY = y

      // Distance from cursor to this word's home
      const dxHome = mouseOnCanvas ? (homeX + entry.width / 2 - mouseX) : 9999
      const dyHome = mouseOnCanvas ? (homeY - mouseY) : 9999
      const distHome = Math.sqrt(dxHome * dxHome + dyHome * dyHome)
      const effectiveRadius = REPULSION_RADIUS * p.sensitivityRadius
      const proximity = Math.max(0, 1 - distHome / effectiveRadius)

      // --- Given up: scatter to edges ---
      if (givenUp && givenUpAmount > 0) {
        const edgeX = Math.cos(state.scatterAngle) * (W * 0.45)
        const edgeY = Math.sin(state.scatterAngle) * (H * 0.45)
        const targetX = edgeX + (W / 2 - homeX)
        const targetY = edgeY + (H / 2 - homeY)

        state.velX += (targetX * givenUpAmount - state.offsetX) * 0.01
        state.velY += (targetY * givenUpAmount - state.offsetY) * 0.01
        state.opacity = Math.max(0.04, 1 - givenUpAmount * 0.92)
      } else {
        // --- Normal repulsion ---
        if (mouseOnCanvas && proximity > 0) {
          const speedFactor = Math.min(mouseSpeed / 6, 1)
          // Skittish words react even to slow movement
          const effectiveSpeed = p.fear > 0.7 ? Math.max(speedFactor, proximity * 0.3) : speedFactor

          if (effectiveSpeed > 0.08) {
            const pushAngle = Math.atan2(dyHome, dxHome)
            const force = proximity * effectiveSpeed * p.fleeMultiplier * 12
            state.velX += Math.cos(pushAngle) * force * 0.04
            state.velY += Math.sin(pushAngle) * force * 0.02

            // Particles on strong push
            if (force > 4 && Math.random() < proximity * 0.15) {
              spawnParticles(homeX + state.offsetX, homeY + state.offsetY, 1, Math.cos(pushAngle) * 2)
            }

            state.isReturning = false
            state.returnTimer = 0
          }
        }

        // --- Return behavior: word by word, tentatively ---
        if (mouseOnCanvas && mouseSpeed < STILL_THRESHOLD && Math.abs(state.offsetX) > 0.5) {
          state.returnTimer++
          if (state.returnTimer > state.returnDelay) {
            state.isReturning = true
          }
        } else if (mouseSpeed > 3) {
          state.isReturning = false
          state.returnTimer = 0
        }

        // Spring back to home
        const returnMultiplier = state.isReturning ? p.returnSpeed : 0.15
        state.velX += -SPRING_K * returnMultiplier * state.offsetX * (state.isReturning ? 3 : 1)
        state.velY += -SPRING_K * returnMultiplier * state.offsetY * (state.isReturning ? 3 : 1)

        // Clinging: pull toward neighbors if they're a clinging pair
        if (entry.wordIndex > 0 && entry.wordIndex < words.length - 1) {
          const prev = wordStates[entry.wordIndex - 2] // skip space
          const next = wordStates[entry.wordIndex + 2] // skip space
          if (prev && !prev.isSpace && shouldCling(state.word, prev.word)) {
            state.velX += (prev.offsetX - state.offsetX) * 0.02
            state.velY += (prev.offsetY - state.offsetY) * 0.02
          }
          if (next && !next.isSpace && shouldCling(state.word, next.word)) {
            state.velX += (next.offsetX - state.offsetX) * 0.02
            state.velY += (next.offsetY - state.offsetY) * 0.02
          }
        }

        // Opacity: scared words fade more
        const targetOpacity = 1 - proximity * p.fear * 0.4
        state.opacity += (targetOpacity - state.opacity) * 0.1
      }

      // Apply physics
      state.velX *= DAMPING
      state.velY *= DAMPING
      state.offsetX += state.velX
      state.offsetY += state.velY

      // Clamp
      const maxOff = textBlockWidth * 0.8
      state.offsetX = Math.max(-maxOff, Math.min(maxOff, state.offsetX))
      state.offsetY = Math.max(-H * 0.4, Math.min(H * 0.4, state.offsetY))

      // --- Color ---
      // Blend between cream (home), dusk (scared), terracotta (returning/brave)
      let r, g, b
      if (state.isReturning && !givenUp) {
        // Terracotta glow when returning
        const returnBlend = Math.min(1, state.returnTimer / (state.returnDelay + 30)) * 0.6
        r = Math.round(COLOR_CREAM[0] + (COLOR_TERRACOTTA[0] - COLOR_CREAM[0]) * returnBlend)
        g = Math.round(COLOR_CREAM[1] + (COLOR_TERRACOTTA[1] - COLOR_CREAM[1]) * returnBlend)
        b = Math.round(COLOR_CREAM[2] + (COLOR_TERRACOTTA[2] - COLOR_CREAM[2]) * returnBlend)
      } else if (proximity > 0 && mouseOnCanvas) {
        // Fade to dusk when scared
        const scareBlend = proximity * p.fear * 0.8
        r = Math.round(COLOR_CREAM[0] + (COLOR_DUSK[0] - COLOR_CREAM[0]) * scareBlend)
        g = Math.round(COLOR_CREAM[1] + (COLOR_DUSK[1] - COLOR_CREAM[1]) * scareBlend)
        b = Math.round(COLOR_CREAM[2] + (COLOR_DUSK[2] - COLOR_CREAM[2]) * scareBlend)
      } else {
        r = COLOR_CREAM[0]
        g = COLOR_CREAM[1]
        b = COLOR_CREAM[2]
      }

      // Tremor when moving fast
      const tremor = Math.abs(state.velX) > 0.3
        ? (Math.random() - 0.5) * Math.min(Math.abs(state.velX) * 0.3, 1.5)
        : 0

      ctx.font = FONT
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${state.opacity})`
      ctx.fillText(entry.text, homeX + state.offsetX, homeY + state.offsetY + tremor)
    }
  }

  // --- Particles ---
  updateAndDrawParticles()
}

// --- Init ---
document.fonts.ready.then(() => {
  const loading = document.getElementById('loading')
  loading.classList.add('hidden')
  setTimeout(() => loading.remove(), 1200)
  requestAnimationFrame(render)
})
</script>
</body>
</html>
