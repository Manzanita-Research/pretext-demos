<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mycelium Messenger</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=Literata:ital,opsz,wght@0,7..72,300;0,7..72,400;1,7..72,400&family=JetBrains+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0b08;
    color: #E8E5DF;
    font-family: 'Literata', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
  }

  #input-bar {
    position: relative;
    z-index: 10;
    padding: 16px 32px 24px;
    background: linear-gradient(to top, rgba(10,11,8,1) 0%, rgba(10,11,8,0.92) 60%, rgba(10,11,8,0) 100%);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #input-bar label {
    font-family: 'Fraunces', serif;
    font-size: 13px;
    font-weight: 300;
    color: #8B9E7E88;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid #8B9E7E33;
    color: #E8E5DF;
    font-family: 'Literata', serif;
    font-size: 14px;
    padding: 8px 0;
    outline: none;
    transition: border-color 0.3s;
  }

  #msg-input:focus {
    border-bottom-color: #8B9E7E;
  }

  #msg-input::placeholder {
    color: #8B9E7E44;
    font-style: italic;
  }
</style>
</head>
<body>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
  <div id="input-bar">
    <label>mycelium</label>
    <input type="text" id="msg-input" placeholder="send a message through the network" autofocus />
  </div>

<script type="module">
import { prepareWithSegments, layoutNextLine } from 'https://esm.sh/@chenglou/pretext'

const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')
const input = document.getElementById('msg-input')

const FONT_SIZE = 11
const FONT = `${FONT_SIZE}px 'Literata', serif`
const LINE_HEIGHT = FONT_SIZE * 1.4

// --- Manzanita brand colors ---
const BG = '#0a0b08'
const SAGE = '#8B9E7E'
const OCHRE = '#C49A3C'
const BARK = '#6B3A2A'
const TERRACOTTA = '#C2714F'
const FOG = '#E8E5DF'
const BIOLUM = '#5ca89a'   // blue-green bioluminescence accent

const BRANCH_COLORS = [
  '#8B9E7E', '#7A8E6E', '#6B7F5F', '#9BAE8E', '#748868',
  '#6B7355', '#8A9670', '#5E7050'
]
const TEXT_COLOR = FOG + 'e0'
const NODE_GLOW = OCHRE
const PULSE_COLOR = TERRACOTTA

// --- Network state ---
let W, H, centerX, centerY
let branches = []
let nutrientNodes = []
let messages = []
let spores = []
let networkAge = 0
let noiseCanvas = null

// --- Utilities ---
function rand(min, max) { return min + Math.random() * (max - min) }
function randInt(min, max) { return Math.floor(rand(min, max)) }
function lerp(a, b, t) { return a + (b - a) * t }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)) }

function hexAlpha(a) {
  return Math.round(clamp(a, 0, 1) * 255).toString(16).padStart(2, '0')
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16)
  const g = parseInt(hex.slice(3,5), 16)
  const b = parseInt(hex.slice(5,7), 16)
  return { r, g, b }
}

function rgbaStr(hex, alpha) {
  const c = hexToRgb(hex)
  return `rgba(${c.r},${c.g},${c.b},${alpha})`
}

// Bezier point at t
function bezierPoint(p0, p1, p2, p3, t) {
  const u = 1 - t
  return {
    x: u*u*u*p0.x + 3*u*u*t*p1.x + 3*u*t*t*p2.x + t*t*t*p3.x,
    y: u*u*u*p0.y + 3*u*u*t*p1.y + 3*u*t*t*p2.y + t*t*t*p3.y
  }
}

// Bezier tangent at t
function bezierTangent(p0, p1, p2, p3, t) {
  const u = 1 - t
  return {
    x: 3*u*u*(p1.x-p0.x) + 6*u*t*(p2.x-p1.x) + 3*t*t*(p3.x-p2.x),
    y: 3*u*u*(p1.y-p0.y) + 6*u*t*(p2.y-p1.y) + 3*t*t*(p3.y-p2.y)
  }
}

// Approximate arc length of bezier
function bezierLength(p0, p1, p2, p3, steps = 20) {
  let len = 0
  let prev = p0
  for (let i = 1; i <= steps; i++) {
    const pt = bezierPoint(p0, p1, p2, p3, i / steps)
    const dx = pt.x - prev.x, dy = pt.y - prev.y
    len += Math.sqrt(dx*dx + dy*dy)
    prev = pt
  }
  return len
}

// Normal perpendicular to tangent
function bezierNormal(p0, p1, p2, p3, t) {
  const tang = bezierTangent(p0, p1, p2, p3, t)
  const len = Math.sqrt(tang.x * tang.x + tang.y * tang.y)
  return { x: -tang.y / len, y: tang.x / len }
}

// --- Noise texture overlay ---
function generateNoiseTexture() {
  noiseCanvas = document.createElement('canvas')
  noiseCanvas.width = 256
  noiseCanvas.height = 256
  const nctx = noiseCanvas.getContext('2d')
  const imageData = nctx.createImageData(256, 256)
  const data = imageData.data
  for (let i = 0; i < data.length; i += 4) {
    const v = Math.random() * 255
    data[i] = v
    data[i+1] = v
    data[i+2] = v
    data[i+3] = 8 // very faint
  }
  nctx.putImageData(imageData, 0, 0)
}

// --- Spore particles ---
function spawnSpores(count) {
  for (let i = 0; i < count; i++) {
    spores.push({
      x: rand(0, W),
      y: rand(0, H),
      vx: rand(-0.15, 0.15),
      vy: rand(-0.3, -0.05),
      size: rand(0.5, 2),
      alpha: rand(0.05, 0.2),
      life: rand(0, 1),
      maxLife: rand(0.5, 1),
      color: Math.random() > 0.6 ? BIOLUM : SAGE
    })
  }
}

function updateSpores() {
  for (let i = spores.length - 1; i >= 0; i--) {
    const s = spores[i]
    s.x += s.vx + Math.sin(networkAge * 0.001 + s.y * 0.01) * 0.1
    s.y += s.vy
    s.life += 0.002
    if (s.life > s.maxLife) s.alpha -= 0.003
    if (s.alpha <= 0 || s.y < -10 || s.x < -10 || s.x > W + 10) {
      // respawn
      s.x = rand(0, W)
      s.y = rand(H * 0.3, H)
      s.alpha = rand(0.05, 0.2)
      s.life = 0
      s.vy = rand(-0.3, -0.05)
    }
  }
}

function drawSpores() {
  for (const s of spores) {
    if (s.alpha <= 0) continue
    ctx.fillStyle = rgbaStr(s.color, s.alpha)
    ctx.beginPath()
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2)
    ctx.fill()
  }
}

// --- Branch generation ---

function generateBranch(startX, startY, angle, width, depth, maxDepth, parent) {
  if (depth > maxDepth || width < 1.2) return null

  const length = rand(60, 160) * (1 - depth * 0.08)
  const curve = rand(-0.6, 0.6)

  const endX = startX + Math.cos(angle) * length
  const endY = startY + Math.sin(angle) * length
  const cp1x = startX + Math.cos(angle + curve * 0.5) * length * 0.33
  const cp1y = startY + Math.sin(angle + curve * 0.5) * length * 0.33
  const cp2x = startX + Math.cos(angle + curve) * length * 0.66
  const cp2y = startY + Math.sin(angle + curve) * length * 0.66

  // More dramatic taper
  const endWidth = width * rand(0.35, 0.55)

  // Nodules along the branch
  const numNodules = randInt(1, 4)
  const nodules = []
  for (let i = 0; i < numNodules; i++) {
    nodules.push({
      t: rand(0.15, 0.85),
      size: rand(1.5, 3.5) * (1 - depth * 0.1),
      side: Math.random() > 0.5 ? 1 : -1
    })
  }

  const branch = {
    p0: { x: startX, y: startY },
    p1: { x: cp1x, y: cp1y },
    p2: { x: cp2x, y: cp2y },
    p3: { x: endX, y: endY },
    startWidth: width,
    endWidth,
    depth,
    color: BRANCH_COLORS[randInt(0, BRANCH_COLORS.length)],
    colorAlt: BRANCH_COLORS[randInt(0, BRANCH_COLORS.length)],
    length: 0,
    childBranches: [],
    parent: parent || null,
    growProgress: 0,
    growSpeed: rand(0.005, 0.02),
    pulsePhase: rand(0, Math.PI * 2),
    pulseIntensity: 0,
    nodules
  }

  branch.length = bezierLength(branch.p0, branch.p1, branch.p2, branch.p3)

  branches.push(branch)

  // Sub-branches
  const numChildren = depth === 0 ? randInt(3, 5) : (depth < 3 ? randInt(1, 3) : randInt(0, 2))
  for (let i = 0; i < numChildren; i++) {
    const branchT = rand(0.4, 0.95)
    const branchPt = bezierPoint(branch.p0, branch.p1, branch.p2, branch.p3, branchT)
    const tang = bezierTangent(branch.p0, branch.p1, branch.p2, branch.p3, branchT)
    const baseAngle = Math.atan2(tang.y, tang.x)
    const spread = rand(0.3, 1.1) * (Math.random() > 0.5 ? 1 : -1)
    const childWidth = lerp(branch.startWidth, branch.endWidth, branchT) * rand(0.5, 0.8)

    const child = generateBranch(branchPt.x, branchPt.y, baseAngle + spread, childWidth, depth + 1, maxDepth, branch)
    if (child) branch.childBranches.push(child)
  }

  // Nutrient node at tips
  if (branch.childBranches.length === 0 || (depth >= 2 && Math.random() > 0.6)) {
    nutrientNodes.push({
      x: endX,
      y: endY,
      radius: rand(3, 7),
      pulsePhase: rand(0, Math.PI * 2),
      brightness: 0,
      storedText: [],
      branch,
      ringRadius: 0,
      ringAlpha: 0
    })
  }

  return branch
}

function buildNetwork() {
  branches = []
  nutrientNodes = []

  const numTrunks = randInt(5, 8)
  for (let i = 0; i < numTrunks; i++) {
    const angle = (i / numTrunks) * Math.PI * 2 + rand(-0.3, 0.3)
    const trunkWidth = rand(6, 11)
    generateBranch(centerX, centerY, angle, trunkWidth, 0, randInt(4, 6), null)
  }
}

function growNewBranch() {
  const candidates = branches.filter(b => b.depth >= 1 && b.growProgress >= 1 && b.childBranches.length < 3)
  if (candidates.length === 0) return

  const parent = candidates[randInt(0, candidates.length)]
  const branchT = rand(0.6, 0.95)
  const tang = bezierTangent(parent.p0, parent.p1, parent.p2, parent.p3, branchT)
  const baseAngle = Math.atan2(tang.y, tang.x)
  const spread = rand(0.3, 1.2) * (Math.random() > 0.5 ? 1 : -1)
  const childWidth = lerp(parent.startWidth, parent.endWidth, branchT) * rand(0.5, 0.7)

  if (childWidth < 1.2) return

  const startPt = bezierPoint(parent.p0, parent.p1, parent.p2, parent.p3, branchT)
  const child = generateBranch(startPt.x, startPt.y, baseAngle + spread, childWidth, parent.depth + 1, parent.depth + randInt(2, 3), parent)
  if (child) parent.childBranches.push(child)
}

// --- Message flowing ---

// Split particles: small bursts when text splits at branch points
let splitParticles = []

function emitSplitParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = rand(0, Math.PI * 2)
    const speed = rand(0.3, 1.5)
    splitParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: rand(0.01, 0.03),
      size: rand(1, 3),
      color: Math.random() > 0.5 ? OCHRE : TERRACOTTA
    })
  }
}

function updateSplitParticles() {
  for (let i = splitParticles.length - 1; i >= 0; i--) {
    const p = splitParticles[i]
    p.x += p.vx
    p.y += p.vy
    p.vx *= 0.96
    p.vy *= 0.96
    p.life -= p.decay
    if (p.life <= 0) splitParticles.splice(i, 1)
  }
}

function drawSplitParticles() {
  for (const p of splitParticles) {
    ctx.fillStyle = rgbaStr(p.color, p.life * 0.6)
    ctx.beginPath()
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2)
    ctx.fill()
  }
}

function sendMessage(text) {
  if (!text.trim()) return

  const words = text.split(/\s+/)
  if (words.length === 0) return

  const rootBranches = branches.filter(b => b.depth === 0 && b.growProgress >= 0.5)
  if (rootBranches.length === 0) return

  const numPaths = Math.min(rootBranches.length, Math.max(2, Math.ceil(words.length / 3)))
  const shuffled = [...rootBranches].sort(() => Math.random() - 0.5)
  const selectedBranches = shuffled.slice(0, numPaths)

  const chunkSize = Math.ceil(words.length / numPaths)
  for (let i = 0; i < numPaths; i++) {
    const chunk = words.slice(i * chunkSize, (i + 1) * chunkSize).join(' ')
    if (!chunk) continue

    const path = collectPath(selectedBranches[i])

    messages.push({
      text: chunk,
      path,
      progress: 0,
      speed: rand(0.003, 0.006),
      color: TEXT_COLOR,
      born: performance.now(),
      alpha: 1,
      hasSplit: false
    })
  }

  // Emit split particles from center
  emitSplitParticles(centerX, centerY, 12)
}

function collectPath(rootBranch) {
  const path = [rootBranch]
  let current = rootBranch

  while (current.childBranches.length > 0) {
    const grownChildren = current.childBranches.filter(b => b.growProgress > 0.3)
    if (grownChildren.length === 0) break
    current = grownChildren[randInt(0, grownChildren.length)]
    path.push(current)
  }

  return path
}

// --- Resize ---
function resize() {
  const dpr = window.devicePixelRatio || 1
  const wrap = document.getElementById('canvas-wrap')
  W = wrap.clientWidth
  H = wrap.clientHeight
  canvas.width = W * dpr
  canvas.height = H * dpr
  canvas.style.width = W + 'px'
  canvas.style.height = H + 'px'
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0)

  centerX = W / 2
  centerY = H / 2

  buildNetwork()
  spores = []
  spawnSpores(Math.floor(W * H / 6000))
}

// --- Drawing ---

function drawBackground(time) {
  // Dark forest floor gradient
  const bgGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(W, H) * 0.7)
  bgGrad.addColorStop(0, '#12150e')
  bgGrad.addColorStop(0.4, '#0d0f0a')
  bgGrad.addColorStop(1, '#080907')
  ctx.fillStyle = bgGrad
  ctx.fillRect(0, 0, W, H)

  // Subtle earth-tone warmth at edges
  const edgeGrad = ctx.createRadialGradient(centerX, H, 0, centerX, H, H * 0.8)
  edgeGrad.addColorStop(0, rgbaStr(BARK, 0.06))
  edgeGrad.addColorStop(1, 'transparent')
  ctx.fillStyle = edgeGrad
  ctx.fillRect(0, 0, W, H)

  // Noise texture overlay
  if (noiseCanvas) {
    ctx.globalAlpha = 0.03
    const pattern = ctx.createPattern(noiseCanvas, 'repeat')
    ctx.fillStyle = pattern
    ctx.fillRect(0, 0, W, H)
    ctx.globalAlpha = 1
  }
}

// Concentric rings from center
function drawCenterRings(time) {
  const numRings = 5
  for (let i = 0; i < numRings; i++) {
    const baseRadius = 30 + i * 50
    const wave = Math.sin(time * 0.0005 + i * 0.8) * 5
    const r = baseRadius + wave
    const alpha = 0.03 - i * 0.005
    if (alpha <= 0) continue
    ctx.strokeStyle = rgbaStr(SAGE, alpha)
    ctx.lineWidth = 0.5
    ctx.beginPath()
    ctx.arc(centerX, centerY, r, 0, Math.PI * 2)
    ctx.stroke()
  }
}

function drawBranch(branch, time) {
  if (branch.growProgress <= 0) return

  const progress = Math.min(branch.growProgress, 1)
  const steps = 40
  const drawSteps = Math.floor(steps * progress)

  // Pulse effect
  const pulse = branch.pulseIntensity * (Math.sin(time * 0.003 + branch.pulsePhase) * 0.5 + 0.5)

  ctx.lineCap = 'round'
  ctx.lineJoin = 'round'

  // Draw as a single smooth bezier path with gradient stroke
  // We draw multiple passes: shadow/glow, then main stroke

  // Bioluminescence glow (always faint, stronger when pulsing)
  const glowAlpha = 0.03 + branch.pulseIntensity * 0.12
  if (glowAlpha > 0.01) {
    for (let i = 0; i < drawSteps; i++) {
      const t0 = i / steps
      const t1 = (i + 1) / steps
      const pt0 = bezierPoint(branch.p0, branch.p1, branch.p2, branch.p3, t0)
      const pt1 = bezierPoint(branch.p0, branch.p1, branch.p2, branch.p3, t1)
      const w = lerp(branch.startWidth, branch.endWidth, t0)
      ctx.strokeStyle = rgbaStr(BIOLUM, glowAlpha * (1 - t0 * 0.5))
      ctx.lineWidth = w + 6 + pulse * 4
      ctx.beginPath()
      ctx.moveTo(pt0.x, pt0.y)
      ctx.lineTo(pt1.x, pt1.y)
      ctx.stroke()
    }
  }

  // Main branch with gradient: darker at trunk, lighter at tips
  for (let i = 0; i < drawSteps; i++) {
    const t0 = i / steps
    const t1 = (i + 1) / steps
    const pt0 = bezierPoint(branch.p0, branch.p1, branch.p2, branch.p3, t0)
    const pt1 = bezierPoint(branch.p0, branch.p1, branch.p2, branch.p3, t1)
    const w = lerp(branch.startWidth, branch.endWidth, t0) * (0.85 + pulse * 0.15)

    // Gradient from trunk (bark-tinted dark) to tips (sage-bright)
    const trunkAlpha = 0.35 + branch.pulseIntensity * 0.35
    const tipAlpha = 0.15 + branch.pulseIntensity * 0.2

    // Blend between trunk color and tip color
    const c1 = hexToRgb(branch.color)
    const c2 = hexToRgb(branch.colorAlt)
    const barkC = hexToRgb(BARK)

    const r = Math.round(lerp(lerp(barkC.r, c1.r, 0.4), c2.r, t0))
    const g = Math.round(lerp(lerp(barkC.g, c1.g, 0.4), c2.g, t0))
    const b = Math.round(lerp(lerp(barkC.b, c1.b, 0.4), c2.b, t0))
    const a = lerp(trunkAlpha, tipAlpha, t0)

    ctx.strokeStyle = `rgba(${r},${g},${b},${a})`
    ctx.lineWidth = w
    ctx.beginPath()
    ctx.moveTo(pt0.x, pt0.y)
    ctx.lineTo(pt1.x, pt1.y)
    ctx.stroke()

    // Active pulse glow (terracotta)
    if (branch.pulseIntensity > 0.05) {
      ctx.strokeStyle = rgbaStr(TERRACOTTA, pulse * branch.pulseIntensity * 0.12)
      ctx.lineWidth = w + 3
      ctx.beginPath()
      ctx.moveTo(pt0.x, pt0.y)
      ctx.lineTo(pt1.x, pt1.y)
      ctx.stroke()
    }
  }

  // Draw nodules
  for (const nod of branch.nodules) {
    if (nod.t > progress) continue
    const pt = bezierPoint(branch.p0, branch.p1, branch.p2, branch.p3, nod.t)
    const norm = bezierNormal(branch.p0, branch.p1, branch.p2, branch.p3, nod.t)
    const w = lerp(branch.startWidth, branch.endWidth, nod.t)
    const nx = pt.x + norm.x * w * 0.4 * nod.side
    const ny = pt.y + norm.y * w * 0.4 * nod.side

    const nodAlpha = 0.2 + branch.pulseIntensity * 0.3
    ctx.fillStyle = rgbaStr(branch.color, nodAlpha)
    ctx.beginPath()
    ctx.arc(nx, ny, nod.size, 0, Math.PI * 2)
    ctx.fill()
  }
}

function drawNutrientNode(node, time) {
  const pulse = 0.5 + 0.5 * Math.sin(time * 0.002 + node.pulsePhase)
  const r = node.radius * (0.8 + pulse * 0.4)
  const brightness = 0.15 + node.brightness * 0.7

  // Expanding ring when receiving text
  if (node.ringAlpha > 0.01) {
    node.ringRadius += 0.8
    node.ringAlpha *= 0.97
    ctx.strokeStyle = rgbaStr(OCHRE, node.ringAlpha)
    ctx.lineWidth = 1.5
    ctx.beginPath()
    ctx.arc(node.x, node.y, node.ringRadius, 0, Math.PI * 2)
    ctx.stroke()
  }

  // Outer glow
  const grad = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, r * 4)
  grad.addColorStop(0, rgbaStr(NODE_GLOW, brightness * 0.5))
  grad.addColorStop(0.3, rgbaStr(NODE_GLOW, brightness * 0.2))
  grad.addColorStop(0.7, rgbaStr(BIOLUM, brightness * 0.05))
  grad.addColorStop(1, 'rgba(0,0,0,0)')
  ctx.fillStyle = grad
  ctx.beginPath()
  ctx.arc(node.x, node.y, r * 4, 0, Math.PI * 2)
  ctx.fill()

  // Core
  const coreGrad = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, r)
  coreGrad.addColorStop(0, rgbaStr(OCHRE, brightness * 1.2))
  coreGrad.addColorStop(0.6, rgbaStr(OCHRE, brightness * 0.7))
  coreGrad.addColorStop(1, rgbaStr(SAGE, brightness * 0.3))
  ctx.fillStyle = coreGrad
  ctx.beginPath()
  ctx.arc(node.x, node.y, r, 0, Math.PI * 2)
  ctx.fill()

  // Stored text orbits
  if (node.storedText.length > 0) {
    ctx.font = `${FONT_SIZE - 2}px 'Literata', serif`
    const angleStep = (Math.PI * 2) / Math.max(node.storedText.length, 1)
    for (let i = 0; i < node.storedText.length; i++) {
      const a = time * 0.0005 + i * angleStep
      const orbitR = r * 2.5 + 8
      const tx = node.x + Math.cos(a) * orbitR
      const ty = node.y + Math.sin(a) * orbitR
      // Warm glow behind text
      ctx.fillStyle = rgbaStr(OCHRE, 0.15)
      ctx.beginPath()
      ctx.arc(tx, ty, 8, 0, Math.PI * 2)
      ctx.fill()
      ctx.fillStyle = rgbaStr(FOG, 0.6)
      ctx.textAlign = 'center'
      ctx.fillText(node.storedText[i], tx, ty + 3)
    }
  }
}

function drawFlowingMessage(msg, time) {
  if (msg.alpha <= 0) return

  const { text, path, progress } = msg

  let prepared
  try {
    prepared = prepareWithSegments(text, FONT)
  } catch (e) {
    return
  }

  ctx.font = FONT
  ctx.textAlign = 'left'

  let cursor = { segmentIndex: 0, graphemeIndex: 0 }

  let totalLength = 0
  for (const branch of path) {
    totalLength += branch.length
  }

  let accLen = 0

  for (let bi = 0; bi < path.length; bi++) {
    const branch = path[bi]
    const branchFrac = accLen / totalLength
    const branchEndFrac = (accLen + branch.length) / totalLength

    if (progress < branchFrac) break

    const localProgress = clamp((progress - branchFrac) / (branchEndFrac - branchFrac), 0, 1)

    // Pulse the branch
    branch.pulseIntensity = Math.max(branch.pulseIntensity, localProgress > 0 && localProgress < 1 ? 0.8 : branch.pulseIntensity)

    // Emit split particles at branch transitions
    if (bi > 0 && !msg.hasSplit && localProgress > 0.05 && localProgress < 0.2) {
      const pt = bezierPoint(branch.p0, branch.p1, branch.p2, branch.p3, 0)
      emitSplitParticles(pt.x, pt.y, 6)
      msg.hasSplit = true
    }

    const avgWidth = (branch.startWidth + branch.endWidth) / 2
    const textWidth = Math.max(avgWidth * 8, 40)

    const line = layoutNextLine(prepared, cursor, textWidth)
    if (!line) break

    const lineText = line.text
    const charCount = lineText.length
    if (charCount === 0) { cursor = line.end; accLen += branch.length; continue }

    const startT = Math.max(0, localProgress - 0.3)
    const endT = localProgress

    // Draw warm glow trail
    const trailSteps = 8
    for (let ti = 0; ti < trailSteps; ti++) {
      const tt = lerp(startT, endT, ti / trailSteps)
      if (tt < 0 || tt > 1) continue
      const pt = bezierPoint(branch.p0, branch.p1, branch.p2, branch.p3, tt)
      const trailAlpha = msg.alpha * 0.08 * (ti / trailSteps)
      ctx.fillStyle = rgbaStr(OCHRE, trailAlpha)
      ctx.beginPath()
      ctx.arc(pt.x, pt.y, 6 + (ti / trailSteps) * 4, 0, Math.PI * 2)
      ctx.fill()
    }

    for (let i = 0; i < charCount; i++) {
      const charFrac = i / charCount
      const t = lerp(startT, endT, charFrac)
      if (t < 0 || t > 1) continue

      const pt = bezierPoint(branch.p0, branch.p1, branch.p2, branch.p3, t)
      const tang = bezierTangent(branch.p0, branch.p1, branch.p2, branch.p3, t)
      const angle = Math.atan2(tang.y, tang.x)

      // Fade in as characters arrive
      const fadeIn = clamp(charFrac * 3, 0, 1)
      const fadeOut = clamp((1 - charFrac) * 3, 0, 1)
      const arrivalFade = clamp((localProgress - (charFrac * 0.3)) * 5, 0, 1)
      const alpha = msg.alpha * fadeIn * fadeOut * arrivalFade

      // Warm glow behind each character
      ctx.fillStyle = rgbaStr(OCHRE, alpha * 0.15)
      ctx.beginPath()
      ctx.arc(pt.x, pt.y, 5, 0, Math.PI * 2)
      ctx.fill()

      ctx.save()
      ctx.translate(pt.x, pt.y)
      ctx.rotate(angle)
      ctx.fillStyle = rgbaStr(FOG, alpha)
      ctx.fillText(lineText[i], 0, FONT_SIZE * 0.35)
      ctx.restore()
    }

    cursor = line.end
    accLen += branch.length
  }
}

// Draw central node
function drawCenter(time) {
  const pulse = 0.5 + 0.5 * Math.sin(time * 0.001)
  const r = 9 + pulse * 3

  // Large ambient glow
  const ambientGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, r * 8)
  ambientGrad.addColorStop(0, rgbaStr(BIOLUM, 0.06 + pulse * 0.03))
  ambientGrad.addColorStop(0.3, rgbaStr(SAGE, 0.03))
  ambientGrad.addColorStop(1, 'rgba(0,0,0,0)')
  ctx.fillStyle = ambientGrad
  ctx.beginPath()
  ctx.arc(centerX, centerY, r * 8, 0, Math.PI * 2)
  ctx.fill()

  // Medium glow
  const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, r * 4)
  grad.addColorStop(0, rgbaStr(SAGE, 0.4 + pulse * 0.2))
  grad.addColorStop(0.4, rgbaStr(SAGE, 0.1))
  grad.addColorStop(1, 'rgba(0,0,0,0)')
  ctx.fillStyle = grad
  ctx.beginPath()
  ctx.arc(centerX, centerY, r * 4, 0, Math.PI * 2)
  ctx.fill()

  // Core
  const coreGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, r)
  coreGrad.addColorStop(0, rgbaStr(SAGE, 0.7 + pulse * 0.2))
  coreGrad.addColorStop(0.5, rgbaStr(SAGE, 0.4))
  coreGrad.addColorStop(1, rgbaStr(BARK, 0.2))
  ctx.fillStyle = coreGrad
  ctx.beginPath()
  ctx.arc(centerX, centerY, r, 0, Math.PI * 2)
  ctx.fill()
}

// --- Main loop ---
let lastGrowTime = 0

function render(time) {
  requestAnimationFrame(render)
  networkAge = time

  drawBackground(time)
  drawCenterRings(time)

  // Update spores
  updateSpores()
  drawSpores()

  // Update split particles
  updateSplitParticles()

  // Grow branches
  for (const b of branches) {
    if (b.growProgress < 1) {
      b.growProgress += b.growSpeed
    }
    b.pulseIntensity *= 0.995
  }

  // Periodic new growth
  if (time - lastGrowTime > 4000 && branches.length < 200) {
    growNewBranch()
    lastGrowTime = time
  }

  // Draw branches (back to front by depth)
  const sortedBranches = [...branches].sort((a, b) => a.depth - b.depth)
  for (const b of sortedBranches) {
    drawBranch(b, time)
  }

  // Draw center
  drawCenter(time)

  // Draw nutrient nodes
  for (const node of nutrientNodes) {
    node.brightness *= 0.998
    drawNutrientNode(node, time)
  }

  // Draw split particles on top
  drawSplitParticles()

  // Update and draw messages
  for (let i = messages.length - 1; i >= 0; i--) {
    const msg = messages[i]
    msg.progress += msg.speed

    if (msg.progress > 1.3) {
      const lastBranch = msg.path[msg.path.length - 1]
      const nearest = nutrientNodes.find(n => n.branch === lastBranch)
      if (nearest) {
        const words = msg.text.split(/\s+/)
        for (const w of words) {
          nearest.storedText.push(w)
          if (nearest.storedText.length > 5) nearest.storedText.shift()
        }
        nearest.brightness = 1
        // Trigger expanding ring
        nearest.ringRadius = nearest.radius
        nearest.ringAlpha = 0.6
      }

      msg.alpha -= 0.02
      if (msg.alpha <= 0) {
        messages.splice(i, 1)
      }
    }

    drawFlowingMessage(msg, time)
  }
}

// --- Events ---
window.addEventListener('resize', resize)

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    sendMessage(input.value)
    input.value = ''
  }
})

document.addEventListener('keydown', (e) => {
  if (document.activeElement !== input && !e.ctrlKey && !e.metaKey && e.key.length === 1) {
    input.focus()
  }
})

// --- Init ---
generateNoiseTexture()
resize()
requestAnimationFrame(render)

// Send an initial message after the network has grown a bit
setTimeout(() => {
  sendMessage('the forest floor remembers everything')
}, 2500)
</script>
